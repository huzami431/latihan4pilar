<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Undian Soal 4 Pilar Kebangsaan</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--red:#c0392b;--dark-red:#922b21;--cream:#fdf6ec;--dark:#1a0a05;--gold:#c9a84c;--green:#27ae60;--green-dim:rgba(39,174,96,.15);}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--dark);color:var(--cream);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden;}
  body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(circle at 20% 20%,rgba(192,57,43,.15) 0%,transparent 50%),radial-gradient(circle at 80% 80%,rgba(201,168,76,.1) 0%,transparent 50%);pointer-events:none;z-index:0;}
  .container{position:relative;z-index:1;max-width:860px;margin:0 auto;padding:40px 20px;}
  header{text-align:center;margin-bottom:48px;}
  h1{font-family:'Playfair Display',serif;font-size:clamp(36px,7vw,64px);font-weight:900;line-height:1;color:var(--cream);margin-bottom:8px;}
  h1 span{color:var(--gold);}
  .subtitle{font-size:14px;color:rgba(253,246,236,.5);letter-spacing:1px;}
  .divider{display:flex;align-items:center;gap:12px;margin:32px 0;opacity:.3;}
  .divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--gold);}
  .divider-icon{color:var(--gold);font-size:18px;}
  .draw-section{display:flex;flex-direction:column;align-items:center;gap:20px;margin-bottom:40px;}
  .wheel-wrap{position:relative;width:260px;height:260px;}
  .wheel-wrap canvas{border-radius:50%;box-shadow:0 0 40px rgba(201,168,76,.2);}
  .wheel-pointer{position:absolute;top:-14px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:12px solid transparent;border-right:12px solid transparent;border-top:24px solid var(--gold);filter:drop-shadow(0 2px 4px rgba(0,0,0,.5));z-index:10;}
  .wheel-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:36px;height:36px;background:var(--dark);border:3px solid var(--gold);border-radius:50%;z-index:10;}
  .btn-draw{background:var(--red);color:white;border:none;font-family:'Playfair Display',serif;font-size:18px;font-weight:700;padding:14px 44px;border-radius:4px;cursor:pointer;transition:all .2s;letter-spacing:1px;}
  .btn-draw:hover:not(:disabled){background:var(--dark-red);transform:scale(1.03);box-shadow:0 8px 30px rgba(192,57,43,.5);}
  .btn-draw:disabled{opacity:.5;cursor:not-allowed;}
  .btn-secondary{background:transparent;border:1px solid rgba(201,168,76,.4);color:var(--gold);font-size:13px;padding:10px 24px;border-radius:4px;cursor:pointer;transition:all .2s;}
  .btn-secondary:hover{background:rgba(201,168,76,.1);border-color:var(--gold);}
  .result-card{background:rgba(253,246,236,.03);border:1px solid rgba(201,168,76,.25);border-radius:12px;padding:36px;display:none;animation:fadeUp .4s ease;}
  .result-card.visible{display:block;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
  .result-header{margin-bottom:28px;padding-bottom:20px;border-bottom:1px solid rgba(201,168,76,.2);}
  .result-title{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:var(--gold);}
  .result-meta{font-size:12px;color:rgba(253,246,236,.4);margin-top:4px;letter-spacing:1px;}
  .score-bar{display:flex;align-items:center;gap:12px;background:rgba(253,246,236,.04);border:1px solid rgba(201,168,76,.2);border-radius:8px;padding:12px 18px;margin-bottom:28px;font-size:14px;}
  .score-label{color:rgba(253,246,236,.5);}
  .score-val{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:var(--gold);margin-left:auto;}
  .soal-list{display:flex;flex-direction:column;gap:28px;}
  .soal-item{animation:fadeUp .3s ease both;}
  .soal-header{display:flex;gap:14px;margin-bottom:12px;}
  .soal-num{background:var(--red);color:white;font-family:'Playfair Display',serif;font-size:14px;font-weight:700;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;}
  .soal-num.correct{background:var(--green);}
  .soal-num.wrong{background:#7f1d1d;}
  .soal-text{font-size:15px;line-height:1.7;color:var(--cream);padding-top:4px;flex:1;}
  .timer-row{display:flex;align-items:center;gap:10px;margin:0 0 10px 46px;}
  .timer-ring{position:relative;width:36px;height:36px;flex-shrink:0;}
  .timer-ring svg{transform:rotate(-90deg);}
  .timer-ring circle.bg{fill:none;stroke:rgba(253,246,236,.1);stroke-width:3;}
  .timer-ring circle.prog{fill:none;stroke:var(--gold);stroke-width:3;stroke-linecap:round;stroke-dasharray:94.2;stroke-dashoffset:0;transition:stroke-dashoffset .9s linear,stroke .3s;}
  .timer-ring circle.prog.warn{stroke:#e67e22;}
  .timer-ring circle.prog.danger{stroke:var(--red);}
  .timer-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--gold);}
  .timer-num.warn{color:#e67e22;}
  .timer-num.danger{color:var(--red);}
  .timer-label{font-size:11px;color:rgba(253,246,236,.4);letter-spacing:.5px;}
  .soal-options{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-left:46px;}
  .opt-btn{background:rgba(253,246,236,.05);border:1px solid rgba(253,246,236,.12);border-radius:8px;padding:10px 14px;cursor:pointer;text-align:left;font-size:13px;color:rgba(253,246,236,.8);transition:all .2s;display:flex;gap:10px;align-items:flex-start;}
  .opt-btn:hover:not(:disabled){background:rgba(201,168,76,.1);border-color:rgba(201,168,76,.4);color:var(--cream);}
  .opt-btn:disabled{cursor:default;}
  .opt-btn.correct{background:var(--green-dim);border-color:var(--green);color:#6ee7a0;}
  .opt-btn.wrong{background:rgba(192,57,43,.15);border-color:var(--red);color:#fca5a5;}
  .opt-btn.reveal{background:var(--green-dim);border-color:var(--green);color:#6ee7a0;}
  .opt-btn.timeout{background:rgba(201,168,76,.08);border-color:rgba(201,168,76,.25);color:rgba(253,246,236,.4);}
  .opt-key{font-weight:700;min-width:18px;color:var(--gold);opacity:.8;}
  .opt-btn.correct .opt-key,.opt-btn.reveal .opt-key{color:#6ee7a0;}
  .opt-btn.wrong .opt-key{color:#fca5a5;}
  .feedback{margin-left:46px;margin-top:10px;border-radius:8px;padding:12px 14px;display:none;font-size:13px;line-height:1.6;}
  .feedback.show{display:block;}
  .feedback.ok{background:rgba(39,174,96,.12);border:1px solid rgba(39,174,96,.3);color:#6ee7a0;}
  .feedback.bad{background:rgba(192,57,43,.12);border:1px solid rgba(192,57,43,.3);color:#fca5a5;}
  .feedback.timeout-fb{background:rgba(201,168,76,.08);border:1px solid rgba(201,168,76,.25);color:rgba(253,246,236,.6);}
  .feedback-title{font-weight:700;margin-bottom:4px;font-size:13px;}
  .feedback-explain{color:rgba(253,246,236,.7);font-size:12.5px;margin-top:6px;line-height:1.65;border-top:1px solid rgba(253,246,236,.1);padding-top:6px;}
  .history-section{margin-top:48px;border-top:1px solid rgba(201,168,76,.15);padding-top:32px;}
  .section-label{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:16px;font-weight:600;}
  .history-grid{display:flex;flex-direction:column;gap:8px;}
  .history-item{display:flex;align-items:center;justify-content:space-between;background:rgba(253,246,236,.03);border:1px solid rgba(253,246,236,.07);border-radius:6px;padding:12px 16px;font-size:14px;cursor:pointer;}
  .history-item:hover{border-color:rgba(201,168,76,.3);background:rgba(201,168,76,.05);}
  .history-item-title{font-weight:500;}
  .history-item-meta{font-size:11px;color:rgba(253,246,236,.4);margin-top:2px;}
  .history-score{font-family:'Playfair Display',serif;font-size:16px;font-weight:700;color:var(--gold);}
  .toast{position:fixed;bottom:24px;right:24px;background:var(--gold);color:var(--dark);font-size:13px;font-weight:600;padding:12px 20px;border-radius:6px;z-index:999;opacity:0;transform:translateY(10px);transition:all .3s;pointer-events:none;}
  .toast.show{opacity:1;transform:translateY(0);}
  @media(max-width:560px){.soal-options{grid-template-columns:1fr;}.result-card{padding:20px;}.feedback,.timer-row{margin-left:0;}}
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>Undian <span>Soal</span></h1>
    <p class="subtitle">4 Pilar Kebangsaan · SMA Kelas 10–12 · 10 Paket</p>
  </header>
  <div class="divider"><span class="divider-icon">❖</span></div>
  <div class="draw-section">
    <div class="wheel-wrap">
      <div class="wheel-pointer"></div>
      <canvas id="wheelCanvas" width="260" height="260"></canvas>
      <div class="wheel-center"></div>
    </div>
    <button class="btn-draw" id="btnSpin" onclick="spinWheel()">🌀 Putar Roda</button>
    <button class="btn-secondary" onclick="resetAll()">↺ Reset Semua</button>
  </div>
  <div class="result-card" id="resultCard">
    <div class="result-header">
      <div class="result-title" id="resultTitle"></div>
      <div class="result-meta" id="resultMeta"></div>
    </div>
    <div class="score-bar"><span class="score-label">Skor</span><span id="scoreText" class="score-val">0 / 0</span></div>
    <div class="soal-list" id="soalList"></div>
  </div>
  <div class="history-section" id="historySection" style="display:none">
    <div class="section-label">Riwayat Paket</div>
    <div class="history-grid" id="historyGrid"></div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
const TIMER_SEC=45, CIRC=2*Math.PI*15;
const COLORS=['#c0392b','#c9a84c','#922b21','#a07830','#7f1d1d','#8b6914','#e74c3c','#d4a017','#6b1a1a','#b8952a'];

const BANK={
  1:{pilar:"Pancasila",topik:"Pancasila sebagai Dasar Negara dan Ideologi Bangsa",soal:[
    {no:1,pertanyaan:"Pancasila secara resmi ditetapkan sebagai dasar negara Indonesia pada tanggal...",opsi:{A:"1 Juni 1945",B:"17 Agustus 1945",C:"18 Agustus 1945",D:"22 Juni 1945"},jawaban:"C",penjelasan:"Pada 18 Agustus 1945, PPKI bersidang dan mengesahkan UUD 1945 sekaligus menetapkan Pancasila sebagai dasar negara."},
    {no:2,pertanyaan:"Rumusan Pancasila yang sah dan resmi terdapat dalam...",opsi:{A:"Piagam Jakarta",B:"Pembukaan UUD 1945 alinea keempat",C:"Batang Tubuh UUD 1945",D:"Dekret Presiden 5 Juli 1959"},jawaban:"B",penjelasan:"Rumusan resmi Pancasila tercantum dalam Pembukaan UUD 1945 alinea keempat yang mengikat secara hukum."},
    {no:3,pertanyaan:"Pancasila sebagai ideologi terbuka artinya...",opsi:{A:"Nilai-nilainya dapat diganti sewaktu-waktu",B:"Terbuka terhadap pengaruh ideologi asing sepenuhnya",C:"Nilai dasarnya tetap namun penjabarannya dapat berkembang sesuai zaman",D:"Siapa saja boleh menafsirkan Pancasila sesuai kepentingan"},jawaban:"C",penjelasan:"Ideologi terbuka berarti nilai dasar tetap, namun penjabarannya bisa berkembang mengikuti kebutuhan zaman."},
    {no:4,pertanyaan:"Sidang BPUPKI pertama yang membahas dasar negara berlangsung pada...",opsi:{A:"29 Mei – 1 Juni 1945",B:"10–16 Juli 1945",C:"17–18 Agustus 1945",D:"1–5 Maret 1945"},jawaban:"A",penjelasan:"Sidang BPUPKI pertama (29 Mei–1 Juni 1945) membahas dasar negara, puncaknya pidato Soekarno pada 1 Juni 1945."},
    {no:5,pertanyaan:"Tokoh yang menyampaikan pidato 'Lahirnya Pancasila' pada 1 Juni 1945 adalah...",opsi:{A:"Mohammad Hatta",B:"Soepomo",C:"Soekarno",D:"Muhammad Yamin"},jawaban:"C",penjelasan:"Soekarno menyampaikan pidato 'Lahirnya Pancasila' dalam sidang BPUPKI, mengusulkan lima sila sebagai dasar negara."},
    {no:6,pertanyaan:"Fungsi Pancasila sebagai Norma Dasar (Grundnorm) berarti...",opsi:{A:"Pancasila menjadi sumber dari segala sumber hukum negara",B:"Pancasila hanya berlaku di bidang hukum",C:"Norma hukum di bawah Pancasila boleh bertentangan dengannya",D:"Pancasila sama kedudukannya dengan UUD 1945"},jawaban:"A",penjelasan:"Sebagai Grundnorm, Pancasila menjadi sumber dari segala sumber hukum; seluruh peraturan harus selaras dengannya."},
    {no:7,pertanyaan:"Perbedaan ideologi terbuka dan ideologi tertutup terletak pada...",opsi:{A:"Jumlah silanya",B:"Sumber nilai dan kemampuan beradaptasi terhadap perubahan zaman",C:"Tingkat kekuatan militer suatu negara",D:"Bentuk pemerintahan yang dianut"},jawaban:"B",penjelasan:"Ideologi terbuka bersumber dari nilai hidup rakyat dan mampu beradaptasi; ideologi tertutup dogmatis dan dipaksakan."},
    {no:8,pertanyaan:"Pancasila digali dari nilai masyarakat Indonesia, sehingga Pancasila bersifat...",opsi:{A:"Impor dari luar negeri",B:"Ciptaan para pendiri negara semata",C:"Kepribadian dan pandangan hidup bangsa Indonesia",D:"Ideologi sementara yang bisa diubah"},jawaban:"C",penjelasan:"Pancasila merupakan kepribadian dan pandangan hidup bangsa yang digali dari nilai-nilai luhur yang sudah lama ada."},
    {no:9,pertanyaan:"Konsep Trisila yang diusulkan Soekarno mencakup...",opsi:{A:"Nasionalisme, Humanisme, Theisme",B:"Sosionasionalisme, Sosiodemokrasi, Ketuhanan",C:"Persatuan, Keadilan, Ketuhanan",D:"Demokrasi, Kebangsaan, Kesejahteraan"},jawaban:"B",penjelasan:"Trisila adalah penyederhanaan Pancasila: Sosionasionalisme, Sosiodemokrasi, dan Ketuhanan Yang Berkebudayaan."},
    {no:10,pertanyaan:"Alasan utama Piagam Jakarta tidak langsung dijadikan Pembukaan UUD 1945 adalah...",opsi:{A:"Piagam Jakarta terlalu panjang",B:"Sila pertama dianggap memaksakan agama tertentu dan mengancam persatuan",C:"Para pendiri negara tidak menyukai isinya",D:"Tidak memuat sila keadilan sosial"},jawaban:"B",penjelasan:"Tujuh kata sila pertama Piagam Jakarta dihapus karena dinilai memaksakan agama tertentu dan berpotensi memecah persatuan."},
    {no:11,pertanyaan:"Pancasila sebagai 'Weltanschauung' berarti Pancasila merupakan...",opsi:{A:"Hukum tertinggi negara",B:"Pandangan dunia/pandangan hidup bangsa",C:"Peraturan perundang-undangan",D:"Sistem ekonomi negara"},jawaban:"B",penjelasan:"Weltanschauung (Jerman) berarti pandangan dunia. Pancasila adalah pandangan hidup yang menjadi pedoman bangsa Indonesia."},
    {no:12,pertanyaan:"PPKI mengesahkan Pancasila sebagai dasar negara bersama dengan...",opsi:{A:"Proklamasi kemerdekaan",B:"Pengesahan UUD 1945",C:"Pembentukan TNI",D:"Pemilihan umum pertama"},jawaban:"B",penjelasan:"Pada 18 Agustus 1945, PPKI mengesahkan UUD 1945 sekaligus menetapkan Pancasila yang termuat dalam Pembukaan UUD 1945."},
    {no:13,pertanyaan:"Yang dimaksud nilai instrumental Pancasila adalah...",opsi:{A:"Nilai dasar yang bersifat abstrak dan umum",B:"Penjabaran nilai dasar dalam bentuk kebijakan dan peraturan konkret",C:"Nilai yang langsung diterapkan dalam kehidupan sehari-hari",D:"Nilai yang hanya berlaku untuk penyelenggara negara"},jawaban:"B",penjelasan:"Nilai instrumental adalah penjabaran nilai dasar Pancasila dalam bentuk kebijakan, peraturan, dan lembaga-lembaga negara yang konkret."},
    {no:14,pertanyaan:"Pancasila sebagai sumber dari segala sumber hukum diatur dalam...",opsi:{A:"UU No. 10 Tahun 2004",B:"UU No. 12 Tahun 2011",C:"Perpres No. 7 Tahun 2018",D:"TAP MPR No. III/MPR/2000"},jawaban:"B",penjelasan:"UU No. 12 Tahun 2011 tentang Pembentukan Peraturan Perundang-undangan menegaskan Pancasila sebagai sumber dari segala sumber hukum negara."},
    {no:15,pertanyaan:"Tokoh yang mengusulkan nama 'Pancasila' untuk dasar negara adalah...",opsi:{A:"Muhammad Yamin",B:"Soepomo",C:"Soekarno",D:"Mohammad Hatta"},jawaban:"C",penjelasan:"Soekarno yang pertama kali menyebut istilah 'Pancasila' dalam pidatonya 1 Juni 1945 sebagai nama bagi lima dasar negara."},
    {no:16,pertanyaan:"Nilai praksis Pancasila adalah...",opsi:{A:"Nilai dasar yang termuat dalam Pembukaan UUD 1945",B:"Nilai penjabaran dalam peraturan perundang-undangan",C:"Nilai yang diwujudkan dalam sikap dan perilaku nyata sehari-hari",D:"Nilai yang bersifat abstrak dan filosofis"},jawaban:"C",penjelasan:"Nilai praksis adalah pengamalan nyata Pancasila dalam kehidupan sehari-hari oleh setiap warga negara dan penyelenggara negara."},
    {no:17,pertanyaan:"Apa yang dimaksud dengan Pancasila sebagai 'jiwa bangsa Indonesia'?",opsi:{A:"Pancasila hanya untuk pemerintah",B:"Pancasila lahir bersama kelahiran bangsa Indonesia dan menjiwai seluruh aspek kehidupan",C:"Pancasila bersifat sementara",D:"Pancasila berasal dari luar negeri"},jawaban:"B",penjelasan:"Pancasila sebagai jiwa bangsa berarti Pancasila telah ada sejak bangsa Indonesia ada dan menjiwai seluruh aspek kehidupan bermasyarakat, berbangsa, dan bernegara."},
    {no:18,pertanyaan:"Sidang BPUPKI kedua membahas...",opsi:{A:"Dasar negara Indonesia",B:"Rancangan UUD dan batang tubuh negara",C:"Proklamasi kemerdekaan",D:"Pembentukan kabinet"},jawaban:"B",penjelasan:"Sidang BPUPKI kedua (10–17 Juli 1945) membahas rancangan UUD, batang tubuh, dan wilayah negara Indonesia merdeka."},

  2:{pilar:"Pancasila",topik:"Nilai-Nilai dan Pengamalan Sila-Sila Pancasila",soal:[

    {no:5,pertanyaan:"Sila Keempat mengandung prinsip pengambilan keputusan melalui...",opsi:{A:"Voting mutlak",B:"Keputusan sepihak pemimpin",C:"Musyawarah untuk mufakat",D:"Suara terbanyak tanpa musyawarah"},jawaban:"C",penjelasan:"Sila Keempat menekankan demokrasi musyawarah mufakat, mengutamakan hikmat kebijaksanaan di atas sekadar suara terbanyak."},
    {no:6,pertanyaan:"Perwujudan Sila Kelima dalam kebijakan ekonomi adalah...",opsi:{A:"Hanya mengutamakan investor asing",B:"Program pemerataan pembangunan ke seluruh wilayah Indonesia",C:"Kebebasan pasar tanpa regulasi",D:"Memusatkan kekayaan pada golongan tertentu"},jawaban:"B",penjelasan:"Sila Kelima menuntut keadilan sosial dan pemerataan pembangunan ke seluruh wilayah Indonesia, bukan hanya pusat."},
    {no:7,pertanyaan:"Hubungan antara sila-sila Pancasila bersifat...",opsi:{A:"Saling bertentangan",B:"Terpisah satu sama lain",C:"Hierarkis piramidal dan organis",D:"Tidak memiliki keterkaitan"},jawaban:"C",penjelasan:"Sila-sila Pancasila membentuk satu kesatuan organis hierarkis piramidal, saling mengandaikan dan menguatkan."},
    {no:8,pertanyaan:"Kepala banteng dalam lambang Garuda melambangkan sila ke...",opsi:{A:"3",B:"4",C:"5",D:"2"},jawaban:"B",penjelasan:"Kepala banteng melambangkan Sila Keempat. Banteng adalah hewan sosial yang menggambarkan semangat musyawarah dan kerakyatan."},
    {no:9,pertanyaan:"Sikap BERTENTANGAN dengan Sila Keempat Pancasila adalah...",opsi:{A:"Mengikuti hasil musyawarah",B:"Menghargai pendapat orang lain",C:"Memaksakan kehendak pribadi dalam rapat",D:"Mengutamakan kepentingan bersama"},jawaban:"C",penjelasan:"Memaksakan kehendak pribadi bertentangan dengan Sila Keempat yang mengamanatkan musyawarah mufakat."},
    {no:10,pertanyaan:"'Dengan iktikad yang baik menerima dan melaksanakan hasil keputusan musyawarah' merupakan pengamalan sila ke...",opsi:{A:"2",B:"3",C:"4",D:"5"},jawaban:"C",penjelasan:"Menerima dan melaksanakan hasil musyawarah dengan iktikad baik adalah butir pengamalan Sila Keempat."},
    {no:11,pertanyaan:"Rantai emas dalam lambang Garuda Pancasila melambangkan sila ke...",opsi:{A:"1",B:"2",C:"3",D:"4"},jawaban:"B",penjelasan:"Rantai emas melambangkan Sila Kedua 'Kemanusiaan yang Adil dan Beradab'. Rantai menggambarkan ikatan kemanusiaan yang kuat."},
    {no:12,pertanyaan:"Pohon beringin dalam lambang Garuda Pancasila melambangkan sila ke...",opsi:{A:"2",B:"3",C:"4",D:"5"},jawaban:"B",penjelasan:"Pohon beringin melambangkan Sila Ketiga 'Persatuan Indonesia'. Pohon besar dengan akar kuat melambangkan persatuan bangsa."},
    {no:13,pertanyaan:"Padi dan kapas dalam lambang Garuda Pancasila melambangkan sila ke...",opsi:{A:"3",B:"4",C:"5",D:"1"},jawaban:"C",penjelasan:"Padi dan kapas melambangkan Sila Kelima 'Keadilan Sosial bagi Seluruh Rakyat Indonesia', yaitu kemakmuran dan kesejahteraan."},
    {no:14,pertanyaan:"Saling menghormati perbedaan pendapat dalam forum diskusi merupakan pengamalan sila ke...",opsi:{A:"2",B:"3",C:"4",D:"5"},jawaban:"C",penjelasan:"Menghormati perbedaan pendapat dalam forum diskusi merupakan pengamalan Sila Keempat yang menekankan musyawarah demokratis."},
    {no:15,pertanyaan:"Memberikan bantuan kepada korban bencana tanpa memandang suku dan agama merupakan pengamalan sila ke...",opsi:{A:"1",B:"2",C:"3",D:"5"},jawaban:"B",penjelasan:"Membantu sesama tanpa diskriminasi adalah wujud pengamalan Sila Kedua 'Kemanusiaan yang Adil dan Beradab'."},
    {no:16,pertanyaan:"Cinta produk dalam negeri dan memakai batik merupakan pengamalan sila ke...",opsi:{A:"2",B:"3",C:"4",D:"5"},jawaban:"B",penjelasan:"Mencintai produk dalam negeri dan batik sebagai warisan budaya merupakan pengamalan Sila Ketiga 'Persatuan Indonesia'."},
    {no:17,pertanyaan:"Taat membayar pajak tepat waktu merupakan pengamalan sila ke...",opsi:{A:"3",B:"4",C:"5",D:"1"},jawaban:"C",penjelasan:"Membayar pajak merupakan bentuk tanggung jawab warga negara untuk mewujudkan keadilan sosial, yang merupakan pengamalan Sila Kelima."},
    {no:18,pertanyaan:"Nilai dasar Pancasila bersifat...",opsi:{A:"Relatif dan dapat berubah",B:"Absolut, tetap, dan tidak dapat diubah",C:"Hanya berlaku untuk penguasa",D:"Disesuaikan dengan kepentingan politik"},jawaban:"B",penjelasan:"Nilai dasar Pancasila bersifat absolut dan tetap, tidak dapat diubah karena merupakan fondasi bangsa yang digali dari nilai luhur masyarakat Indonesia."},
    {no:19,pertanyaan:"Mendahulukan kepentingan umum di atas kepentingan pribadi merupakan pengamalan sila ke...",opsi:{A:"2",B:"3",C:"4",D:"5"},jawaban:"B",penjelasan:"Mendahulukan kepentingan umum adalah pengamalan Sila Ketiga yang mengutamakan persatuan dan kepentingan bangsa di atas kepentingan pribadi."},
    {no:20,pertanyaan:"Beribadah sesuai keyakinan tanpa mengganggu orang lain adalah pengamalan sila ke...",opsi:{A:"1",B:"2",C:"3",D:"4"},jawaban:"A",penjelasan:"Beribadah sesuai keyakinan sendiri tanpa mengganggu orang lain merupakan pengamalan Sila Pertama 'Ketuhanan Yang Maha Esa'."}
  ]},
  3:{pilar:"UUD 1945",topik:"Sejarah Perumusan dan Penetapan UUD 1945",soal:[
    {no:1,pertanyaan:"Badan yang bertugas merumuskan UUD 1945 sebelum kemerdekaan adalah...",opsi:{A:"KNIP",B:"BPUPKI",C:"PPKI",D:"DPR"},jawaban:"B",penjelasan:"BPUPKI (Badan Penyelidik Usaha-Usaha Persiapan Kemerdekaan Indonesia) bertugas mempersiapkan kemerdekaan termasuk merumuskan UUD."},
    {no:2,pertanyaan:"UUD 1945 disahkan oleh PPKI pada tanggal...",opsi:{A:"17 Agustus 1945",B:"18 Agustus 1945",C:"19 Agustus 1945",D:"1 Juni 1945"},jawaban:"B",penjelasan:"PPKI mengesahkan UUD 1945 pada 18 Agustus 1945, sehari setelah proklamasi, sekaligus memilih Soekarno-Hatta sebagai presiden dan wapres."},
    {no:3,pertanyaan:"Sidang BPUPKI kedua yang membahas rancangan UUD berlangsung pada...",opsi:{A:"29 Mei – 1 Juni 1945",B:"10–17 Juli 1945",C:"18–20 Agustus 1945",D:"1–7 September 1945"},jawaban:"B",penjelasan:"Sidang BPUPKI kedua (10–17 Juli 1945) membahas rancangan UUD, batang tubuh, dan wilayah negara Indonesia merdeka."},
    {no:4,pertanyaan:"Dekret Presiden 5 Juli 1959 menyatakan berlakunya kembali UUD 1945 karena...",opsi:{A:"Konstituante berhasil merumuskan UUD baru",B:"Konstituante gagal merumuskan UUD baru dalam waktu yang ditentukan",C:"Permintaan rakyat melalui referendum",D:"Keputusan MPR"},jawaban:"B",penjelasan:"Konstituante gagal merumuskan UUD baru. Soekarno mengeluarkan Dekret 5 Juli 1959 untuk kembali ke UUD 1945 demi mengatasi kebuntuan."},
    {no:5,pertanyaan:"UUD 1945 pernah digantikan Konstitusi RIS pada periode...",opsi:{A:"1945–1949",B:"1949–1950",C:"1950–1959",D:"1959–1966"},jawaban:"B",penjelasan:"Konstitusi RIS berlaku 27 Desember 1949–17 Agustus 1950, saat Indonesia berbentuk negara federal Republik Indonesia Serikat."},
    {no:6,pertanyaan:"Amandemen UUD 1945 dilakukan berapa kali pada era reformasi?",opsi:{A:"2 kali",B:"3 kali",C:"4 kali",D:"5 kali"},jawaban:"C",penjelasan:"UUD 1945 diamandemen empat kali: I (1999), II (2000), III (2001), IV (2002), menghasilkan reformasi kelembagaan signifikan."},
    {no:7,pertanyaan:"Amandemen pertama UUD 1945 dilakukan pada tahun...",opsi:{A:"1998",B:"1999",C:"2000",D:"2001"},jawaban:"B",penjelasan:"Amandemen pertama UUD 1945 dilakukan Oktober 1999 dalam Sidang Umum MPR, fokus pada pembatasan kekuasaan presiden."},
    {no:8,pertanyaan:"Perubahan penting dalam amandemen UUD 1945 adalah...",opsi:{A:"Penghapusan pasal tentang HAM",B:"Penambahan lembaga MPR",C:"Pembatasan masa jabatan presiden maksimal dua periode",D:"Penghapusan Mahkamah Agung"},jawaban:"C",penjelasan:"Amandemen membatasi masa jabatan presiden maksimal dua periode (5 tahun/periode) untuk mencegah kekuasaan yang terlalu lama."},
    {no:9,pertanyaan:"UUDS 1950 berlaku pada periode...",opsi:{A:"17 Agustus – 27 Desember 1949",B:"27 Desember 1949 – 17 Agustus 1950",C:"17 Agustus 1950 – 5 Juli 1959",D:"5 Juli 1959 – 1966"},jawaban:"C",penjelasan:"UUDS 1950 berlaku 17 Agustus 1950 – 5 Juli 1959, menandai kembalinya Indonesia menjadi negara kesatuan dari bentuk RIS."},
    {no:10,pertanyaan:"Lembaga yang berwenang mengubah UUD 1945 adalah...",opsi:{A:"DPR",B:"Presiden",C:"MPR",D:"Mahkamah Konstitusi"},jawaban:"C",penjelasan:"Pasal 37 UUD 1945 menetapkan MPR sebagai satu-satunya lembaga yang berwenang mengubah UUD 1945 dengan syarat quorum tertentu."},
    {no:11,pertanyaan:"Panitia Sembilan yang merumuskan Piagam Jakarta diketuai oleh...",opsi:{A:"Mohammad Hatta",B:"Soepomo",C:"Soekarno",D:"Muhammad Yamin"},jawaban:"C",penjelasan:"Panitia Sembilan dibentuk BPUPKI dengan ketua Soekarno. Panitia ini menghasilkan Piagam Jakarta pada 22 Juni 1945."},
    {no:12,pertanyaan:"Piagam Jakarta ditandatangani pada tanggal...",opsi:{A:"1 Juni 1945",B:"22 Juni 1945",C:"17 Agustus 1945",D:"18 Agustus 1945"},jawaban:"B",penjelasan:"Piagam Jakarta ditandatangani oleh Panitia Sembilan pada 22 Juni 1945 sebagai kompromi antara kelompok nasionalis dan Islam."},
    {no:13,pertanyaan:"Berapa jumlah anggota PPKI yang mengesahkan UUD 1945?",opsi:{A:"9 orang",B:"12 orang",C:"21 orang",D:"27 orang"},jawaban:"C",penjelasan:"PPKI memiliki 21 anggota yang mewakili berbagai daerah dan golongan di Indonesia. Sidangnya pada 18 Agustus 1945 mengesahkan UUD 1945."},
    {no:14,pertanyaan:"Sistem pemerintahan yang dianut UUDS 1950 adalah...",opsi:{A:"Presidensial",B:"Parlementer",C:"Semi presidensial",D:"Monarki konstitusional"},jawaban:"B",penjelasan:"UUDS 1950 menerapkan sistem parlementer, di mana kabinet bertanggung jawab kepada parlemen sehingga sering terjadi pergantian kabinet."},
    {no:15,pertanyaan:"Amandemen keempat UUD 1945 dilaksanakan pada tahun...",opsi:{A:"2000",B:"2001",C:"2002",D:"2003"},jawaban:"C",penjelasan:"Amandemen keempat UUD 1945 dilakukan pada Sidang Tahunan MPR tahun 2002, melengkapi tiga amandemen sebelumnya."},
    {no:16,pertanyaan:"Sebelum amandemen, berapa pasal yang dimiliki UUD 1945?",opsi:{A:"27 pasal",B:"37 pasal",C:"45 pasal",D:"55 pasal"},jawaban:"B",penjelasan:"UUD 1945 sebelum amandemen memiliki 37 pasal, ditambah Pembukaan dan Penjelasan. Setelah amandemen menjadi 73 pasal."},
    {no:17,pertanyaan:"Latar belakang utama amandemen UUD 1945 pada era reformasi adalah...",opsi:{A:"Desakan negara asing",B:"Keinginan membangun sistem yang lebih demokratis dan mencegah penyalahgunaan kekuasaan",C:"Keputusan Mahkamah Agung",D:"Hasil pemilihan umum"},jawaban:"B",penjelasan:"Amandemen UUD 1945 pada era reformasi didorong keinginan membangun sistem yang lebih demokratis dan mencegah penyalahgunaan kekuasaan seperti pada era Orde Baru."},
    {no:18,pertanyaan:"Konstitusi mana yang pernah berlaku di Indonesia namun paling singkat?",opsi:{A:"UUD 1945",B:"Konstitusi RIS",C:"UUDS 1950",D:"Amandemen UUD 1945"},jawaban:"B",penjelasan:"Konstitusi RIS hanya berlaku sekitar 8 bulan (27 Desember 1949 – 17 Agustus 1950), merupakan konstitusi dengan masa berlaku paling singkat."},
    {no:19,pertanyaan:"Panitia Perancang UUD yang dibentuk pada sidang BPUPKI kedua diketuai oleh...",opsi:{A:"Mohammad Hatta",B:"Soepomo",C:"Soekarno",D:"Muhammad Yamin"},jawaban:"C",penjelasan:"Panitia Perancang UUD dibentuk dalam sidang BPUPKI kedua dengan ketua Soekarno untuk menyusun rancangan UUD secara lebih detail."},
    {no:20,pertanyaan:"Periode berlakunya UUD 1945 untuk pertama kalinya (sebelum RIS) adalah...",opsi:{A:"1945–1949",B:"1945–1950",C:"1945–1959",D:"1945–1966"},jawaban:"A",penjelasan:"UUD 1945 pertama kali berlaku dari 18 Agustus 1945 hingga 27 Desember 1949, ketika digantikan Konstitusi RIS setelah pengakuan kedaulatan."}
  ]},
  4:{pilar:"UUD 1945",topik:"Hak dan Kewajiban Warga Negara dalam UUD 1945",soal:[
    {no:1,pertanyaan:"Pasal UUD 1945 yang mengatur hak atas pendidikan adalah...",opsi:{A:"Pasal 27",B:"Pasal 28C",C:"Pasal 31",D:"Pasal 34"},jawaban:"C",penjelasan:"Pasal 31 mengatur hak dan kewajiban warga negara di bidang pendidikan, termasuk kewajiban mengikuti pendidikan dasar."},
    {no:2,pertanyaan:"Hak warga negara mendapat pekerjaan dan penghidupan yang layak diatur dalam...",opsi:{A:"Pasal 26",B:"Pasal 27 ayat 2",C:"Pasal 28",D:"Pasal 30"},jawaban:"B",penjelasan:"Pasal 27 ayat (2) menjamin setiap warga negara berhak atas pekerjaan dan penghidupan yang layak bagi kemanusiaan."},
    {no:3,pertanyaan:"Kewajiban membela negara diatur dalam Pasal...",opsi:{A:"27 ayat 1",B:"27 ayat 3",C:"28J",D:"30 ayat 1"},jawaban:"D",penjelasan:"Pasal 30 ayat (1) menyatakan tiap-tiap warga negara berhak dan wajib ikut serta dalam usaha pertahanan dan keamanan negara."},
    {no:4,pertanyaan:"Pasal 28A UUD 1945 menjamin hak...",opsi:{A:"Berserikat dan berkumpul",B:"Hidup dan mempertahankan kehidupan",C:"Mendapat pendidikan",D:"Mendapat pekerjaan"},jawaban:"B",penjelasan:"Pasal 28A menjamin hak paling mendasar yaitu hak untuk hidup serta berhak mempertahankan hidup dan kehidupannya."},
    {no:5,pertanyaan:"Hak yang tidak dapat dikurangi dalam keadaan apapun (non-derogable rights) meliputi...",opsi:{A:"Hak berpendapat dan hak bekerja",B:"Hak hidup, hak bebas dari penyiksaan, hak beragama",C:"Hak memilih dan hak dipilih",D:"Hak mendapat gaji dan hak cuti"},jawaban:"B",penjelasan:"Non-derogable rights tidak boleh dikurangi dalam kondisi apapun, termasuk keadaan darurat, meliputi hak hidup, bebas dari penyiksaan, dan hak beragama."},
    {no:6,pertanyaan:"Kewajiban membayar pajak diatur dalam Pasal...",opsi:{A:"23A",B:"27 ayat 1",C:"30",D:"31"},jawaban:"A",penjelasan:"Pasal 23A UUD 1945 menjadi landasan konstitusional kewajiban membayar pajak yang diatur lebih lanjut dengan undang-undang."},
    {no:7,pertanyaan:"Pasal 28J ayat 1 menyatakan setiap orang wajib...",opsi:{A:"Membayar pajak",B:"Menghormati hak asasi manusia orang lain",C:"Mengikuti wajib militer",D:"Mendukung pemerintah"},jawaban:"B",penjelasan:"Pasal 28J ayat (1) mewajibkan setiap orang menghormati HAM orang lain dalam tertib kehidupan bermasyarakat, berbangsa, dan bernegara."},
    {no:8,pertanyaan:"Pasal 28E UUD 1945 menjamin hak...",opsi:{A:"Hak mendapat pengajaran",B:"Hak atas pekerjaan",C:"Hak memilih agama, kewarganegaraan, dan berpendapat",D:"Hak atas jaminan sosial"},jawaban:"C",penjelasan:"Pasal 28E menjamin kebebasan memilih agama, kewarganegaraan, tempat tinggal, serta kebebasan berserikat, berkumpul, dan berpendapat."},
    {no:9,pertanyaan:"Persamaan kedudukan warga negara di hadapan hukum diatur dalam Pasal...",opsi:{A:"26",B:"27 ayat 1",C:"28D ayat 1",D:"30"},jawaban:"B",penjelasan:"Pasal 27 ayat (1) menjamin persamaan kedudukan semua warga negara di hadapan hukum dan pemerintahan tanpa pengecualian."},
    {no:10,pertanyaan:"Perbedaan HAM dan hak warga negara terletak pada...",opsi:{A:"HAM berlaku untuk semua manusia, hak warga negara hanya untuk warga negara tertentu",B:"HAM bisa dicabut, hak warga negara tidak",C:"Hak warga negara lebih tinggi dari HAM",D:"Tidak ada perbedaan"},jawaban:"A",penjelasan:"HAM melekat pada setiap manusia sejak lahir tanpa memandang kewarganegaraan, sedangkan hak warga negara hanya untuk warga negara tertentu."},
    {no:11,pertanyaan:"Hak memperoleh jaminan sosial diatur dalam Pasal...",opsi:{A:"28B",B:"28H",C:"28I",D:"28J"},jawaban:"B",penjelasan:"Pasal 28H ayat (3) menyatakan setiap orang berhak atas jaminan sosial yang memungkinkan pengembangan dirinya secara utuh."},
    {no:12,pertanyaan:"Hak atas pengakuan, jaminan, perlindungan, dan kepastian hukum yang adil diatur dalam Pasal...",opsi:{A:"28C",B:"28D",C:"28E",D:"28F"},jawaban:"B",penjelasan:"Pasal 28D ayat (1) menjamin hak setiap orang atas pengakuan, jaminan, perlindungan, dan kepastian hukum yang adil serta perlakuan yang sama di hadapan hukum."},
    {no:13,pertanyaan:"Kewajiban mengikuti pendidikan dasar diatur dalam Pasal...",opsi:{A:"31 ayat 1",B:"31 ayat 2",C:"28C",D:"27 ayat 2"},jawaban:"B",penjelasan:"Pasal 31 ayat (2) mewajibkan setiap warga negara mengikuti pendidikan dasar, dan pemerintah wajib membiayainya."},
    {no:14,pertanyaan:"Hak warga negara untuk memperoleh kesempatan yang sama dalam pemerintahan diatur dalam...",opsi:{A:"Pasal 27 ayat 1",B:"Pasal 28D ayat 3",C:"Pasal 28E",D:"Pasal 30"},jawaban:"B",penjelasan:"Pasal 28D ayat (3) menjamin setiap warga negara berhak memperoleh kesempatan yang sama dalam pemerintahan."},
    {no:15,pertanyaan:"Hak bebas dari perlakuan diskriminatif dijamin oleh Pasal...",opsi:{A:"28A",B:"28C",C:"28I ayat 2",D:"28J"},jawaban:"C",penjelasan:"Pasal 28I ayat (2) menyatakan setiap orang berhak bebas dari perlakuan yang bersifat diskriminatif atas dasar apapun."},
    {no:16,pertanyaan:"Kewajiban menjunjung tinggi hukum dan pemerintahan diatur dalam...",opsi:{A:"Pasal 26",B:"Pasal 27 ayat 1",C:"Pasal 28J",D:"Pasal 30"},jawaban:"B",penjelasan:"Pasal 27 ayat (1) menyatakan setiap warga negara wajib menjunjung hukum dan pemerintahan dengan tidak ada kecualinya."},
    {no:17,pertanyaan:"Hak atas identitas budaya dan hak masyarakat tradisional dijamin oleh Pasal...",opsi:{A:"28B",B:"28C",C:"28I ayat 3",D:"28H"},jawaban:"C",penjelasan:"Pasal 28I ayat (3) menjamin identitas budaya dan hak masyarakat tradisional dihormati selaras dengan perkembangan zaman dan peradaban."},
    {no:18,pertanyaan:"Hak anak untuk kelangsungan hidup, tumbuh, dan berkembang dijamin oleh Pasal...",opsi:{A:"28B ayat 2",B:"28C",C:"28D",D:"28E"},jawaban:"A",penjelasan:"Pasal 28B ayat (2) menyatakan setiap anak berhak atas kelangsungan hidup, tumbuh, dan berkembang serta perlindungan dari kekerasan dan diskriminasi."},
    {no:19,pertanyaan:"Hak setiap warga negara untuk memilih tempat tinggal di wilayah Indonesia dijamin dalam Pasal...",opsi:{A:"28A",B:"28E ayat 1",C:"28G",D:"28H"},jawaban:"B",penjelasan:"Pasal 28E ayat (1) menjamin hak setiap orang untuk memilih tempat tinggal di wilayah negara dan meninggalkannya, serta berhak kembali."},
    {no:20,pertanyaan:"Kewajiban negara dalam bidang pendidikan adalah...",opsi:{A:"Menyelenggarakan pendidikan hanya untuk golongan tertentu",B:"Membiayai pendidikan dasar bagi seluruh warga negara",C:"Mewajibkan pendidikan tinggi bagi semua warga",D:"Menyerahkan pendidikan sepenuhnya kepada swasta"},jawaban:"B",penjelasan:"Pasal 31 ayat (2) mewajibkan pemerintah membiayai pendidikan dasar. Negara bertanggung jawab memastikan akses pendidikan dasar bagi seluruh warga."}
  ]},
  5:{pilar:"UUD 1945",topik:"Lembaga-Lembaga Negara berdasarkan UUD 1945",soal:[
    {no:1,pertanyaan:"Setelah amandemen, presiden dan wakil presiden dipilih oleh...",opsi:{A:"MPR",B:"DPR",C:"Rakyat secara langsung",D:"Mahkamah Agung"},jawaban:"C",penjelasan:"Amandemen ketiga mengubah pemilihan presiden menjadi langsung oleh rakyat, pertama kali dilaksanakan pada Pemilu 2004."},
    {no:2,pertanyaan:"Lembaga yang berwenang menguji undang-undang terhadap UUD 1945 adalah...",opsi:{A:"Mahkamah Agung",B:"Komisi Yudisial",C:"Mahkamah Konstitusi",D:"DPR"},jawaban:"C",penjelasan:"Mahkamah Konstitusi (MK) berwenang melakukan judicial review, yaitu menguji undang-undang terhadap UUD 1945."},
    {no:3,pertanyaan:"BPK bertugas...",opsi:{A:"Menetapkan APBN",B:"Memeriksa pengelolaan dan tanggung jawab keuangan negara",C:"Mengadili sengketa pemilu",D:"Memberikan pertimbangan kepada presiden"},jawaban:"B",penjelasan:"BPK (Badan Pemeriksa Keuangan) adalah lembaga independen yang memeriksa pengelolaan dan tanggung jawab keuangan negara."},
    {no:4,pertanyaan:"Setelah amandemen, MPR terdiri dari...",opsi:{A:"DPR dan DPD",B:"DPR dan utusan golongan",C:"DPR, DPD, dan utusan daerah",D:"DPR saja"},jawaban:"A",penjelasan:"Setelah amandemen, MPR terdiri dari DPR dan DPD. Utusan golongan dihapus sehingga semua anggota MPR merupakan hasil pemilihan rakyat."},
    {no:5,pertanyaan:"Komisi Yudisial berwenang untuk...",opsi:{A:"Membuat undang-undang",B:"Mengusulkan pengangkatan hakim agung dan menjaga kehormatan hakim",C:"Mengadili perkara pidana",D:"Menguji peraturan daerah"},jawaban:"B",penjelasan:"Komisi Yudisial berwenang mengusulkan pengangkatan hakim agung dan menjaga kehormatan, keluhuran martabat, serta perilaku hakim."},
    {no:6,pertanyaan:"DPD dibentuk melalui amandemen UUD 1945 yang ke...",opsi:{A:"Pertama",B:"Kedua",C:"Ketiga",D:"Keempat"},jawaban:"C",penjelasan:"DPD dibentuk melalui amandemen ketiga UUD 1945 (2001). Anggotanya dipilih langsung dari setiap provinsi untuk mewakili kepentingan daerah."},
    {no:7,pertanyaan:"Kewenangan DPR dalam bidang legislasi adalah...",opsi:{A:"Menetapkan peraturan pemerintah",B:"Membentuk undang-undang bersama presiden",C:"Membuat peraturan daerah",D:"Mengeluarkan dekret"},jawaban:"B",penjelasan:"Pasal 20 UUD 1945 menyatakan DPR memegang kekuasaan membentuk undang-undang bersama presiden."},
    {no:8,pertanyaan:"Presiden memegang kekuasaan...",opsi:{A:"Legislatif",B:"Yudikatif",C:"Eksekutif",D:"Legislatif dan Eksekutif"},jawaban:"C",penjelasan:"Presiden memegang kekuasaan eksekutif dalam sistem presidensial Indonesia sebagaimana diatur UUD 1945."},
    {no:9,pertanyaan:"Jumlah hakim Mahkamah Konstitusi adalah...",opsi:{A:"5 orang",B:"7 orang",C:"9 orang",D:"11 orang"},jawaban:"C",penjelasan:"MK terdiri dari 9 hakim konstitusi: 3 diajukan DPR, 3 diajukan presiden, dan 3 diajukan Mahkamah Agung."},
    {no:10,pertanyaan:"DPR dapat memberhentikan presiden melalui mekanisme...",opsi:{A:"Interpelasi",B:"Hak angket",C:"Pemakzulan (impeachment)",D:"Mosi tidak percaya"},jawaban:"C",penjelasan:"Pemakzulan adalah proses pemberhentian presiden melalui DPR, kemudian MK memeriksa, dan MPR yang memutuskan."},
    {no:11,pertanyaan:"Lembaga negara yang bertugas mengawasi perilaku hakim adalah...",opsi:{A:"Mahkamah Agung",B:"Mahkamah Konstitusi",C:"Komisi Yudisial",D:"DPR"},jawaban:"C",penjelasan:"Komisi Yudisial bertugas menjaga kehormatan, keluhuran martabat, dan perilaku hakim agar peradilan tetap bersih dan berwibawa."},
    {no:12,pertanyaan:"Fungsi DPR yang berkaitan dengan pengawasan pemerintah adalah...",opsi:{A:"Fungsi legislasi",B:"Fungsi anggaran",C:"Fungsi pengawasan",D:"Fungsi yudisial"},jawaban:"C",penjelasan:"DPR memiliki tiga fungsi utama: legislasi (membuat UU), anggaran (menetapkan APBN), dan pengawasan (mengawasi pelaksanaan UU dan kebijakan pemerintah)."},
    {no:13,pertanyaan:"Kewenangan MK selain judicial review adalah...",opsi:{A:"Membubarkan partai politik dan memutus sengketa pemilu",B:"Membuat undang-undang",C:"Mengangkat hakim agung",D:"Mengawasi keuangan negara"},jawaban:"A",penjelasan:"MK berwenang: menguji UU terhadap UUD, memutus sengketa kewenangan lembaga negara, membubarkan partai politik, dan memutus perselisihan hasil pemilu."},
    {no:14,pertanyaan:"Lembaga negara yang berfungsi sebagai penyalur aspirasi daerah di tingkat nasional adalah...",opsi:{A:"DPR",B:"MPR",C:"DPD",D:"DPRD"},jawaban:"C",penjelasan:"DPD (Dewan Perwakilan Daerah) dibentuk khusus untuk menyalurkan aspirasi dan kepentingan daerah dalam kebijakan nasional."},
    {no:15,pertanyaan:"Presiden sebagai kepala negara berwenang menerima...",opsi:{A:"Anggaran negara",B:"Duta besar dan konsul negara asing",C:"Laporan BPK",D:"Rancangan undang-undang dari DPD"},jawaban:"B",penjelasan:"Sebagai kepala negara, presiden berwenang menerima penempatan duta besar negara lain setelah memperhatikan pertimbangan DPR."},
    {no:16,pertanyaan:"Lembaga peradilan tertinggi dalam perkara kasasi di Indonesia adalah...",opsi:{A:"Mahkamah Konstitusi",B:"Komisi Yudisial",C:"Mahkamah Agung",D:"Pengadilan Tinggi"},jawaban:"C",penjelasan:"Mahkamah Agung (MA) adalah lembaga peradilan tertinggi yang berwenang mengadili perkara kasasi dan menguji peraturan di bawah undang-undang."},
    {no:17,pertanyaan:"Siapa yang berwenang menetapkan APBN?",opsi:{A:"Presiden bersama DPR",B:"DPR saja",C:"Presiden saja",D:"MPR"},jawaban:"A",penjelasan:"Pasal 23 UUD 1945 menyatakan APBN ditetapkan setiap tahun dengan undang-undang bersama antara presiden dan DPR."},
    {no:18,pertanyaan:"Hak DPR untuk meminta keterangan kepada pemerintah terkait kebijakan penting disebut hak...",opsi:{A:"Angket",B:"Interpelasi",C:"Menyatakan pendapat",D:"Imunitas"},jawaban:"B",penjelasan:"Hak interpelasi adalah hak DPR untuk meminta keterangan kepada pemerintah mengenai kebijakan penting yang berdampak luas."},
    {no:19,pertanyaan:"Lembaga negara mana yang berwenang mengangkat dan memberhentikan menteri?",opsi:{A:"DPR",B:"MPR",C:"Presiden",D:"Mahkamah Agung"},jawaban:"C",penjelasan:"Berdasarkan Pasal 17 UUD 1945, presiden berwenang mengangkat dan memberhentikan menteri-menteri negara yang membantunya."},
    {no:20,pertanyaan:"Kewenangan DPD terbatas pada hal-hal yang berkaitan dengan...",opsi:{A:"Semua undang-undang",B:"Otonomi daerah, hubungan pusat dan daerah, SDA, dan perimbangan keuangan",C:"Kebijakan luar negeri",D:"Pertahanan dan keamanan"},jawaban:"B",penjelasan:"DPD berwenang mengajukan RUU dan memberi pertimbangan terkait otonomi daerah, hubungan pusat-daerah, SDA, dan perimbangan keuangan pusat-daerah."}
  ]},
  6:{pilar:"NKRI",topik:"Konsep dan Hakikat Negara Kesatuan Republik Indonesia",soal:[
    {no:1,pertanyaan:"Bentuk negara Indonesia berdasarkan Pasal 1 ayat 1 UUD 1945 adalah...",opsi:{A:"Negara serikat",B:"Negara konfederasi",C:"Negara kesatuan",D:"Negara federal"},jawaban:"C",penjelasan:"Pasal 1 ayat (1) UUD 1945 secara tegas menyatakan Indonesia adalah negara kesatuan yang berbentuk republik."},
    {no:2,pertanyaan:"Ciri utama negara kesatuan yang membedakannya dari negara federal adalah...",opsi:{A:"Memiliki konstitusi",B:"Hanya ada satu pemerintahan pusat yang berdaulat",C:"Memiliki parlemen",D:"Menggunakan sistem presidensial"},jawaban:"B",penjelasan:"Dalam negara kesatuan hanya ada satu pemerintahan pusat yang berdaulat, berbeda dengan negara federal yang membagi kedaulatan."},
    {no:3,pertanyaan:"NKRI diproklamasikan pada tanggal...",opsi:{A:"1 Juni 1945",B:"18 Agustus 1945",C:"17 Agustus 1945",D:"27 Desember 1949"},jawaban:"C",penjelasan:"Proklamasi Kemerdekaan Indonesia dibacakan Soekarno-Hatta pada 17 Agustus 1945, menandai lahirnya NKRI."},
    {no:4,pertanyaan:"Sistem pemerintahan yang dianut Indonesia adalah...",opsi:{A:"Parlementer",B:"Presidensial",C:"Monarki konstitusional",D:"Semi presidensial"},jawaban:"B",penjelasan:"Indonesia menganut sistem presidensial di mana presiden adalah kepala negara sekaligus kepala pemerintahan, tidak bertanggung jawab kepada parlemen."},
    {no:5,pertanyaan:"Kedaulatan NKRI berada di tangan...",opsi:{A:"Presiden",B:"MPR",C:"Rakyat dan dilaksanakan menurut UUD",D:"DPR"},jawaban:"C",penjelasan:"Pasal 1 ayat (2) UUD 1945 hasil amandemen: 'Kedaulatan berada di tangan rakyat dan dilaksanakan menurut Undang-Undang Dasar.'"},
    {no:6,pertanyaan:"Indonesia pernah berbentuk negara federal saat berlakunya...",opsi:{A:"UUD 1945 periode pertama",B:"Konstitusi RIS",C:"UUDS 1950",D:"Amandemen UUD 1945"},jawaban:"B",penjelasan:"Konstitusi RIS (27 Desember 1949–17 Agustus 1950) mengatur Indonesia sebagai negara federal dengan beberapa negara bagian."},
    {no:7,pertanyaan:"Ancaman nirmiliter terhadap keutuhan NKRI antara lain...",opsi:{A:"Invasi militer asing",B:"Pemberontakan bersenjata",C:"Radikalisme dan separatisme melalui propaganda",D:"Serangan udara"},jawaban:"C",penjelasan:"Ancaman nirmiliter tidak menggunakan senjata namun melalui ideologi, propaganda, atau gerakan separatisme yang dapat merusak persatuan."},
    {no:8,pertanyaan:"Wilayah NKRI mencakup...",opsi:{A:"Hanya daratan",B:"Daratan dan lautan saja",C:"Daratan, lautan, dan udara di atasnya",D:"Daratan sesuai perjanjian kolonial saja"},jawaban:"C",penjelasan:"Wilayah NKRI mencakup tiga dimensi: daratan, lautan (perairan teritorial dan ZEE), dan ruang udara di atasnya."},
    {no:9,pertanyaan:"Integrasi nasional berarti...",opsi:{A:"Penyeragaman semua suku dan budaya",B:"Proses menyatukan perbedaan menjadi satu kesatuan yang utuh",C:"Penghapusan bahasa daerah",D:"Dominasi satu kelompok atas kelompok lain"},jawaban:"B",penjelasan:"Integrasi nasional adalah proses mempersatukan berbagai perbedaan menjadi satu kesatuan bangsa yang utuh tanpa menghapus keberagaman."},
    {no:10,pertanyaan:"Warga negara dapat menjaga keutuhan NKRI dengan cara...",opsi:{A:"Memisahkan diri dari kelompok lain",B:"Menolak semua budaya daerah",C:"Menghargai perbedaan dan aktif dalam bela negara",D:"Hanya mematuhi hukum adat"},jawaban:"C",penjelasan:"Bela negara tidak hanya angkat senjata. Menghargai perbedaan, menjaga persatuan, dan berpartisipasi aktif dalam pembangunan juga merupakan bela negara."},
    {no:11,pertanyaan:"Salah satu faktor penghambat integrasi nasional adalah...",opsi:{A:"Rasa cinta tanah air yang tinggi",B:"Semangat gotong royong",C:"Fanatisme sempit dan primordialisme berlebihan",D:"Penggunaan bahasa Indonesia"},jawaban:"C",penjelasan:"Fanatisme sempit dan primordialisme berlebihan (mengutamakan kelompok sendiri secara berlebihan) menghambat terwujudnya integrasi nasional."},
    {no:12,pertanyaan:"Konsep wawasan nusantara dalam konteks NKRI memandang Indonesia sebagai...",opsi:{A:"Kumpulan daerah yang terpisah",B:"Satu kesatuan wilayah yang utuh",C:"Negara kepulauan yang masing-masing otonom",D:"Federasi pulau-pulau besar"},jawaban:"B",penjelasan:"Wawasan nusantara memandang Indonesia sebagai satu kesatuan wilayah yang utuh dalam aspek politik, ekonomi, sosial-budaya, dan pertahanan-keamanan."},
    {no:13,pertanyaan:"Semboyan NKRI yang terdapat dalam lambang negara Garuda Pancasila adalah...",opsi:{A:"Pancasila",B:"Bhinneka Tunggal Ika",C:"Bhineka Nusantara",D:"NKRI Harga Mati"},jawaban:"B",penjelasan:"Semboyan 'Bhinneka Tunggal Ika' terdapat pada pita yang dicengkeram Garuda Pancasila, merupakan semboyan resmi NKRI."},
    {no:14,pertanyaan:"Salah satu tantangan terbesar NKRI di era globalisasi adalah...",opsi:{A:"Terlalu banyak sumber daya alam",B:"Masuknya paham radikal dan separatisme melalui teknologi informasi",C:"Kurangnya jumlah penduduk",D:"Terlalu banyak pulau"},jawaban:"B",penjelasan:"Di era globalisasi, masuknya paham radikal dan gerakan separatisme melalui internet dan media sosial menjadi tantangan serius bagi keutuhan NKRI."},
    {no:15,pertanyaan:"Pasal UUD 1945 yang secara eksplisit menyebut bentuk negara kesatuan adalah...",opsi:{A:"Pasal 1 ayat 1",B:"Pasal 1 ayat 2",C:"Pasal 18",D:"Pasal 37"},jawaban:"A",penjelasan:"Pasal 1 ayat (1) UUD 1945 menyatakan: 'Negara Indonesia ialah Negara Kesatuan, yang berbentuk Republik.'"},
    {no:16,pertanyaan:"Bela negara dapat dilakukan oleh warga sipil melalui...",opsi:{A:"Hanya dengan menjadi tentara",B:"Pendidikan kewarganegaraan, menjaga ketertiban, dan cinta produk dalam negeri",C:"Hanya dengan membayar pajak",D:"Tidak perlu, cukup tentara saja"},jawaban:"B",penjelasan:"Bela negara dapat dilakukan warga sipil melalui pendidikan kewarganegaraan, menjaga ketertiban masyarakat, mencintai produk dalam negeri, dan menjaga persatuan bangsa."},
    {no:17,pertanyaan:"Pasal berapa UUD 1945 yang mengatur tentang lambang negara?",opsi:{A:"Pasal 35",B:"Pasal 36A",C:"Pasal 36B",D:"Pasal 36C"},jawaban:"B",penjelasan:"Pasal 36A UUD 1945 menyatakan lambang negara ialah Garuda Pancasila dengan semboyan Bhinneka Tunggal Ika."},
    {no:18,pertanyaan:"NKRI menganut asas desentralisasi yang berarti...",opsi:{A:"Semua urusan ditangani pusat",B:"Penyerahan sebagian urusan pemerintahan kepada daerah",C:"Daerah sepenuhnya mandiri",D:"Pusat tidak ikut campur urusan daerah"},jawaban:"B",penjelasan:"Desentralisasi berarti penyerahan sebagian urusan pemerintahan dari pusat kepada daerah untuk meningkatkan efektivitas pelayanan publik."},
    {no:19,pertanyaan:"Negara kepulauan (archipelagic state) Indonesia diakui secara internasional melalui...",opsi:{A:"Deklarasi Djuanda 1957 dan UNCLOS 1982",B:"Proklamasi 1945",C:"Konstitusi RIS 1949",D:"Amandemen UUD 1945"},jawaban:"A",penjelasan:"Konsep negara kepulauan Indonesia diawali Deklarasi Djuanda 1957 dan diakui secara internasional melalui UNCLOS 1982."},
    {no:20,pertanyaan:"Makna NKRI sebagai 'harga mati' menunjukkan bahwa...",opsi:{A:"Bentuk negara dapat berubah menjadi federal",B:"Keutuhan wilayah dan bentuk negara kesatuan tidak dapat ditawar",C:"NKRI hanya untuk sementara",D:"Daerah boleh memisahkan diri jika tidak puas"},jawaban:"B",penjelasan:"NKRI 'harga mati' berarti keutuhan wilayah dan bentuk negara kesatuan adalah sesuatu yang tidak dapat dikompromikan atau diganti dengan bentuk negara lain."}
  ]},
  7:{pilar:"NKRI",topik:"Wawasan Nusantara dan Ketahanan Nasional",soal:[
    {no:1,pertanyaan:"Wawasan Nusantara berlandaskan...",opsi:{A:"Hukum internasional",B:"Pancasila dan UUD 1945",C:"Hukum adat",D:"Perjanjian bilateral"},jawaban:"B",penjelasan:"Wawasan Nusantara berlandaskan Pancasila sebagai falsafah dan UUD 1945 sebagai konstitusi, memandang Indonesia sebagai satu kesatuan utuh."},
    {no:2,pertanyaan:"Deklarasi Djuanda 1957 menyatakan laut di antara pulau-pulau Indonesia adalah...",opsi:{A:"Laut internasional",B:"Bagian wilayah perairan asing",C:"Bagian wilayah kedaulatan Indonesia",D:"Zona ekonomi eksklusif"},jawaban:"C",penjelasan:"Deklarasi Djuanda menyatakan laut di antara pulau-pulau Indonesia adalah wilayah NKRI, menjadi tonggak konsep negara kepulauan."},
    {no:3,pertanyaan:"UNCLOS 1982 memberikan hak ZEE Indonesia sejauh...",opsi:{A:"12 mil laut",B:"24 mil laut",C:"200 mil laut",D:"500 mil laut"},jawaban:"C",penjelasan:"UNCLOS menetapkan ZEE sejauh 200 mil laut dari garis pangkal. Indonesia berhak atas sumber daya alam di ZEE tersebut."},
    {no:4,pertanyaan:"Ketahanan nasional Indonesia mencakup aspek...",opsi:{A:"Militer saja",B:"Ekonomi saja",C:"IPOLEKSOSBUD-HANKAM secara menyeluruh",D:"Sosial dan budaya saja"},jawaban:"C",penjelasan:"Ketahanan nasional Indonesia bersifat komprehensif mencakup Ideologi, Politik, Ekonomi, Sosial, Budaya, Pertahanan, dan Keamanan."},
    {no:5,pertanyaan:"Yang termasuk gatra alamiah dalam Asta Gatra adalah...",opsi:{A:"Politik, ekonomi, sosial",B:"Geografi, demografi, sumber daya alam",C:"Ideologi, budaya, hankam",D:"IPTEK, ekonomi, hukum"},jawaban:"B",penjelasan:"Tri Gatra (gatra alamiah) terdiri dari geografi, demografi, dan SDA. Panca Gatra (sosial) meliputi ideologi, politik, ekonomi, sosial-budaya, hankam."},
    {no:6,pertanyaan:"Ketahanan nasional bersifat dinamis artinya...",opsi:{A:"Tidak pernah berubah",B:"Dapat ditingkatkan dan disesuaikan dengan perkembangan zaman",C:"Bergantung pada kekuatan militer",D:"Hanya berlaku saat perang"},jawaban:"B",penjelasan:"Ketahanan nasional dinamis karena tingkatannya bisa naik-turun sesuai kondisi dan tantangan yang dihadapi bangsa."},
    {no:7,pertanyaan:"Wawasan nusantara mengutamakan kepentingan...",opsi:{A:"Pribadi",B:"Daerah",C:"Nasional",D:"Golongan"},jawaban:"C",penjelasan:"Wawasan nusantara mendorong mendahulukan kepentingan nasional di atas kepentingan pribadi, daerah, maupun golongan."},
    {no:8,pertanyaan:"Implementasi wawasan nusantara di bidang ekonomi adalah...",opsi:{A:"Mengutamakan produk asing",B:"Meratakan pembangunan ke seluruh pelosok nusantara",C:"Hanya membangun Pulau Jawa",D:"Mengeksploitasi SDA untuk kepentingan asing"},jawaban:"B",penjelasan:"Wawasan nusantara di bidang ekonomi berarti pemerataan pembangunan dan hasil-hasilnya ke seluruh pelosok nusantara."},
    {no:9,pertanyaan:"Ancaman dari luar negeri terhadap ketahanan nasional disebut...",opsi:{A:"Nirmiliter",B:"Eksternal",C:"Internal",D:"Hibrida"},jawaban:"B",penjelasan:"Ancaman eksternal berasal dari luar negeri seperti agresi militer, spionase, atau tekanan diplomatik yang mengancam kedaulatan."},
    {no:10,pertanyaan:"Konsep geopolitik Indonesia berbeda dari Barat karena...",opsi:{A:"Indonesia tidak memiliki wilayah laut",B:"Indonesia berfokus pada ekspansi wilayah",C:"Indonesia mengutamakan persatuan dan perdamaian bukan ekspansionisme",D:"Indonesia meniru konsep Lebensraum"},jawaban:"C",penjelasan:"Wawasan nusantara bertujuan mempertahankan keutuhan wilayah yang sudah ada dan mendorong perdamaian, bukan ekspansi seperti geopolitik Barat."},
    {no:11,pertanyaan:"Konsep 'ketahanan nasional' Indonesia pertama kali dikembangkan oleh lembaga...",opsi:{A:"Kementerian Pertahanan",B:"TNI",C:"Lemhanas (Lembaga Ketahanan Nasional)",D:"DPR"},jawaban:"C",penjelasan:"Lemhanas (Lembaga Ketahanan Nasional) mengembangkan konsep ketahanan nasional Indonesia sebagai landasan pertahanan yang komprehensif."},
    {no:12,pertanyaan:"Laut teritorial Indonesia berdasarkan UNCLOS adalah sejauh...",opsi:{A:"3 mil laut",B:"6 mil laut",C:"12 mil laut",D:"24 mil laut"},jawaban:"C",penjelasan:"UNCLOS 1982 menetapkan laut teritorial sejauh 12 mil laut dari garis pangkal. Di wilayah ini negara memiliki kedaulatan penuh."},
    {no:13,pertanyaan:"Asas wawasan nusantara yang berkaitan dengan keserasian tujuan dan cara mencapainya adalah...",opsi:{A:"Solidaritas",B:"Kejujuran",C:"Keselarasan",D:"Kesetiaan"},jawaban:"C",penjelasan:"Asas keselarasan dalam wawasan nusantara menekankan adanya keserasian dan keseimbangan antara tujuan yang ingin dicapai dan cara mencapainya."},
    {no:14,pertanyaan:"Panca Gatra dalam konsep Asta Gatra ketahanan nasional meliputi...",opsi:{A:"Geografi, demografi, SDA, ideologi, politik",B:"Ideologi, politik, ekonomi, sosial-budaya, hankam",C:"Militer, ekonomi, politik, hukum, budaya",D:"Teknologi, sumber daya, manusia, wilayah, pemerintah"},jawaban:"B",penjelasan:"Panca Gatra (gatra sosial) meliputi ideologi, politik, ekonomi, sosial-budaya, dan hankam (pertahanan dan keamanan)."},
    {no:15,pertanyaan:"Pengaruh negatif globalisasi terhadap ketahanan nasional di bidang budaya adalah...",opsi:{A:"Meningkatnya pertukaran pelajar",B:"Masuknya budaya asing yang bertentangan dengan nilai lokal",C:"Peningkatan pariwisata",D:"Kerja sama ekonomi internasional"},jawaban:"B",penjelasan:"Globalisasi membawa risiko masuknya budaya asing yang bertentangan dengan nilai-nilai lokal, melemahkan identitas dan ketahanan budaya nasional."},
    {no:16,pertanyaan:"Zona tambahan (contiguous zone) Indonesia berdasarkan UNCLOS adalah sejauh...",opsi:{A:"12 mil laut",B:"24 mil laut",C:"200 mil laut",D:"350 mil laut"},jawaban:"B",penjelasan:"Zona tambahan (contiguous zone) adalah 24 mil laut dari garis pangkal. Di zona ini negara berhak menegakkan hukum bea cukai, imigrasi, dan kesehatan."},
    {no:17,pertanyaan:"Deklarasi Djuanda dikeluarkan pada masa kepemimpinan Perdana Menteri...",opsi:{A:"Soekarno",B:"Mohammad Hatta",C:"Djuanda Kartawidjaja",D:"Ali Sastroamidjojo"},jawaban:"C",penjelasan:"Deklarasi Djuanda dikeluarkan pada 13 Desember 1957 oleh PM Djuanda Kartawidjaja, menyatakan bahwa laut di antara pulau-pulau Indonesia adalah wilayah NKRI."},
    {no:18,pertanyaan:"Konsep 'total war' dalam ketahanan nasional berarti...",opsi:{A:"Perang militer skala besar",B:"Pertahanan yang melibatkan seluruh komponen bangsa secara terpadu",C:"Serangan mendadak ke negara musuh",D:"Perang yang menggunakan senjata nuklir"},jawaban:"B",penjelasan:"Konsep pertahanan total (total defence) berarti seluruh komponen bangsa — militer, sipil, sumber daya alam, dan teknologi — terlibat dalam pertahanan negara."},
    {no:19,pertanyaan:"Implementasi wawasan nusantara di bidang politik adalah...",opsi:{A:"Mengutamakan kepentingan partai",B:"Mewujudkan persatuan dan kesatuan dalam kehidupan politik nasional",C:"Membatasi partisipasi rakyat",D:"Mendukung satu partai politik saja"},jawaban:"B",penjelasan:"Wawasan nusantara di bidang politik berarti mewujudkan persatuan dan kesatuan dalam kehidupan politik nasional yang demokratis berdasarkan Pancasila dan UUD 1945."},
    {no:20,pertanyaan:"Ancaman hibrida (hybrid threat) terhadap ketahanan nasional adalah...",opsi:{A:"Hanya ancaman militer konvensional",B:"Kombinasi ancaman militer, nirmiliter, siber, dan propaganda sekaligus",C:"Hanya ancaman terorisme",D:"Hanya ancaman ekonomi"},jawaban:"B",penjelasan:"Ancaman hibrida adalah kombinasi berbagai jenis ancaman (militer, nirmiliter, siber, propaganda) yang dilakukan secara bersamaan untuk melemahkan ketahanan nasional."}
  ]},
  8:{pilar:"NKRI",topik:"Otonomi Daerah dalam Bingkai NKRI",soal:[
    {no:1,pertanyaan:"UU dasar hukum otonomi daerah yang berlaku saat ini adalah...",opsi:{A:"UU No. 5 Tahun 1974",B:"UU No. 22 Tahun 1999",C:"UU No. 23 Tahun 2014",D:"UU No. 32 Tahun 2004"},jawaban:"C",penjelasan:"UU No. 23 Tahun 2014 tentang Pemerintahan Daerah adalah dasar hukum otonomi daerah terkini yang mempertegas pembagian urusan."},
    {no:2,pertanyaan:"Tujuan utama otonomi daerah adalah...",opsi:{A:"Melemahkan pemerintah pusat",B:"Mempercepat kesejahteraan masyarakat dan peningkatan pelayanan publik",C:"Membentuk negara federal",D:"Memisahkan kekuasaan pusat dan daerah sepenuhnya"},jawaban:"B",penjelasan:"Otonomi daerah bertujuan mendekatkan pelayanan kepada masyarakat dan mempercepat kesejahteraan melalui pemberdayaan potensi daerah."},
    {no:3,pertanyaan:"Urusan absolut pemerintah pusat yang tidak dapat diserahkan ke daerah adalah...",opsi:{A:"Pendidikan dasar",B:"Kesehatan",C:"Pertahanan dan keamanan",D:"Pariwisata"},jawaban:"C",penjelasan:"Enam urusan absolut pusat meliputi: politik luar negeri, pertahanan, keamanan, yustisi, moneter dan fiskal nasional, serta agama."},
    {no:4,pertanyaan:"Dana dari APBN untuk pemerataan kemampuan keuangan antar daerah disebut...",opsi:{A:"APBN",B:"Dana Alokasi Umum (DAU)",C:"Anggaran belanja rutin",D:"Dana hibah internasional"},jawaban:"B",penjelasan:"DAU (Dana Alokasi Umum) dialokasikan dari APBN untuk pemerataan kemampuan keuangan antar daerah dalam mendanai pemerintahan."},
    {no:5,pertanyaan:"Perda harus sesuai peraturan yang lebih tinggi berdasarkan asas...",opsi:{A:"Desentralisasi",B:"Lex Specialis",C:"Hierarki peraturan perundang-undangan",D:"Lex Posterior"},jawaban:"C",penjelasan:"Asas hierarki peraturan perundang-undangan mengatur bahwa perda tidak boleh bertentangan dengan peraturan yang lebih tinggi (UU, PP, Perpres)."},
    {no:6,pertanyaan:"DIY mendapat status istimewa berdasarkan...",opsi:{A:"Perjanjian internasional",B:"UU No. 13 Tahun 2012 tentang Keistimewaan DIY",C:"Keputusan presiden",D:"Dekret sultan"},jawaban:"B",penjelasan:"UU No. 13 Tahun 2012 secara resmi mengatur keistimewaan DIY, termasuk tata cara pengisian jabatan gubernur dan wagub."},
    {no:7,pertanyaan:"Kepala daerah di tingkat kabupaten/kota disebut...",opsi:{A:"Gubernur",B:"Bupati/Walikota",C:"Camat",D:"Lurah"},jawaban:"B",penjelasan:"Bupati memimpin kabupaten dan walikota memimpin kota. Gubernur memimpin provinsi. Camat dan lurah adalah perangkat, bukan kepala daerah otonom."},
    {no:8,pertanyaan:"Dampak negatif otonomi daerah yang perlu diwaspadai adalah...",opsi:{A:"Peningkatan pelayanan publik",B:"Munculnya korupsi di tingkat daerah dan primordialisme sempit",C:"Pemerataan pembangunan",D:"Penguatan demokrasi lokal"},jawaban:"B",penjelasan:"Korupsi anggaran daerah dan primordialisme (mengutamakan suku/daerah sendiri) dalam rekrutmen jabatan adalah dampak negatif yang perlu diwaspadai."},
    {no:9,pertanyaan:"Prinsip otonomi seluas-luasnya berarti...",opsi:{A:"Daerah bebas membuat hukum bertentangan dengan pusat",B:"Daerah mendapat kewenangan luas kecuali urusan pusat",C:"Pusat tidak boleh campur tangan",D:"Daerah boleh memisahkan diri"},jawaban:"B",penjelasan:"Otonomi seluas-luasnya berarti daerah mendapat kewenangan luas mengurus hampir semua urusan, kecuali enam urusan absolut pusat."},
    {no:10,pertanyaan:"Hubungan pemerintah pusat dan daerah dalam otonomi bersifat...",opsi:{A:"Terputus sama sekali",B:"Hirarkis dan koordinatif",C:"Setara penuh tanpa koordinasi",D:"Daerah menentukan pusat"},jawaban:"B",penjelasan:"Hubungan pusat-daerah bersifat hirarkis dalam kebijakan nasional sekaligus koordinatif dalam pencapaian tujuan pembangunan bersama."},
    {no:11,pertanyaan:"Dana Alokasi Khusus (DAK) berbeda dari DAU karena...",opsi:{A:"DAK lebih besar jumlahnya",B:"DAK diperuntukkan bagi kebutuhan khusus tertentu yang ditetapkan pusat",C:"DAK hanya untuk provinsi",D:"DAK berasal dari pajak daerah"},jawaban:"B",penjelasan:"DAK diperuntukkan untuk mendanai kegiatan khusus sesuai prioritas nasional yang tidak dapat dibiayai dari APBD, berbeda dengan DAU yang bersifat umum."},
    {no:12,pertanyaan:"Asas dekonsentrasi dalam otonomi daerah berarti...",opsi:{A:"Penyerahan urusan kepada daerah otonom",B:"Pelimpahan wewenang dari pusat kepada aparatur pusat di daerah",C:"Pemberian tugas kepada daerah untuk melaksanakan kebijakan pusat",D:"Kerjasama antar daerah"},jawaban:"B",penjelasan:"Dekonsentrasi adalah pelimpahan wewenang dari pemerintah pusat kepada gubernur sebagai wakil pemerintah pusat di daerah."},
    {no:13,pertanyaan:"Daerah otonom khusus yang memiliki status berbeda selain DIY adalah...",opsi:{A:"DKI Jakarta dan Aceh",B:"Jawa Barat dan Jawa Tengah",C:"Bali dan Nusa Tenggara",D:"Sulawesi dan Kalimantan"},jawaban:"A",penjelasan:"Selain DIY, daerah dengan status khusus/istimewa lainnya adalah DKI Jakarta (ibu kota) dan Aceh (berkaitan dengan pelaksanaan syariat Islam)."},
    {no:14,pertanyaan:"Tugas pembantuan dalam otonomi daerah berarti...",opsi:{A:"Penyerahan urusan penuh kepada daerah",B:"Penugasan dari pemerintah pusat kepada daerah untuk melaksanakan tugas tertentu",C:"Kerja sama antar daerah",D:"Pelimpahan wewenang kepada gubernur"},jawaban:"B",penjelasan:"Tugas pembantuan (medebewind) adalah penugasan dari pemerintah pusat kepada daerah untuk melaksanakan tugas tertentu disertai pembiayaan, sarana, dan SDM."},
    {no:15,pertanyaan:"Berapa tingkatan pemerintahan daerah di Indonesia?",opsi:{A:"1 tingkat (provinsi saja)",B:"2 tingkat (provinsi dan kabupaten/kota)",C:"3 tingkat (provinsi, kabupaten/kota, kecamatan)",D:"4 tingkat"},jawaban:"B",penjelasan:"Indonesia memiliki dua tingkatan pemerintahan daerah otonom: provinsi dan kabupaten/kota. Kecamatan dan kelurahan/desa bukan daerah otonom."},
    {no:16,pertanyaan:"Pengawasan terhadap penyelenggaraan pemerintahan daerah dilakukan oleh...",opsi:{A:"Hanya masyarakat",B:"Kemendagri dan DPRD setempat",C:"Pemerintah asing",D:"Swasta"},jawaban:"B",penjelasan:"Pengawasan pemerintahan daerah dilakukan oleh Kementerian Dalam Negeri (pengawasan administratif) dan DPRD (pengawasan politik di daerah)."},
    {no:17,pertanyaan:"Kepala desa dipilih melalui...",opsi:{A:"Penunjukan gubernur",B:"Pemilihan langsung oleh masyarakat desa",C:"Keputusan bupati",D:"Pemilihan oleh DPRD"},jawaban:"B",penjelasan:"Kepala desa dipilih langsung oleh masyarakat desa melalui pemilihan kepala desa (pilkades), mencerminkan demokrasi di tingkat akar rumput."},
    {no:18,pertanyaan:"Pajak daerah merupakan sumber Pendapatan Asli Daerah (PAD). Contohnya adalah...",opsi:{A:"Pajak penghasilan",B:"Pajak kendaraan bermotor dan pajak hotel",C:"Pajak pertambahan nilai",D:"Bea cukai"},jawaban:"B",penjelasan:"Pajak kendaraan bermotor dan pajak hotel adalah contoh pajak daerah yang menjadi sumber PAD. Pajak penghasilan dan PPN adalah pajak pusat."},
    {no:19,pertanyaan:"Fungsi DPRD di tingkat daerah adalah...",opsi:{A:"Sama persis dengan DPR pusat",B:"Legislasi daerah, penganggaran daerah, dan pengawasan pemerintah daerah",C:"Hanya membuat perda",D:"Hanya mengawasi bupati/walikota"},jawaban:"B",penjelasan:"DPRD memiliki tiga fungsi: legislasi (membuat perda), anggaran (membahas APBD), dan pengawasan (mengawasi pelaksanaan perda dan kebijakan daerah)."},
    {no:20,pertanyaan:"Salah satu keberhasilan otonomi daerah yang dapat dilihat adalah...",opsi:{A:"Semakin terkonsentrasinya pembangunan di Jawa",B:"Munculnya daerah-daerah yang berkembang pesat berkat pengelolaan potensi lokal",C:"Berkurangnya jumlah provinsi",D:"Terhapusnya perbedaan antar daerah"},jawaban:"B",penjelasan:"Otonomi daerah berhasil mendorong munculnya daerah-daerah yang berkembang pesat dengan mengelola potensi dan sumber daya lokal secara mandiri."}
  ]},
  9:{pilar:"Bhinneka Tunggal Ika",topik:"Keberagaman Suku, Agama, dan Budaya Indonesia",soal:[
    {no:1,pertanyaan:"Semboyan 'Bhinneka Tunggal Ika' berasal dari kakawin...",opsi:{A:"Ramayana",B:"Sutasoma karya Mpu Tantular",C:"Mahabharata",D:"Negarakertagama"},jawaban:"B",penjelasan:"'Bhinneka Tunggal Ika' diambil dari kakawin Sutasoma karya Mpu Tantular (abad ke-14, era Majapahit), artinya berbeda-beda namun tetap satu."},
    {no:2,pertanyaan:"Agama yang diakui resmi pemerintah Indonesia berjumlah...",opsi:{A:"4",B:"5",C:"6",D:"7"},jawaban:"C",penjelasan:"Enam agama yang diakui: Islam, Kristen Protestan, Katolik, Hindu, Buddha, dan Konghucu yang kembali diakui pada era reformasi."},
    {no:3,pertanyaan:"Batik Indonesia diakui UNESCO pada tahun...",opsi:{A:"2005",B:"2009",C:"2012",D:"2015"},jawaban:"B",penjelasan:"UNESCO mengakui batik Indonesia sebagai Warisan Budaya Tak Benda pada 2 Oktober 2009, kini diperingati sebagai Hari Batik Nasional."},
    {no:4,pertanyaan:"Sikap positif menghadapi keberagaman suku bangsa adalah...",opsi:{A:"Etnosentrisme berlebihan",B:"Menganggap suku sendiri paling unggul",C:"Primordialisme sempit",D:"Toleransi dan apresiasi terhadap budaya lain"},jawaban:"D",penjelasan:"Toleransi dan apresiasi terhadap budaya lain adalah sikap tepat, sementara etnosentrisme dan primordialisme sempit justru memicu konflik."},
    {no:5,pertanyaan:"Bahasa Indonesia ditetapkan sebagai bahasa persatuan dalam...",opsi:{A:"Proklamasi 1945",B:"Sumpah Pemuda 1928",C:"Sidang BPUPKI",D:"Amandemen UUD 1945"},jawaban:"B",penjelasan:"Sumpah Pemuda 28 Oktober 1928 mengikrarkan bahasa Indonesia sebagai bahasa persatuan, menjadi fondasi penting persatuan bangsa."},
    {no:6,pertanyaan:"Kerukunan umat beragama dijaga melalui...",opsi:{A:"Penyatuan semua agama",B:"Forum Kerukunan Umat Beragama (FKUB)",C:"Pelarangan ibadah tertentu",D:"Dominasi agama mayoritas"},jawaban:"B",penjelasan:"FKUB dibentuk berdasarkan Peraturan Bersama Menag dan Mendagri No. 9 dan 8 Tahun 2006 sebagai forum dialog antar pemuka agama."},
    {no:7,pertanyaan:"Sikap yang mengancam kebhinekaan Indonesia adalah...",opsi:{A:"Toleransi antar suku",B:"Menghargai budaya daerah lain",C:"Fanatisme sempit dan diskriminasi",D:"Belajar bahasa daerah lain"},jawaban:"C",penjelasan:"Fanatisme sempit dan diskriminasi dapat memicu konflik horizontal dan merusak persatuan bangsa yang majemuk."},
    {no:8,pertanyaan:"Tari Kecak berasal dari daerah...",opsi:{A:"Jawa Tengah",B:"Sumatera Barat",C:"Bali",D:"Nusa Tenggara Timur"},jawaban:"C",penjelasan:"Tari Kecak dari Bali menampilkan puluhan penari yang duduk melingkar bersahutan 'cak' menceritakan kisah Ramayana, berkembang sejak 1930-an."},
    {no:9,pertanyaan:"Keberagaman dapat menjadi kekuatan apabila...",opsi:{A:"Dieksploitasi untuk kepentingan asing",B:"Dikelola dengan baik melalui toleransi dan persatuan",C:"Diseragamkan oleh pemerintah pusat",D:"Diabaikan dalam kehidupan bernegara"},jawaban:"B",penjelasan:"Keberagaman adalah modal sosial bangsa. Bila dikelola dengan toleransi dan persatuan, keberagaman menjadi kekuatan besar Indonesia."},
    {no:10,pertanyaan:"Makna inti Bhinneka Tunggal Ika adalah...",opsi:{A:"Persatuan dalam perbedaan untuk kekuatan bersama",B:"Perbedaan harus dihilangkan demi kesatuan",C:"Satu suku satu budaya nasional",D:"Mayoritas menentukan arah minoritas"},jawaban:"A",penjelasan:"Bhinneka Tunggal Ika berarti perbedaan tidak perlu dihilangkan, melainkan dijadikan kekuatan bersama dalam persatuan bangsa."},
    {no:11,pertanyaan:"Suku yang memiliki populasi terbesar di Indonesia adalah...",opsi:{A:"Sunda",B:"Batak",C:"Jawa",D:"Bugis"},jawaban:"C",penjelasan:"Suku Jawa merupakan suku terbesar di Indonesia dengan populasi sekitar 40% dari total penduduk. Diikuti suku Sunda, Batak, Sulawesi, dan lainnya."},
    {no:12,pertanyaan:"Keris Indonesia diakui UNESCO sebagai warisan budaya pada tahun...",opsi:{A:"2003",B:"2005",C:"2008",D:"2010"},jawaban:"B",penjelasan:"Keris Indonesia diakui UNESCO sebagai Warisan Budaya Tak Benda dunia pada tahun 2005, tiga tahun sebelum batik mendapatkan pengakuan serupa."},
    {no:13,pertanyaan:"Sistem kepercayaan lokal seperti Sunda Wiwitan dan Kaharingan di Indonesia termasuk dalam kategori...",opsi:{A:"Agama resmi negara",B:"Kepercayaan terhadap Tuhan Yang Maha Esa",C:"Aliran sesat",D:"Budaya semata"},jawaban:"B",penjelasan:"Kepercayaan lokal seperti Sunda Wiwitan dan Kaharingan dikategorikan sebagai 'kepercayaan terhadap Tuhan Yang Maha Esa' yang dijamin UUD 1945."},
    {no:14,pertanyaan:"Sikap etnosentrisme yang berlebihan berbahaya karena...",opsi:{A:"Meningkatkan kebanggaan budaya",B:"Mendorong inovasi lokal",C:"Menganggap budaya sendiri paling superior dan merendahkan budaya lain",D:"Memperkuat identitas nasional"},jawaban:"C",penjelasan:"Etnosentrisme berlebihan menganggap kelompok/budaya sendiri paling benar dan superior, serta merendahkan kelompok lain, sehingga memicu konflik."},
    {no:15,pertanyaan:"Angklung dari Jawa Barat diakui UNESCO sebagai warisan budaya pada tahun...",opsi:{A:"2009",B:"2010",C:"2011",D:"2012"},jawaban:"B",penjelasan:"Angklung diakui UNESCO sebagai Warisan Budaya Tak Benda pada November 2010, setahun setelah batik mendapat pengakuan serupa."},
    {no:16,pertanyaan:"Budaya gotong royong merupakan nilai universal yang ada pada hampir semua suku di Indonesia, menunjukkan bahwa...",opsi:{A:"Semua suku di Indonesia identik",B:"Ada nilai-nilai yang mempersatukan meski terdapat perbedaan",C:"Hanya suku tertentu yang memiliki budaya positif",D:"Budaya lokal tidak relevan lagi"},jawaban:"B",penjelasan:"Gotong royong sebagai nilai universal dalam masyarakat Indonesia menunjukkan bahwa di balik perbedaan, ada nilai-nilai yang mempersatukan dan menjadi perekat bangsa."},
    {no:17,pertanyaan:"Pakaian adat dari Aceh disebut...",opsi:{A:"Baju Bodo",B:"Ulee Balang",C:"Ulos",D:"Kebaya"},jawaban:"B",penjelasan:"Ulee Balang adalah pakaian adat Aceh yang digunakan dalam upacara adat dan acara resmi, mencerminkan kekayaan budaya Aceh yang islami."},
    {no:18,pertanyaan:"Sikap pluralisme yang sehat berarti...",opsi:{A:"Menganggap semua agama sama saja",B:"Mengakui dan menghormati keberagaman tanpa harus menyatukan perbedaan",C:"Menolak semua agama",D:"Mencampurkan semua ajaran agama"},jawaban:"B",penjelasan:"Pluralisme yang sehat berarti mengakui dan menghormati keberagaman keyakinan dan budaya tanpa harus menganggap semuanya sama atau mencampurnya."},
    {no:19,pertanyaan:"Konflik SARA (Suku, Agama, Ras, dan Antargolongan) dapat dicegah dengan...",opsi:{A:"Menyeragamkan semua perbedaan",B:"Dialog, saling mengenal, dan menghormati perbedaan",C:"Mengisolasi kelompok yang berbeda",D:"Mengabaikan keberagaman"},jawaban:"B",penjelasan:"Konflik SARA dicegah melalui dialog antar kelompok, saling mengenal dan memahami perbedaan, serta mengedepankan rasa hormat dan toleransi."},
    {no:20,pertanyaan:"Keberagaman bahasa daerah di Indonesia yang berjumlah lebih dari 700 bahasa merupakan...",opsi:{A:"Hambatan komunikasi nasional",B:"Kekayaan budaya yang harus dilestarikan",C:"Masalah yang harus diatasi dengan menghapus bahasa daerah",D:"Tanda ketidakmajuan bangsa"},jawaban:"B",penjelasan:"Lebih dari 700 bahasa daerah di Indonesia merupakan kekayaan budaya yang luar biasa dan harus dilestarikan sebagai warisan leluhur yang tak ternilai."}
  ]},
  10:{pilar:"Bhinneka Tunggal Ika",topik:"Persatuan dan Kesatuan dalam Kebhinekaan",soal:[
    {no:1,pertanyaan:"Tonggak persatuan pemuda Indonesia lintas suku adalah...",opsi:{A:"Proklamasi Kemerdekaan",B:"Sumpah Pemuda 28 Oktober 1928",C:"Kongres Perempuan Indonesia",D:"Konferensi Meja Bundar"},jawaban:"B",penjelasan:"Sumpah Pemuda 28 Oktober 1928 menjadi titik balik kesadaran nasional, para pemuda bersatu mengikrarkan satu tanah air, bangsa, dan bahasa."},
    {no:2,pertanyaan:"Faktor yang memperkuat persatuan bangsa Indonesia adalah...",opsi:{A:"Perbedaan kepentingan antar daerah",B:"Persamaan nasib sebagai bangsa terjajah dan Pancasila sebagai ideologi pemersatu",C:"Ketidaksetaraan ekonomi antar daerah",D:"Perbedaan sistem hukum daerah"},jawaban:"B",penjelasan:"Persamaan nasib terjajah dan Pancasila sebagai ideologi pemersatu adalah faktor penting yang memperkuat persatuan dan kesatuan bangsa Indonesia."},
    {no:3,pertanyaan:"'Unity in Diversity' berarti...",opsi:{A:"Menyeragamkan semua perbedaan",B:"Bersatu hanya karena persamaan",C:"Membangun persatuan di atas keberagaman yang ada",D:"Mengabaikan perbedaan"},jawaban:"C",penjelasan:"Unity in Diversity (Bhinneka Tunggal Ika) berarti membangun persatuan di atas keberagaman, bukan dengan menyeragamkan tetapi dengan menghormati perbedaan."},
    {no:4,pertanyaan:"Peran pemuda dalam menjaga persatuan adalah...",opsi:{A:"Menyebarkan hoaks",B:"Aktif dalam organisasi lintas suku dan agama",C:"Mempersoalkan perbedaan SARA",D:"Menutup diri dari pergaulan antar daerah"},jawaban:"B",penjelasan:"Pemuda dapat menjaga persatuan dengan aktif dalam organisasi lintas suku/agama, membangun pertemanan yang beragam, dan menjadi agen perdamaian."},
    {no:5,pertanyaan:"Konflik horizontal dapat dicegah dengan...",opsi:{A:"Mengisolasi kelompok yang berbeda",B:"Dialog, mediasi, dan mengedepankan toleransi",C:"Pemaksaan kehendak mayoritas",D:"Mengabaikan kelompok minoritas"},jawaban:"B",penjelasan:"Konflik horizontal dicegah melalui komunikasi terbuka, mediasi, dan pengedepanan nilai toleransi serta saling menghormati antar kelompok."},
    {no:6,pertanyaan:"Globalisasi mengancam persatuan jika...",opsi:{A:"Meningkatkan pertukaran budaya positif",B:"Memperkuat identitas nasional",C:"Membawa ideologi asing yang bertentangan dengan Pancasila",D:"Membuka peluang ekonomi baru"},jawaban:"C",penjelasan:"Ancaman globalisasi terhadap persatuan muncul ketika ideologi asing yang bertentangan dengan Pancasila masuk dan merusak kohesi sosial bangsa."},
    {no:7,pertanyaan:"Sila Ketiga Pancasila diwujudkan dengan...",opsi:{A:"Mengutamakan kepentingan golongan",B:"Mendahulukan kepentingan bangsa di atas kepentingan pribadi",C:"Hanya bergaul dengan sesuku",D:"Menolak budaya daerah lain"},jawaban:"B",penjelasan:"Sila Ketiga mengamanatkan mendahulukan kepentingan bangsa dan negara di atas kepentingan pribadi atau golongan demi terwujudnya persatuan Indonesia."},
    {no:8,pertanyaan:"Media sosial dalam konteks kebhinekaan sebaiknya digunakan untuk...",opsi:{A:"Menyebarkan ujaran kebencian",B:"Memprovokasi antar kelompok",C:"Memperkuat solidaritas dan kampanye keberagaman positif",D:"Menyebarkan informasi pemecah belah"},jawaban:"C",penjelasan:"Media sosial sebaiknya digunakan untuk menyebarkan konten positif, membangun solidaritas, dan melawan hoaks serta ujaran kebencian."},
    {no:9,pertanyaan:"Ketua Kongres Pemuda II (Sumpah Pemuda) adalah...",opsi:{A:"Soekarno",B:"Soegondo Djojopuspito",C:"Mohammad Hatta",D:"Wahid Hasjim"},jawaban:"B",penjelasan:"Soegondo Djojopuspito dari PPPI menjadi ketua Kongres Pemuda II pada 27–28 Oktober 1928 yang menghasilkan Sumpah Pemuda."},
    {no:10,pertanyaan:"Implementasi Bhinneka Tunggal Ika paling tepat diwujudkan melalui...",opsi:{A:"Penyeragaman budaya dan bahasa",B:"Diskriminasi terhadap kelompok minoritas",C:"Jaminan kesetaraan hak semua warga tanpa memandang suku, agama, dan ras",D:"Pemberlakuan hukum berbeda untuk tiap suku"},jawaban:"C",penjelasan:"Bhinneka Tunggal Ika terwujud paling nyata melalui jaminan kesetaraan hak bagi semua warga negara tanpa diskriminasi, selaras UUD 1945 Pasal 28."},
    {no:11,pertanyaan:"Lagu 'Indonesia Raya' sebagai lagu kebangsaan pertama kali dikumandangkan pada...",opsi:{A:"Proklamasi Kemerdekaan 1945",B:"Kongres Pemuda II 1928",C:"Sidang BPUPKI 1945",D:"Sumpah Pemuda 1926"},jawaban:"B",penjelasan:"Lagu 'Indonesia Raya' ciptaan W.R. Supratman pertama kali dikumandangkan pada Kongres Pemuda II tanggal 28 Oktober 1928."},
    {no:12,pertanyaan:"Nasionalisme yang sehat berarti...",opsi:{A:"Menutup diri dari pengaruh luar",B:"Cinta tanah air yang membangun tanpa merendahkan bangsa lain",C:"Menganggap bangsa sendiri paling unggul",D:"Menolak semua produk asing"},jawaban:"B",penjelasan:"Nasionalisme yang sehat adalah cinta tanah air yang membangun, mendorong kemajuan bangsa tanpa bersikap chauvinistik atau merendahkan bangsa lain."},
    {no:13,pertanyaan:"Perpecahan bangsa dapat dicegah salah satunya dengan...",opsi:{A:"Memperbanyak pemberitaan negatif",B:"Menonjolkan perbedaan SARA",C:"Mengembangkan sikap empati dan saling pengertian antar kelompok",D:"Membesarkan isu separatisme"},jawaban:"C",penjelasan:"Empati dan saling pengertian antar kelompok yang berbeda adalah kunci mencegah perpecahan bangsa dan membangun harmoni sosial."},
    {no:14,pertanyaan:"Wawasan kebangsaan yang kuat ditandai dengan...",opsi:{A:"Menolak semua pengaruh asing",B:"Rasa bangga menjadi warga negara Indonesia dan semangat menjaga persatuan",C:"Mengutamakan kepentingan daerah",D:"Tidak peduli terhadap nasib bangsa"},jawaban:"B",penjelasan:"Wawasan kebangsaan yang kuat ditandai rasa bangga sebagai warga Indonesia, semangat menjaga persatuan, dan kesediaan berkorban untuk kepentingan bangsa."},
