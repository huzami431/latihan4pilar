    {no:20,pertanyaan:"Konsep 'Wawasan Kebangsaan' dalam konteks Bhinneka Tunggal Ika bertujuan untuk...",opsi:{A:"Menghapus identitas kedaerahan",B:"Memperkuat rasa persatuan dan kesatuan tanpa menghilangkan keberagaman",C:"Menyatukan semua agama",D:"Menjadikan satu suku sebagai pemimpin"},jawaban:"B",penjelasan:"Wawasan kebangsaan bertujuan memperkuat rasa persatuan dan identitas nasional tanpa menghilangkan identitas dan keberagaman budaya daerah yang ada."}
  ]}
};

// ── State ──
const state={shown:[],current:null,answers:{},scores:{},timers:{}};
let wheelAngle=0,spinning=false;

// ── Wheel ──
function getAvail(){return Array.from({length:10},(_,i)=>i+1).filter(i=>!state.shown.includes(i));}

function drawWheel(){
  const c=document.getElementById('wheelCanvas');if(!c)return;
  const ctx=c.getContext('2d'),cx=130,cy=130,r=124,arc=(2*Math.PI)/10;
  ctx.clearRect(0,0,260,260);
  for(let idx=0;idx<10;idx++){
    const num=idx+1,startA=wheelAngle+idx*arc-Math.PI/2,endA=startA+arc,done=state.shown.includes(num);
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,r,startA,endA);ctx.closePath();
    ctx.fillStyle=done?'rgba(253,246,236,.07)':COLORS[idx%COLORS.length];
    ctx.fill();ctx.strokeStyle='#1a0a05';ctx.lineWidth=2;ctx.stroke();
    ctx.save();ctx.translate(cx,cy);ctx.rotate(startA+arc/2);ctx.textAlign='right';
    ctx.fillStyle=done?'rgba(253,246,236,.25)':'white';
    ctx.font=`bold ${done?'11':'13'}px "DM Sans",sans-serif`;
    ctx.fillText(done?`P${num}✓`:`Paket ${num}`,r-10,5);ctx.restore();
  }
  ctx.beginPath();ctx.arc(cx,cy,r,0,2*Math.PI);ctx.strokeStyle='rgba(201,168,76,.5)';ctx.lineWidth=3;ctx.stroke();
}

function spinWheel(){
  const avail=getAvail();if(!avail.length){showToast('Semua paket sudah diundi!');return;}
  if(spinning)return;spinning=true;document.getElementById('btnSpin').disabled=true;
  const arc=(2*Math.PI)/10,picked=avail[Math.floor(Math.random()*avail.length)],targetIdx=picked-1;
  const targetOffset=-(targetIdx*arc+arc/2),fullSpins=(5+Math.floor(Math.random()*4))*2*Math.PI;
  const targetAngle=targetOffset-(wheelAngle%(2*Math.PI))+fullSpins;
  const duration=4000,start=performance.now(),startAngle=wheelAngle;
  function ease(t){return 1-Math.pow(1-t,3);}
  function frame(now){
    const t=Math.min((now-start)/duration,1);wheelAngle=startAngle+targetAngle*ease(t);drawWheel();
    if(t<1){requestAnimationFrame(frame);}
    else{wheelAngle=startAngle+targetAngle;spinning=false;document.getElementById('btnSpin').disabled=false;
      drawWheel();showToast(`Paket ${picked} terpilih!`);setTimeout(()=>loadPacket(picked),400);}
  }
  requestAnimationFrame(frame);
}

function loadPacket(picked){
  state.current=picked;if(!state.shown.includes(picked))state.shown.push(picked);
  if(!state.answers[picked])state.answers[picked]={};
  if(state.scores[picked]===undefined)state.scores[picked]=0;
  renderSoal(picked);updateHistory();
  const first=BANK[picked].soal.findIndex((_,i)=>state.answers[picked][i]===undefined);
  if(first>=0)setTimeout(()=>startTimer(picked,first),400);
}

// ── Timer ──
function startTimer(paket,soalIdx){
  const key=`${paket}-${soalIdx}`;if(state.timers[key])return;
  let rem=TIMER_SEC;updateTimerUI(paket,soalIdx,rem);
  state.timers[key]=setInterval(()=>{rem--;updateTimerUI(paket,soalIdx,rem);
    if(rem<=0){clearInterval(state.timers[key]);state.timers[key]='done';timeOut(paket,soalIdx);}},1000);
}
function stopTimer(paket,soalIdx){
  const key=`${paket}-${soalIdx}`;
  if(state.timers[key]&&state.timers[key]!=='done'){clearInterval(state.timers[key]);state.timers[key]='done';}
}
function updateTimerUI(paket,soalIdx,sec){
  const ring=document.getElementById(`tring-${paket}-${soalIdx}`),num=document.getElementById(`tnum-${paket}-${soalIdx}`);
  if(!ring||!num)return;const prog=ring.querySelector('.prog');
  prog.style.strokeDashoffset=CIRC*(1-sec/TIMER_SEC);num.textContent=sec;
  const warn=sec<=15&&sec>5,danger=sec<=5;
  prog.className='prog'+(danger?' danger':warn?' warn':'');
  num.className='timer-num'+(danger?' danger':warn?' warn':'');
}
function timeOut(paket,soalIdx){
  if(state.answers[paket][soalIdx]!==undefined)return;
  state.answers[paket][soalIdx]=null;const s=BANK[paket].soal[soalIdx];
  document.querySelectorAll(`.opt-btn[data-paket="${paket}"][data-soal="${soalIdx}"]`).forEach(btn=>{
    btn.disabled=true;if(btn.dataset.key===s.jawaban)btn.classList.add('reveal');else btn.classList.add('timeout');});
  const fb=document.getElementById(`fb-${paket}-${soalIdx}`);
  if(fb){fb.className='feedback show timeout-fb';
    fb.innerHTML=`<div class="feedback-title">⏱ Waktu habis! Jawaban: ${s.jawaban}. ${s.opsi[s.jawaban]}</div>
      <div class="feedback-explain">💡 ${s.penjelasan}</div>`;}
  const numEl=document.getElementById(`num-${paket}-${soalIdx}`);if(numEl)numEl.classList.add('wrong');
  const tr=document.getElementById(`tr-${paket}-${soalIdx}`);if(tr)tr.style.display='none';
  updateScore(paket);updateHistory();
  const next=soalIdx+1;
  if(next<BANK[paket].soal.length&&state.answers[paket][next]===undefined)startTimer(paket,next);
}

// ── Answer ──
function answer(paket,soalIdx,key){
  const s=BANK[paket].soal[soalIdx];if(state.answers[paket][soalIdx]!==undefined)return;
  stopTimer(paket,soalIdx);state.answers[paket][soalIdx]=key;
  const ok=key===s.jawaban;if(ok)state.scores[paket]=(state.scores[paket]||0)+1;
  document.querySelectorAll(`.opt-btn[data-paket="${paket}"][data-soal="${soalIdx}"]`).forEach(btn=>{
    btn.disabled=true;const k=btn.dataset.key;
    if(k===s.jawaban)btn.classList.add(ok&&k===key?'correct':'reveal');
    if(k===key&&!ok)btn.classList.add('wrong');});
  const fb=document.getElementById(`fb-${paket}-${soalIdx}`);
  if(fb){fb.classList.add('show',ok?'ok':'bad');
    fb.innerHTML=ok?`<div class="feedback-title">✓ Benar!</div>`:
      `<div class="feedback-title">✗ Salah! Jawaban: ${s.jawaban}. ${s.opsi[s.jawaban]}</div>
       <div class="feedback-explain">💡 ${s.penjelasan}</div>`;}
  const numEl=document.getElementById(`num-${paket}-${soalIdx}`);if(numEl)numEl.classList.add(ok?'correct':'wrong');
  const tr=document.getElementById(`tr-${paket}-${soalIdx}`);if(tr)tr.style.display='none';
  updateScore(paket);updateHistory();
  const next=soalIdx+1;
  if(next<BANK[paket].soal.length&&state.answers[paket][next]===undefined)startTimer(paket,next);
}
function updateScore(paket){
  const cnt=Object.values(state.answers[paket]).filter(v=>v!==undefined).length;
  document.getElementById('scoreText').textContent=`${state.scores[paket]||0} / ${cnt}`;
}

// ── Render ──
function renderSoal(n){
  const d=BANK[n];
  document.getElementById('resultTitle').textContent=`Paket ${n} [${d.pilar}] — ${d.topik}`;
  document.getElementById('resultMeta').textContent=`4 Pilar Kebangsaan · SMA · ${d.soal.length} Soal Pilihan Ganda`;
  const ans=state.answers[n];
  document.getElementById('scoreText').textContent=`${state.scores[n]||0} / ${Object.values(ans).filter(v=>v!==undefined).length}`;
  document.getElementById('soalList').innerHTML=d.soal.map((s,i)=>{
    const chosen=ans[i],answered=chosen!==undefined,isOk=chosen===s.jawaban,isTO=chosen===null;
    const optHTML=Object.entries(s.opsi).map(([k,v])=>{
      let cls='opt-btn';
      if(answered){if(isTO){cls+=k===s.jawaban?' reveal':' timeout';}
        else{if(k===s.jawaban)cls+=isOk&&k===chosen?' correct':' reveal';if(k===chosen&&!isOk)cls+=' wrong';}}
      return `<button class="${cls}" data-paket="${n}" data-soal="${i}" data-key="${k}"
        ${answered?'disabled':''} onclick="answer(${n},${i},'${k}')">
        <span class="opt-key">${k}</span><span>${v}</span></button>`;}).join('');
    let fbHTML=`<div class="feedback" id="fb-${n}-${i}"></div>`;
    if(answered){if(isTO)fbHTML=`<div class="feedback show timeout-fb" id="fb-${n}-${i}"><div class="feedback-title">⏱ Waktu habis! Jawaban: ${s.jawaban}. ${s.opsi[s.jawaban]}</div><div class="feedback-explain">💡 ${s.penjelasan}</div></div>`;
      else if(isOk)fbHTML=`<div class="feedback show ok" id="fb-${n}-${i}"><div class="feedback-title">✓ Benar!</div></div>`;
      else fbHTML=`<div class="feedback show bad" id="fb-${n}-${i}"><div class="feedback-title">✗ Salah! Jawaban: ${s.jawaban}. ${s.opsi[s.jawaban]}</div><div class="feedback-explain">💡 ${s.penjelasan}</div></div>`;}
    const numCls=answered?(isOk&&!isTO?'soal-num correct':'soal-num wrong'):'soal-num';
    return `<div class="soal-item" style="animation-delay:${i*.03}s">
      <div class="soal-header"><div class="${numCls}" id="num-${n}-${i}">${s.no}</div><div class="soal-text">${s.pertanyaan}</div></div>
      <div class="timer-row" id="tr-${n}-${i}" style="${answered?'display:none':''}">
        <div class="timer-ring" id="tring-${n}-${i}">
          <svg width="36" height="36" viewBox="0 0 36 36"><circle class="bg" cx="18" cy="18" r="15"/>
          <circle class="prog" cx="18" cy="18" r="15" style="stroke-dasharray:${CIRC};stroke-dashoffset:0;"/></svg>
          <div class="timer-num" id="tnum-${n}-${i}">${TIMER_SEC}</div></div>
        <span class="timer-label">detik tersisa</span></div>
      <div class="soal-options">${optHTML}</div>${fbHTML}</div>`;}).join('');
  document.getElementById('resultCard').classList.add('visible');
  document.getElementById('resultCard').scrollIntoView({behavior:'smooth',block:'start'});
}

function updateHistory(){
  const sec=document.getElementById('historySection'),g=document.getElementById('historyGrid');
  if(!state.shown.length){sec.style.display='none';return;}sec.style.display='block';
  g.innerHTML=state.shown.map(k=>{
    const ans=state.answers[k]||{},sc=state.scores[k]||0,cnt=Object.values(ans).filter(v=>v!==undefined).length;
    return `<div class="history-item" onclick="state.current=${k};renderSoal(${k})">
      <div><div class="history-item-title">Paket ${k} [${BANK[k].pilar}] — ${BANK[k].topik}</div>
      <div class="history-item-meta">${BANK[k].soal.length} soal · Dijawab: ${cnt}</div></div>
      <span class="history-score">${sc}/${cnt}</span></div>`;}).join('');
}

function resetAll(){
  if(!confirm('Reset semua paket?'))return;
  Object.values(state.timers).forEach(t=>{if(t&&t!=='done')clearInterval(t);});
  state.shown=[];state.current=null;state.answers={};state.scores={};state.timers={};
  wheelAngle=0;drawWheel();
  document.getElementById('resultCard').classList.remove('visible');
  document.getElementById('historySection').style.display='none';showToast('Semua paket direset');
}
function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}
window.addEventListener('DOMContentLoaded',()=>setTimeout(drawWheel,100));
</script>
