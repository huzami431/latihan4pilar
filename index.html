<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wayground — Undian Soal 4 Pilar Negara</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--red:#c0392b;--dark-red:#922b21;--cream:#fdf6ec;--dark:#1a0a05;--gold:#c9a84c;--green:#27ae60;--green-dim:rgba(39,174,96,.15);}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--dark);color:var(--cream);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden;}
  body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(circle at 20% 20%,rgba(192,57,43,.15) 0%,transparent 50%),radial-gradient(circle at 80% 80%,rgba(201,168,76,.1) 0%,transparent 50%);pointer-events:none;z-index:0;}
  .container{position:relative;z-index:1;max-width:860px;margin:0 auto;padding:40px 20px;}
  header{text-align:center;margin-bottom:48px;}
  .logo-badge{display:inline-block;background:var(--red);color:white;font-size:11px;font-weight:600;letter-spacing:3px;text-transform:uppercase;padding:6px 18px;border-radius:2px;margin-bottom:16px;}
  h1{font-family:'Playfair Display',serif;font-size:clamp(36px,7vw,64px);font-weight:900;line-height:1;color:var(--cream);margin-bottom:8px;}
  h1 span{color:var(--gold);}
  .subtitle{font-size:14px;color:rgba(253,246,236,.5);letter-spacing:1px;}
  .divider{display:flex;align-items:center;gap:12px;margin:32px 0;opacity:.3;}
  .divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--gold);}
  .divider-icon{color:var(--gold);font-size:18px;}
  .draw-section{display:flex;flex-direction:column;align-items:center;gap:16px;margin-bottom:40px;}
  .btn-draw{background:var(--red);color:white;border:none;font-family:'Playfair Display',serif;font-size:20px;font-weight:700;padding:18px 52px;border-radius:4px;cursor:pointer;transition:all .2s;letter-spacing:1px;}
  .btn-draw:hover{background:var(--dark-red);transform:scale(1.03);box-shadow:0 8px 30px rgba(192,57,43,.5);}
  .btn-secondary{background:transparent;border:1px solid rgba(201,168,76,.4);color:var(--gold);font-size:13px;padding:10px 24px;border-radius:4px;cursor:pointer;transition:all .2s;}
  .btn-secondary:hover{background:rgba(201,168,76,.1);border-color:var(--gold);}
  .result-card{background:rgba(253,246,236,.03);border:1px solid rgba(201,168,76,.25);border-radius:12px;padding:36px;display:none;animation:fadeUp .4s ease;}
  .result-card.visible{display:block;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
  .result-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:28px;padding-bottom:20px;border-bottom:1px solid rgba(201,168,76,.2);}
  .result-title{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:var(--gold);}
  .result-meta{font-size:12px;color:rgba(253,246,236,.4);margin-top:4px;letter-spacing:1px;}
  .score-bar{display:flex;align-items:center;gap:12px;background:rgba(253,246,236,.04);border:1px solid rgba(201,168,76,.2);border-radius:8px;padding:12px 18px;margin-bottom:28px;font-size:14px;}
  .score-label{color:rgba(253,246,236,.5);}
  .score-val{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:var(--gold);margin-left:auto;}
  .soal-list{display:flex;flex-direction:column;gap:24px;}
  .soal-item{animation:fadeUp .3s ease both;}
  .soal-header{display:flex;gap:14px;margin-bottom:12px;}
  .soal-num{background:var(--red);color:white;font-family:'Playfair Display',serif;font-size:14px;font-weight:700;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;}
  .soal-num.correct{background:var(--green);}
  .soal-num.wrong{background:#7f1d1d;}
  .soal-text{font-size:15px;line-height:1.7;color:var(--cream);padding-top:4px;}
  .soal-options{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-left:46px;}
  .opt-btn{background:rgba(253,246,236,.05);border:1px solid rgba(253,246,236,.12);border-radius:8px;padding:10px 14px;cursor:pointer;text-align:left;font-size:13px;color:rgba(253,246,236,.8);transition:all .2s;display:flex;gap:10px;align-items:flex-start;}
  .opt-btn:hover:not(:disabled){background:rgba(201,168,76,.1);border-color:rgba(201,168,76,.4);color:var(--cream);}
  .opt-btn:disabled{cursor:default;}
  .opt-btn.correct{background:var(--green-dim);border-color:var(--green);color:#6ee7a0;}
  .opt-btn.wrong{background:rgba(192,57,43,.15);border-color:var(--red);color:#fca5a5;}
  .opt-btn.reveal{background:var(--green-dim);border-color:var(--green);color:#6ee7a0;}
  .opt-key{font-weight:700;min-width:18px;color:var(--gold);opacity:.8;}
  .opt-btn.correct .opt-key,.opt-btn.reveal .opt-key{color:#6ee7a0;}
  .opt-btn.wrong .opt-key{color:#fca5a5;}
  /* feedback box */
  .feedback{margin-left:46px;margin-top:10px;border-radius:8px;padding:12px 14px;display:none;font-size:13px;line-height:1.6;}
  .feedback.show{display:block;}
  .feedback.ok{background:rgba(39,174,96,.12);border:1px solid rgba(39,174,96,.3);color:#6ee7a0;}
  .feedback.bad{background:rgba(192,57,43,.12);border:1px solid rgba(192,57,43,.3);color:#fca5a5;}
  .feedback-title{font-weight:700;margin-bottom:4px;font-size:13px;}
  .feedback-explain{color:rgba(253,246,236,.7);font-size:12.5px;margin-top:6px;line-height:1.65;border-top:1px solid rgba(253,246,236,.1);padding-top:6px;}
  /* history */
  .history-section{margin-top:48px;border-top:1px solid rgba(201,168,76,.15);padding-top:32px;}
  .section-label{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:16px;font-weight:600;}
  .history-grid{display:flex;flex-direction:column;gap:8px;}
  .history-item{display:flex;align-items:center;justify-content:space-between;background:rgba(253,246,236,.03);border:1px solid rgba(253,246,236,.07);border-radius:6px;padding:12px 16px;font-size:14px;cursor:pointer;}
  .history-item:hover{border-color:rgba(201,168,76,.3);background:rgba(201,168,76,.05);}
  .history-item-title{font-weight:500;}
  .history-item-meta{font-size:11px;color:rgba(253,246,236,.4);margin-top:2px;}
  .history-score{font-family:'Playfair Display',serif;font-size:16px;font-weight:700;color:var(--gold);}
  .toast{position:fixed;bottom:24px;right:24px;background:var(--gold);color:var(--dark);font-size:13px;font-weight:600;padding:12px 20px;border-radius:6px;z-index:999;opacity:0;transform:translateY(10px);transition:all .3s;pointer-events:none;}
  .toast.show{opacity:1;transform:translateY(0);}
  @media(max-width:560px){.soal-options{grid-template-columns:1fr;}.result-card{padding:20px;}.feedback{margin-left:0;}}
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="logo-badge">Wayground • Sistem Undian</div>
    <h1>Undian <span>Soal</span></h1>
    <p class="subtitle">4 Pilar Kebangsaan · SMA Kelas 10–12 · 10 Paket</p>
  </header>
  <div class="divider"><span class="divider-icon">❖</span></div>
  <div class="draw-section">
    <button class="btn-draw" onclick="drawPacket()">🎲 Undi Paket</button>
    <button class="btn-secondary" onclick="resetAll()">↺ Reset Semua</button>
  </div>
  <div class="result-card" id="resultCard">
    <div class="result-header">
      <div>
        <div class="result-title" id="resultTitle"></div>
        <div class="result-meta" id="resultMeta"></div>
      </div>
    </div>
    <div class="score-bar">
      <span class="score-label">Skor</span>
      <span id="scoreText" class="score-val">0 / 0</span>
    </div>
    <div class="soal-list" id="soalList"></div>
  </div>
  <div class="history-section" id="historySection" style="display:none">
    <div class="section-label">Riwayat Paket</div>
    <div class="history-grid" id="historyGrid"></div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
const BANK = {
  1:{pilar:"Pancasila",topik:"Pancasila sebagai Dasar Negara dan Ideologi Bangsa",soal:[
    {no:1,pertanyaan:"Pancasila secara resmi ditetapkan sebagai dasar negara Indonesia pada tanggal...",opsi:{A:"1 Juni 1945",B:"17 Agustus 1945",C:"18 Agustus 1945",D:"22 Juni 1945"},jawaban:"C",penjelasan:"Pada 18 Agustus 1945, PPKI bersidang dan mengesahkan UUD 1945 sekaligus menetapkan Pancasila sebagai dasar negara. Tanggal 1 Juni diperingati sebagai hari lahirnya Pancasila, sedangkan 17 Agustus adalah hari proklamasi kemerdekaan."},
    {no:2,pertanyaan:"Rumusan Pancasila yang sah dan resmi terdapat dalam...",opsi:{A:"Piagam Jakarta",B:"Pembukaan UUD 1945 alinea keempat",C:"Batang Tubuh UUD 1945",D:"Dekret Presiden 5 Juli 1959"},jawaban:"B",penjelasan:"Rumusan Pancasila yang resmi dan mengikat secara hukum tercantum dalam Pembukaan UUD 1945 alinea keempat. Piagam Jakarta memuat rumusan awal yang kemudian diubah sebelum disahkan."},
    {no:3,pertanyaan:"Pancasila sebagai ideologi terbuka artinya...",opsi:{A:"Nilai-nilainya dapat diganti sewaktu-waktu",B:"Terbuka terhadap pengaruh ideologi asing sepenuhnya",C:"Nilai dasarnya tetap namun penjabarannya dapat berkembang sesuai zaman",D:"Siapa saja boleh menafsirkan Pancasila sesuai kepentingan"},jawaban:"C",penjelasan:"Ideologi terbuka berarti nilai-nilai dasar Pancasila bersifat tetap dan tidak berubah, tetapi penerapan dan penjabarannya dapat disesuaikan dengan perkembangan zaman dan kebutuhan masyarakat."},
    {no:4,pertanyaan:"Sidang BPUPKI pertama yang membahas dasar negara berlangsung pada...",opsi:{A:"29 Mei – 1 Juni 1945",B:"10–16 Juli 1945",C:"17–18 Agustus 1945",D:"1–5 Maret 1945"},jawaban:"A",penjelasan:"Sidang BPUPKI pertama berlangsung 29 Mei – 1 Juni 1945 dan membahas dasar negara. Pada sesi inilah Soekarno menyampaikan pidato 'Lahirnya Pancasila' pada 1 Juni 1945."},
    {no:5,pertanyaan:"Tokoh yang menyampaikan pidato 'Lahirnya Pancasila' pada 1 Juni 1945 adalah...",opsi:{A:"Mohammad Hatta",B:"Soepomo",C:"Soekarno",D:"Muhammad Yamin"},jawaban:"C",penjelasan:"Soekarno menyampaikan pidato berjudul 'Lahirnya Pancasila' pada 1 Juni 1945 dalam sidang BPUPKI, mengusulkan lima sila sebagai dasar negara Indonesia merdeka."},
    {no:6,pertanyaan:"Fungsi Pancasila sebagai Norma Dasar (Grundnorm) berarti...",opsi:{A:"Pancasila menjadi sumber dari segala sumber hukum negara",B:"Pancasila hanya berlaku di bidang hukum",C:"Norma hukum di bawah Pancasila boleh bertentangan dengannya",D:"Pancasila sama kedudukannya dengan UUD 1945"},jawaban:"A",penjelasan:"Pancasila sebagai Grundnorm (norma dasar) berarti semua peraturan hukum di Indonesia harus bersumber dan tidak boleh bertentangan dengan Pancasila. Ini menempatkan Pancasila di atas UUD 1945 sekalipun."},
    {no:7,pertanyaan:"Perbedaan antara ideologi terbuka dan ideologi tertutup terletak pada...",opsi:{A:"Jumlah silanya",B:"Sumber nilai dan kemampuan beradaptasi terhadap perubahan zaman",C:"Tingkat kekuatan militer suatu negara",D:"Bentuk pemerintahan yang dianut"},jawaban:"B",penjelasan:"Ideologi terbuka bersumber dari nilai-nilai hidup masyarakat itu sendiri dan mampu beradaptasi dengan zaman. Ideologi tertutup sebaliknya, bersifat dogmatis, kaku, dan dipaksakan dari luar."},
    {no:8,pertanyaan:"Pancasila digali dari nilai-nilai yang telah ada dalam masyarakat Indonesia, sehingga Pancasila bersifat...",opsi:{A:"Impor dari luar negeri",B:"Ciptaan para pendiri negara semata",C:"Kepribadian dan pandangan hidup bangsa Indonesia",D:"Ideologi sementara yang bisa diubah"},jawaban:"C",penjelasan:"Pancasila bukanlah ideologi yang diimpor dari luar, melainkan digali dari nilai-nilai luhur yang sudah lama hidup dalam masyarakat Indonesia seperti gotong royong, toleransi, dan musyawarah."},
    {no:9,pertanyaan:"Konsep Trisila yang diusulkan Soekarno pada sidang BPUPKI mencakup...",opsi:{A:"Nasionalisme, Humanisme, Theisme",B:"Sosionasionalisme, Sosiodemokrasi, Ketuhanan",C:"Persatuan, Keadilan, Ketuhanan",D:"Demokrasi, Kebangsaan, Kesejahteraan"},jawaban:"B",penjelasan:"Trisila adalah penyederhanaan Pancasila oleh Soekarno menjadi tiga prinsip: Sosionasionalisme (gabungan nasionalisme dan perikemanusiaan), Sosiodemokrasi (demokrasi sosial), dan Ketuhanan Yang Berkebudayaan."},
    {no:10,pertanyaan:"Alasan utama Piagam Jakarta tidak langsung dijadikan Pembukaan UUD 1945 adalah...",opsi:{A:"Piagam Jakarta terlalu panjang",B:"Sila pertama dianggap memaksakan agama tertentu dan mengancam persatuan bangsa",C:"Para pendiri negara tidak menyukai isi Piagam Jakarta",D:"Piagam Jakarta tidak memuat sila keadilan sosial"},jawaban:"B",penjelasan:"Tujuh kata dalam sila pertama Piagam Jakarta ('dengan kewajiban menjalankan syariat Islam bagi pemeluk-pemeluknya') dinilai dapat memecah persatuan karena memaksa kewajiban agama tertentu, sehingga dihapus demi persatuan bangsa."}
  ]},
  2:{pilar:"Pancasila",topik:"Nilai-Nilai dan Pengamalan Sila-Sila Pancasila",soal:[
    {no:1,pertanyaan:"Sikap yang mencerminkan pengamalan Sila Pertama Pancasila adalah...",opsi:{A:"Memaksakan agama kepada orang lain",B:"Menghormati pemeluk agama lain dalam menjalankan ibadahnya",C:"Mengikuti semua upacara keagamaan tanpa pilih",D:"Tidak peduli terhadap kegiatan keagamaan"},jawaban:"B",penjelasan:"Sila Pertama menekankan Ketuhanan Yang Maha Esa, yang mengandung nilai toleransi beragama. Menghormati ibadah pemeluk agama lain adalah wujud nyata pengamalan sila ini."},
    {no:2,pertanyaan:"Nilai yang terkandung dalam Sila Kedua 'Kemanusiaan yang Adil dan Beradab' adalah...",opsi:{A:"Cinta tanah air",B:"Pengakuan harkat dan martabat manusia sebagai makhluk Tuhan",C:"Musyawarah untuk mufakat",D:"Pemerataan kesejahteraan"},jawaban:"B",penjelasan:"Sila Kedua mengandung nilai pengakuan bahwa setiap manusia memiliki harkat, martabat, dan hak asasi yang sama sebagai ciptaan Tuhan, sehingga harus diperlakukan secara adil dan beradab."},
    {no:3,pertanyaan:"Simbol bintang emas dalam lambang Garuda Pancasila melambangkan sila ke...",opsi:{A:"1",B:"2",C:"3",D:"4"},jawaban:"A",penjelasan:"Bintang emas melambangkan Sila Pertama 'Ketuhanan Yang Maha Esa'. Bintang menggambarkan cahaya ketuhanan yang menerangi dasar negara Indonesia."},
    {no:4,pertanyaan:"Contoh pengamalan Sila Ketiga di lingkungan sekolah adalah...",opsi:{A:"Membeda-bedakan teman berdasarkan suku",B:"Mengutamakan kepentingan kelompok tertentu",C:"Menjaga kerukunan antar teman tanpa memandang latar belakang",D:"Hanya berteman dengan yang seagama"},jawaban:"C",penjelasan:"Sila Ketiga 'Persatuan Indonesia' diamalkan dengan menjaga kerukunan dan persatuan. Di sekolah, ini diwujudkan dengan berteman dan bekerja sama tanpa memandang suku, agama, maupun latar belakang."},
    {no:5,pertanyaan:"Sila Keempat Pancasila mengandung prinsip bahwa keputusan bersama diambil melalui...",opsi:{A:"Voting mutlak",B:"Keputusan sepihak pemimpin",C:"Musyawarah untuk mufakat",D:"Suara terbanyak tanpa musyawarah"},jawaban:"C",penjelasan:"Sila Keempat menekankan demokrasi yang dipimpin oleh hikmat kebijaksanaan, bukan sekadar suara terbanyak. Keputusan diutamakan dicapai melalui musyawarah untuk mufakat."},
    {no:6,pertanyaan:"Perwujudan Sila Kelima dalam kebijakan ekonomi adalah...",opsi:{A:"Hanya mengutamakan investor asing",B:"Program pemerataan pembangunan ke seluruh wilayah Indonesia",C:"Kebebasan pasar tanpa regulasi",D:"Memusatkan kekayaan pada golongan tertentu"},jawaban:"B",penjelasan:"Sila Kelima 'Keadilan Sosial bagi Seluruh Rakyat Indonesia' menuntut pemerataan hasil pembangunan. Pembangunan tidak boleh hanya terpusat di satu daerah, melainkan harus menyentuh seluruh rakyat Indonesia."},
    {no:7,pertanyaan:"Hubungan antara sila-sila Pancasila bersifat...",opsi:{A:"Saling bertentangan",B:"Terpisah satu sama lain",C:"Hierarkis piramidal dan organis",D:"Tidak memiliki keterkaitan"},jawaban:"C",penjelasan:"Sila-sila Pancasila membentuk satu kesatuan organis yang hierarkis piramidal — sila pertama mendasari sila-sila berikutnya, dan setiap sila saling mengandaikan serta menguatkan satu sama lain."},
    {no:8,pertanyaan:"Sikap yang BERTENTANGAN dengan nilai Sila Keempat Pancasila adalah...",opsi:{A:"Mengikuti hasil musyawarah meskipun berbeda pendapat",B:"Menghargai pendapat orang lain",C:"Memaksakan kehendak pribadi dalam rapat",D:"Mengutamakan kepentingan bersama"},jawaban:"C",penjelasan:"Sila Keempat mengamanatkan pengambilan keputusan secara musyawarah, menghargai pendapat orang lain, dan mendahulukan kepentingan bersama. Memaksakan kehendak pribadi jelas bertentangan dengan nilai ini."},
    {no:9,pertanyaan:"Kepala banteng dalam lambang Garuda Pancasila merupakan simbol sila ke...",opsi:{A:"3",B:"4",C:"5",D:"2"},jawaban:"B",penjelasan:"Kepala banteng melambangkan Sila Keempat 'Kerakyatan yang Dipimpin oleh Hikmat Kebijaksanaan dalam Permusyawaratan/Perwakilan'. Banteng adalah hewan sosial yang menggambarkan semangat musyawarah dan kebersamaan."},
    {no:10,pertanyaan:"'Dengan iktikad yang baik menerima dan melaksanakan hasil keputusan musyawarah' adalah pengamalan sila ke...",opsi:{A:"2",B:"3",C:"4",D:"5"},jawaban:"C",penjelasan:"Menerima dan melaksanakan hasil musyawarah dengan iktikad baik adalah salah satu butir pengamalan Sila Keempat, yang menekankan tanggung jawab bersama atas keputusan yang telah disepakati secara demokratis."}
  ]},
  3:{pilar:"UUD 1945",topik:"Sejarah Perumusan dan Penetapan UUD 1945",soal:[
    {no:1,pertanyaan:"Badan yang bertugas merumuskan UUD 1945 sebelum kemerdekaan adalah...",opsi:{A:"KNIP",B:"BPUPKI",C:"PPKI",D:"DPR"},jawaban:"B",penjelasan:"BPUPKI (Badan Penyelidik Usaha-Usaha Persiapan Kemerdekaan Indonesia) bertugas menyelidiki dan mempersiapkan segala sesuatu terkait kemerdekaan, termasuk merumuskan dasar negara dan rancangan UUD."},
    {no:2,pertanyaan:"UUD 1945 disahkan oleh PPKI pada tanggal...",opsi:{A:"17 Agustus 1945",B:"18 Agustus 1945",C:"19 Agustus 1945",D:"1 Juni 1945"},jawaban:"B",penjelasan:"Sehari setelah proklamasi kemerdekaan, PPKI bersidang pada 18 Agustus 1945 dan mengesahkan UUD 1945, memilih Soekarno-Hatta sebagai presiden dan wakil presiden pertama RI."},
    {no:3,pertanyaan:"Sidang BPUPKI kedua yang membahas rancangan UUD berlangsung pada...",opsi:{A:"29 Mei – 1 Juni 1945",B:"10–17 Juli 1945",C:"18–20 Agustus 1945",D:"1–7 September 1945"},jawaban:"B",penjelasan:"Sidang BPUPKI kedua berlangsung 10–17 Juli 1945. Pada sidang ini dibahas rancangan UUD, rancangan batang tubuh, dan wilayah negara Indonesia merdeka."},
    {no:4,pertanyaan:"Dekret Presiden 5 Juli 1959 menyatakan berlakunya kembali UUD 1945 karena...",opsi:{A:"Konstituante berhasil merumuskan UUD baru",B:"Konstituante gagal merumuskan UUD baru dalam waktu yang ditentukan",C:"Permintaan rakyat melalui referendum",D:"Keputusan MPR"},jawaban:"B",penjelasan:"Konstituante yang dibentuk untuk membuat UUD baru terus berdebat tanpa hasil selama bertahun-tahun. Presiden Soekarno akhirnya mengeluarkan dekret untuk kembali ke UUD 1945 demi mengatasi kebuntuan politik."},
    {no:5,pertanyaan:"UUD 1945 pernah tidak berlaku digantikan Konstitusi RIS pada periode...",opsi:{A:"1945–1949",B:"1949–1950",C:"1950–1959",D:"1959–1966"},jawaban:"B",penjelasan:"Konstitusi RIS berlaku sejak 27 Desember 1949 (pengakuan kedaulatan oleh Belanda) hingga 17 Agustus 1950 saat Indonesia kembali menjadi negara kesatuan dengan UUDS 1950."},
    {no:6,pertanyaan:"Amandemen UUD 1945 dilakukan sebanyak berapa kali pada era reformasi?",opsi:{A:"2 kali",B:"3 kali",C:"4 kali",D:"5 kali"},jawaban:"C",penjelasan:"UUD 1945 diamandemen empat kali: amandemen I (1999), II (2000), III (2001), dan IV (2002). Perubahan ini menghasilkan reformasi kelembagaan negara yang signifikan."},
    {no:7,pertanyaan:"Amandemen pertama UUD 1945 dilakukan pada tahun...",opsi:{A:"1998",B:"1999",C:"2000",D:"2001"},jawaban:"B",penjelasan:"Amandemen pertama UUD 1945 dilakukan pada Sidang Umum MPR Oktober 1999, setahun setelah reformasi. Fokus amandemen pertama adalah pembatasan kekuasaan presiden."},
    {no:8,pertanyaan:"Salah satu perubahan penting dalam amandemen UUD 1945 adalah...",opsi:{A:"Penghapusan pasal tentang HAM",B:"Penambahan lembaga MPR",C:"Pembatasan masa jabatan presiden maksimal dua periode",D:"Penghapusan Mahkamah Agung"},jawaban:"C",penjelasan:"Amandemen UUD 1945 membatasi masa jabatan presiden menjadi paling banyak dua periode (masing-masing 5 tahun). Ini untuk mencegah kekuasaan yang terlalu lama seperti yang terjadi di era Orde Baru."},
    {no:9,pertanyaan:"UUDS 1950 berlaku pada periode...",opsi:{A:"17 Agustus – 27 Desember 1949",B:"27 Desember 1949 – 17 Agustus 1950",C:"17 Agustus 1950 – 5 Juli 1959",D:"5 Juli 1959 – 1966"},jawaban:"C",penjelasan:"UUDS 1950 mulai berlaku 17 Agustus 1950 saat RIS dibubarkan dan Indonesia kembali menjadi negara kesatuan, hingga Dekret Presiden 5 Juli 1959 yang mengembalikan UUD 1945."},
    {no:10,pertanyaan:"Lembaga yang berwenang mengubah UUD 1945 adalah...",opsi:{A:"DPR",B:"Presiden",C:"MPR",D:"Mahkamah Konstitusi"},jawaban:"C",penjelasan:"Berdasarkan Pasal 37 UUD 1945, MPR (Majelis Permusyawaratan Rakyat) adalah satu-satunya lembaga yang berwenang mengubah UUD 1945 dengan syarat kuorum dan persetujuan minimal 50% plus satu anggota."}
  ]},
  4:{pilar:"UUD 1945",topik:"Hak dan Kewajiban Warga Negara dalam UUD 1945",soal:[
    {no:1,pertanyaan:"Pasal UUD 1945 yang mengatur hak atas pendidikan adalah...",opsi:{A:"Pasal 27",B:"Pasal 28C",C:"Pasal 31",D:"Pasal 34"},jawaban:"C",penjelasan:"Pasal 31 UUD 1945 mengatur hak dan kewajiban warga negara di bidang pendidikan. Ayat (1) menyatakan setiap warga negara berhak mendapat pendidikan, dan ayat (2) mewajibkan mengikuti pendidikan dasar."},
    {no:2,pertanyaan:"Hak setiap warga negara untuk mendapat pekerjaan dan penghidupan yang layak diatur dalam...",opsi:{A:"Pasal 26",B:"Pasal 27 ayat 2",C:"Pasal 28",D:"Pasal 30"},jawaban:"B",penjelasan:"Pasal 27 ayat (2) UUD 1945 menyatakan: 'Tiap-tiap warga negara berhak atas pekerjaan dan penghidupan yang layak bagi kemanusiaan.' Ini merupakan hak ekonomi warga negara."},
    {no:3,pertanyaan:"Kewajiban membela negara bagi setiap warga negara diatur dalam Pasal...",opsi:{A:"27 ayat 1",B:"27 ayat 3",C:"28J",D:"30 ayat 1"},jawaban:"D",penjelasan:"Pasal 30 ayat (1) UUD 1945 menyatakan bahwa tiap-tiap warga negara berhak dan wajib ikut serta dalam usaha pertahanan dan keamanan negara."},
    {no:4,pertanyaan:"Pasal 28A UUD 1945 menjamin hak...",opsi:{A:"Berserikat dan berkumpul",B:"Hidup dan mempertahankan kehidupan",C:"Mendapat pendidikan",D:"Mendapat pekerjaan"},jawaban:"B",penjelasan:"Pasal 28A menjamin hak untuk hidup serta berhak mempertahankan hidup dan kehidupannya. Ini adalah hak paling dasar yang tidak dapat diganggu gugat."},
    {no:5,pertanyaan:"Hak asasi yang tidak dapat dikurangi dalam keadaan apapun (non-derogable rights) meliputi...",opsi:{A:"Hak berpendapat dan hak bekerja",B:"Hak hidup, hak bebas dari penyiksaan, hak beragama",C:"Hak memilih dan hak dipilih",D:"Hak mendapat gaji dan hak cuti"},jawaban:"B",penjelasan:"Non-derogable rights adalah hak yang tidak boleh dikurangi dalam kondisi apapun, termasuk keadaan darurat. Meliputi hak hidup, hak bebas dari penyiksaan, hak bebas dari perbudakan, dan hak beragama."},
    {no:6,pertanyaan:"Kewajiban warga negara membayar pajak diatur dalam Pasal...",opsi:{A:"23A",B:"27 ayat 1",C:"30",D:"31"},jawaban:"A",penjelasan:"Pasal 23A UUD 1945 menyatakan bahwa pajak dan pungutan lain yang bersifat memaksa untuk keperluan negara diatur dengan undang-undang, menjadi landasan kewajiban membayar pajak."},
    {no:7,pertanyaan:"Pasal 28J ayat 1 UUD 1945 menyatakan bahwa setiap orang wajib...",opsi:{A:"Membayar pajak",B:"Menghormati hak asasi manusia orang lain",C:"Mengikuti wajib militer",D:"Mendukung pemerintah"},jawaban:"B",penjelasan:"Pasal 28J ayat (1) menegaskan kewajiban setiap orang untuk menghormati hak asasi manusia orang lain dalam tertib kehidupan bermasyarakat, berbangsa, dan bernegara."},
    {no:8,pertanyaan:"Hak yang dijamin Pasal 28E UUD 1945 meliputi...",opsi:{A:"Hak mendapat pengajaran",B:"Hak atas pekerjaan",C:"Hak memilih agama, kewarganegaraan, dan berpendapat",D:"Hak atas jaminan sosial"},jawaban:"C",penjelasan:"Pasal 28E menjamin kebebasan memilih agama dan beribadat, memilih kewarganegaraan, memilih tempat tinggal, serta kebebasan berserikat, berkumpul, dan berpendapat."},
    {no:9,pertanyaan:"Persamaan kedudukan warga negara di hadapan hukum diatur dalam Pasal...",opsi:{A:"26",B:"27 ayat 1",C:"28D ayat 1",D:"30"},jawaban:"B",penjelasan:"Pasal 27 ayat (1) menyatakan: 'Segala warga negara bersamaan kedudukannya di dalam hukum dan pemerintahan dan wajib menjunjung hukum dan pemerintahan itu dengan tidak ada kecualinya.'"},
    {no:10,pertanyaan:"Perbedaan antara hak asasi manusia dan hak warga negara terletak pada...",opsi:{A:"HAM berlaku untuk semua manusia, hak warga negara hanya untuk warga negara tertentu",B:"HAM bisa dicabut, hak warga negara tidak bisa dicabut",C:"Hak warga negara lebih tinggi dari HAM",D:"Tidak ada perbedaan"},jawaban:"A",penjelasan:"HAM melekat pada setiap manusia sejak lahir tanpa memandang kewarganegaraan. Hak warga negara bersifat khusus, hanya berlaku bagi orang yang memiliki status warga negara suatu negara tertentu."}
  ]},
  5:{pilar:"UUD 1945",topik:"Lembaga-Lembaga Negara berdasarkan UUD 1945",soal:[
    {no:1,pertanyaan:"Setelah amandemen UUD 1945, presiden dan wakil presiden dipilih oleh...",opsi:{A:"MPR",B:"DPR",C:"Rakyat secara langsung",D:"Mahkamah Agung"},jawaban:"C",penjelasan:"Amandemen ketiga UUD 1945 mengubah mekanisme pemilihan presiden dari MPR menjadi pemilihan langsung oleh rakyat. Pemilihan presiden langsung pertama kali dilaksanakan pada 2004."},
    {no:2,pertanyaan:"Lembaga negara yang berwenang menguji undang-undang terhadap UUD 1945 adalah...",opsi:{A:"Mahkamah Agung",B:"Komisi Yudisial",C:"Mahkamah Konstitusi",D:"DPR"},jawaban:"C",penjelasan:"Mahkamah Konstitusi (MK) dibentuk melalui amandemen ketiga UUD 1945. Salah satu wewenang utamanya adalah judicial review, yaitu menguji undang-undang terhadap UUD 1945."},
    {no:3,pertanyaan:"Badan Pemeriksa Keuangan (BPK) bertugas...",opsi:{A:"Menetapkan APBN",B:"Memeriksa pengelolaan dan tanggung jawab keuangan negara",C:"Mengadili sengketa pemilu",D:"Memberikan pertimbangan kepada presiden"},jawaban:"B",penjelasan:"BPK adalah lembaga independen yang bertugas memeriksa pengelolaan dan tanggung jawab keuangan negara. Hasil pemeriksaannya diserahkan kepada DPR, DPD, dan DPRD sesuai kewenangannya."},
    {no:4,pertanyaan:"Berdasarkan UUD 1945 hasil amandemen, MPR terdiri dari...",opsi:{A:"DPR dan DPD",B:"DPR dan utusan golongan",C:"DPR, DPD, dan utusan daerah",D:"DPR saja"},jawaban:"A",penjelasan:"Setelah amandemen, MPR terdiri dari anggota DPR dan anggota DPD. Utusan golongan yang sebelumnya ada dihapus, sehingga MPR tidak lagi memiliki anggota yang tidak dipilih langsung oleh rakyat."},
    {no:5,pertanyaan:"Komisi Yudisial memiliki wewenang untuk...",opsi:{A:"Membuat undang-undang",B:"Mengusulkan pengangkatan hakim agung dan menjaga kehormatan hakim",C:"Mengadili perkara pidana",D:"Menguji peraturan daerah"},jawaban:"B",penjelasan:"Komisi Yudisial berwenang mengusulkan pengangkatan hakim agung kepada DPR dan menjaga kehormatan, keluhuran martabat, serta perilaku hakim agar peradilan tetap bersih dan berwibawa."},
    {no:6,pertanyaan:"DPD (Dewan Perwakilan Daerah) dibentuk melalui amandemen UUD 1945 yang ke...",opsi:{A:"Pertama",B:"Kedua",C:"Ketiga",D:"Keempat"},jawaban:"C",penjelasan:"DPD dibentuk melalui amandemen ketiga UUD 1945 pada tahun 2001. DPD mewakili kepentingan daerah-daerah di tingkat nasional dan anggotanya dipilih langsung dari setiap provinsi."},
    {no:7,pertanyaan:"Kewenangan DPR dalam bidang legislasi adalah...",opsi:{A:"Menetapkan peraturan pemerintah",B:"Membentuk undang-undang bersama presiden",C:"Membuat peraturan daerah",D:"Mengeluarkan dekret"},jawaban:"B",penjelasan:"DPR memegang kekuasaan membentuk undang-undang (Pasal 20 UUD 1945). Setiap rancangan undang-undang dibahas bersama presiden dan disahkan atas persetujuan bersama."},
    {no:8,pertanyaan:"Presiden dalam sistem pemerintahan Indonesia memegang kekuasaan...",opsi:{A:"Legislatif",B:"Yudikatif",C:"Eksekutif",D:"Legislatif dan Eksekutif"},jawaban:"C",penjelasan:"Dalam sistem presidensial Indonesia, presiden memegang kekuasaan eksekutif (pemerintahan). Meskipun presiden ikut membahas UU, kekuasaan legislatif utamanya berada di DPR."},
    {no:9,pertanyaan:"Berapa jumlah hakim Mahkamah Konstitusi berdasarkan UUD 1945?",opsi:{A:"5 orang",B:"7 orang",C:"9 orang",D:"11 orang"},jawaban:"C",penjelasan:"MK terdiri dari 9 hakim konstitusi: 3 diajukan DPR, 3 diajukan presiden, dan 3 diajukan Mahkamah Agung. Ketua dan wakil ketua MK dipilih dari dan oleh hakim konstitusi."},
    {no:10,pertanyaan:"DPR dapat memberhentikan presiden melalui mekanisme...",opsi:{A:"Interpelasi",B:"Hak angket",C:"Pemakzulan (impeachment)",D:"Mosi tidak percaya"},jawaban:"C",penjelasan:"Pemakzulan adalah proses pemberhentian presiden/wakil presiden. DPR mengajukan usul ke MK untuk memeriksa, setelah itu MPR bersidang untuk memutuskan. Ini berbeda dengan interpelasi (hak bertanya) dan angket (hak penyelidikan)."}
  ]},
  6:{pilar:"NKRI",topik:"Konsep dan Hakikat Negara Kesatuan Republik Indonesia",soal:[
    {no:1,pertanyaan:"Bentuk negara Indonesia berdasarkan Pasal 1 ayat 1 UUD 1945 adalah...",opsi:{A:"Negara serikat",B:"Negara konfederasi",C:"Negara kesatuan",D:"Negara federal"},jawaban:"C",penjelasan:"Pasal 1 ayat (1) UUD 1945 secara tegas menyatakan: 'Negara Indonesia ialah Negara Kesatuan, yang berbentuk Republik.' Ini merupakan salah satu pasal yang tidak dapat diubah."},
    {no:2,pertanyaan:"Ciri utama negara kesatuan yang membedakannya dari negara federal adalah...",opsi:{A:"Memiliki konstitusi",B:"Hanya ada satu pemerintahan pusat yang berdaulat",C:"Memiliki parlemen",D:"Menggunakan sistem presidensial"},jawaban:"B",penjelasan:"Dalam negara kesatuan, kedaulatan penuh ada di pemerintah pusat. Berbeda dengan negara federal di mana negara-negara bagian memiliki kedaulatan sendiri yang dibagi dengan pemerintah federal."},
    {no:3,pertanyaan:"NKRI diproklamasikan pada tanggal...",opsi:{A:"1 Juni 1945",B:"18 Agustus 1945",C:"17 Agustus 1945",D:"27 Desember 1949"},jawaban:"C",penjelasan:"Proklamasi Kemerdekaan Indonesia dibacakan oleh Soekarno-Hatta pada 17 Agustus 1945 di Jakarta, menandai lahirnya Negara Kesatuan Republik Indonesia."},
    {no:4,pertanyaan:"Sistem pemerintahan yang dianut Indonesia berdasarkan UUD 1945 adalah...",opsi:{A:"Parlementer",B:"Presidensial",C:"Monarki konstitusional",D:"Semi presidensial"},jawaban:"B",penjelasan:"Indonesia menganut sistem presidensial, di mana presiden adalah kepala negara sekaligus kepala pemerintahan, dan tidak bertanggung jawab kepada parlemen melainkan langsung kepada rakyat."},
    {no:5,pertanyaan:"Kedaulatan NKRI berada di tangan...",opsi:{A:"Presiden",B:"MPR",C:"Rakyat dan dilaksanakan menurut UUD",D:"DPR"},jawaban:"C",penjelasan:"Pasal 1 ayat (2) UUD 1945 (setelah amandemen) menyatakan: 'Kedaulatan berada di tangan rakyat dan dilaksanakan menurut Undang-Undang Dasar.' MPR tidak lagi menjadi pemegang kedaulatan rakyat sepenuhnya."},
    {no:6,pertanyaan:"Negara Indonesia pernah berbentuk negara federal, yaitu pada saat berlakunya...",opsi:{A:"UUD 1945 periode pertama",B:"Konstitusi RIS",C:"UUDS 1950",D:"Amandemen UUD 1945"},jawaban:"B",penjelasan:"Konstitusi RIS (Republik Indonesia Serikat) berlaku 27 Desember 1949–17 Agustus 1950. Pada masa ini Indonesia berbentuk federal dengan beberapa negara bagian, sebelum kembali menjadi negara kesatuan."},
    {no:7,pertanyaan:"Ancaman terhadap keutuhan NKRI yang bersifat nirmiliter antara lain...",opsi:{A:"Invasi militer asing",B:"Pemberontakan bersenjata",C:"Radikalisme dan separatisme melalui propaganda",D:"Serangan udara"},jawaban:"C",penjelasan:"Ancaman nirmiliter tidak menggunakan kekuatan senjata, melainkan melalui ideologi, propaganda, provokasi, atau gerakan separatisme di bidang politik dan sosial. Ini justru sering lebih berbahaya karena sulit terdeteksi."},
    {no:8,pertanyaan:"Wilayah NKRI mencakup...",opsi:{A:"Hanya daratan",B:"Daratan dan lautan saja",C:"Daratan, lautan, dan udara di atasnya",D:"Daratan sesuai perjanjian kolonial saja"},jawaban:"C",penjelasan:"Wilayah negara secara hukum internasional mencakup tiga dimensi: daratan (termasuk pulau-pulau), lautan (perairan teritorial dan ZEE), dan ruang udara di atasnya hingga batas tertentu."},
    {no:9,pertanyaan:"Integrasi nasional berarti...",opsi:{A:"Penyeragaman semua suku dan budaya",B:"Proses menyatukan perbedaan menjadi satu kesatuan yang utuh",C:"Penghapusan bahasa daerah",D:"Dominasi satu kelompok atas kelompok lain"},jawaban:"B",penjelasan:"Integrasi nasional adalah proses mempersatukan berbagai perbedaan dalam masyarakat (suku, agama, budaya) menjadi satu kesatuan bangsa yang utuh, bukan dengan menyeragamkan atau menghapus keberagaman."},
    {no:10,pertanyaan:"Warga negara dapat berperan menjaga keutuhan NKRI dengan cara...",opsi:{A:"Memisahkan diri dari kelompok lain",B:"Menolak semua budaya daerah",C:"Menghargai perbedaan dan aktif dalam bela negara",D:"Hanya mematuhi hukum adat"},jawaban:"C",penjelasan:"Bela negara tidak hanya berarti angkat senjata. Setiap warga negara dapat berkontribusi dengan menghargai perbedaan, menjaga persatuan, berpartisipasi aktif dalam pembangunan, dan menolak paham yang memecah belah."}
  ]},
  7:{pilar:"NKRI",topik:"Wawasan Nusantara dan Ketahanan Nasional",soal:[
    {no:1,pertanyaan:"Wawasan Nusantara adalah cara pandang bangsa Indonesia yang berpijak pada...",opsi:{A:"Hukum internasional",B:"Pancasila dan UUD 1945",C:"Hukum adat",D:"Perjanjian bilateral"},jawaban:"B",penjelasan:"Wawasan Nusantara berlandaskan Pancasila sebagai falsafah dan UUD 1945 sebagai konstitusi. Cara pandang ini memandang Indonesia sebagai satu kesatuan wilayah, bangsa, ekonomi, sosial-budaya, dan pertahanan-keamanan."},
    {no:2,pertanyaan:"Deklarasi Djuanda 1957 menyatakan bahwa laut di antara pulau-pulau Indonesia adalah...",opsi:{A:"Laut internasional",B:"Bagian wilayah perairan asing",C:"Bagian wilayah kedaulatan Indonesia",D:"Zona ekonomi eksklusif"},jawaban:"C",penjelasan:"Deklarasi Djuanda (13 Desember 1957) menyatakan bahwa laut di antara pulau-pulau Indonesia adalah bagian dari wilayah NKRI, bukan laut bebas. Ini menjadi tonggak konsep negara kepulauan (archipelago state)."},
    {no:3,pertanyaan:"UNCLOS 1982 memberikan hak Indonesia atas zona ekonomi eksklusif sejauh...",opsi:{A:"12 mil laut",B:"24 mil laut",C:"200 mil laut",D:"500 mil laut"},jawaban:"C",penjelasan:"UNCLOS (United Nations Convention on the Law of the Sea) 1982 menetapkan ZEE sejauh 200 mil laut dari garis pangkal. Di ZEE ini, Indonesia berhak atas sumber daya alam laut meskipun kapal asing boleh melintas."},
    {no:4,pertanyaan:"Ketahanan nasional dalam konteks Indonesia mencakup aspek...",opsi:{A:"Militer saja",B:"Ekonomi saja",C:"IPOLEKSOSBUD-HANKAM secara menyeluruh",D:"Sosial dan budaya saja"},jawaban:"C",penjelasan:"Konsep ketahanan nasional Indonesia bersifat komprehensif, mencakup Ideologi, Politik, Ekonomi, Sosial, Budaya, Pertahanan, dan Keamanan (IPOLEKSOSBUD-HANKAM) sebagai satu kesatuan yang utuh."},
    {no:5,pertanyaan:"Yang termasuk gatra alamiah dalam konsep Asta Gatra ketahanan nasional adalah...",opsi:{A:"Politik, ekonomi, sosial",B:"Geografi, demografi, sumber daya alam",C:"Ideologi, budaya, hankam",D:"IPTEK, ekonomi, hukum"},jawaban:"B",penjelasan:"Asta Gatra terdiri dari Tri Gatra (alamiah) dan Panca Gatra (sosial). Tri Gatra meliputi geografi, demografi, dan sumber daya alam — ketiganya bersifat given/alami. Panca Gatra meliputi ideologi, politik, ekonomi, sosial-budaya, dan hankam."},
    {no:6,pertanyaan:"Ketahanan nasional bersifat dinamis artinya...",opsi:{A:"Tidak pernah berubah",B:"Dapat ditingkatkan dan disesuaikan dengan perkembangan zaman",C:"Bergantung pada kekuatan militer",D:"Hanya berlaku saat perang"},jawaban:"B",penjelasan:"Ketahanan nasional bersifat dinamis karena tingkatannya dapat naik-turun sesuai kondisi dan tantangan yang dihadapi bangsa. Ia perlu terus dibina dan ditingkatkan menghadapi berbagai ancaman yang terus berkembang."},
    {no:7,pertanyaan:"Wawasan nusantara bertujuan mewujudkan nasionalisme yang mengutamakan...",opsi:{A:"Kepentingan pribadi",B:"Kepentingan daerah",C:"Kepentingan nasional",D:"Kepentingan golongan"},jawaban:"C",penjelasan:"Wawasan nusantara mendorong setiap warga negara untuk mendahulukan kepentingan nasional di atas kepentingan pribadi, daerah, maupun golongan, demi terwujudnya kesatuan dan kemajuan bangsa."},
    {no:8,pertanyaan:"Implementasi wawasan nusantara di bidang ekonomi adalah...",opsi:{A:"Mengutamakan produk asing",B:"Meratakan pembangunan ke seluruh pelosok nusantara",C:"Hanya membangun Pulau Jawa",D:"Mengeksploitasi SDA untuk kepentingan asing"},jawaban:"B",penjelasan:"Wawasan nusantara dalam bidang ekonomi berarti memandang seluruh wilayah Indonesia sebagai satu kesatuan ekonomi, sehingga pembangunan dan pemerataan hasil-hasilnya harus menjangkau seluruh pelosok nusantara."},
    {no:9,pertanyaan:"Ancaman terhadap ketahanan nasional yang berasal dari luar negeri disebut ancaman...",opsi:{A:"Nirmiliter",B:"Eksternal",C:"Internal",D:"Hibrida"},jawaban:"B",penjelasan:"Ancaman eksternal berasal dari luar negeri, seperti agresi militer, spionase, atau tekanan diplomatik. Sebaliknya, ancaman internal berasal dari dalam negeri seperti separatisme, korupsi, dan konflik sosial."},
    {no:10,pertanyaan:"Konsep geopolitik Indonesia dalam wawasan nusantara berbeda dari geopolitik Barat karena...",opsi:{A:"Indonesia tidak memiliki wilayah laut",B:"Indonesia berfokus pada ekspansi wilayah",C:"Indonesia mengutamakan persatuan dan perdamaian bukan ekspansionisme",D:"Indonesia meniru konsep Lebensraum"},jawaban:"C",penjelasan:"Geopolitik Barat (seperti Lebensraum Jerman Nazi) mendorong ekspansi wilayah. Wawasan nusantara Indonesia justru bertujuan mempertahankan keutuhan wilayah yang sudah ada dan mendorong perdamaian regional."}
  ]},
  8:{pilar:"NKRI",topik:"Otonomi Daerah dalam Bingkai NKRI",soal:[
    {no:1,pertanyaan:"Undang-undang yang menjadi dasar hukum otonomi daerah yang berlaku saat ini adalah...",opsi:{A:"UU No. 5 Tahun 1974",B:"UU No. 22 Tahun 1999",C:"UU No. 23 Tahun 2014",D:"UU No. 32 Tahun 2004"},jawaban:"C",penjelasan:"UU No. 23 Tahun 2014 tentang Pemerintahan Daerah adalah regulasi terkini yang mengatur otonomi daerah, menggantikan UU No. 32 Tahun 2004. UU ini lebih mempertegas pembagian urusan antara pusat, provinsi, dan kabupaten/kota."},
    {no:2,pertanyaan:"Tujuan utama pelaksanaan otonomi daerah adalah...",opsi:{A:"Melemahkan pemerintah pusat",B:"Mempercepat kesejahteraan masyarakat dan peningkatan pelayanan publik",C:"Membentuk negara federal",D:"Memisahkan kekuasaan pusat dan daerah sepenuhnya"},jawaban:"B",penjelasan:"Otonomi daerah bertujuan mendekatkan pelayanan kepada masyarakat sehingga lebih efektif dan efisien, serta mempercepat terwujudnya kesejahteraan masyarakat melalui pemberdayaan potensi daerah."},
    {no:3,pertanyaan:"Urusan yang TIDAK dapat diserahkan kepada daerah karena merupakan urusan absolut pemerintah pusat adalah...",opsi:{A:"Pendidikan dasar",B:"Kesehatan",C:"Pertahanan dan keamanan",D:"Pariwisata"},jawaban:"C",penjelasan:"Enam urusan absolut pemerintah pusat yang tidak bisa didesentralisasi adalah: politik luar negeri, pertahanan, keamanan, yustisi, moneter dan fiskal nasional, serta agama. Ini menyangkut kedaulatan negara."},
    {no:4,pertanyaan:"Dana yang diberikan pemerintah pusat kepada daerah untuk mendanai kebutuhan umum daerah disebut...",opsi:{A:"APBN",B:"Dana Alokasi Umum (DAU)",C:"Anggaran belanja rutin",D:"Dana hibah internasional"},jawaban:"B",penjelasan:"DAU adalah dana dari APBN yang dialokasikan untuk pemerataan kemampuan keuangan antar daerah dalam mendanai kebutuhan penyelenggaraan pemerintahan. Berbeda dengan DAK yang untuk keperluan khusus."},

const state = { shown: [], current: null, answers: {}, scores: {} };

function drawPacket() {
  const rem = [];
  for (let i = 1; i <= 10; i++) if (!state.shown.includes(i)) rem.push(i);
  if (!rem.length) { showToast('Semua paket sudah diundi!'); return; }
  const picked = rem[Math.floor(Math.random() * rem.length)];
  state.current = picked;
  if (!state.shown.includes(picked)) state.shown.push(picked);
  if (!state.answers[picked]) state.answers[picked] = {};
  if (state.scores[picked] === undefined) state.scores[picked] = 0;
  renderSoal(picked);
  updateHistory();
}

function answer(paket, soalIdx, key) {
  const s = BANK[paket].soal[soalIdx];
  if (state.answers[paket][soalIdx] !== undefined) return;
  state.answers[paket][soalIdx] = key;
  const isCorrect = key === s.jawaban;
  if (isCorrect) state.scores[paket] = (state.scores[paket] || 0) + 1;

  const btns = document.querySelectorAll(`.opt-btn[data-paket="${paket}"][data-soal="${soalIdx}"]`);
  btns.forEach(btn => {
    btn.disabled = true;
    const k = btn.dataset.key;
    if (k === s.jawaban) btn.classList.add(isCorrect && k === key ? 'correct' : 'reveal');
    if (k === key && !isCorrect) btn.classList.add('wrong');
  });

  const fb = document.getElementById(`fb-${paket}-${soalIdx}`);
  if (fb) {
    fb.classList.add('show', isCorrect ? 'ok' : 'bad');
    if (isCorrect) {
      fb.innerHTML = `<div class="feedback-title">✓ Benar!</div>`;
    } else {
      fb.innerHTML = `<div class="feedback-title">✗ Salah! Jawaban yang benar: ${s.jawaban}. ${s.opsi[s.jawaban]}</div>
        <div class="feedback-explain">💡 ${s.penjelasan}</div>`;
    }
  }

  const numEl = document.getElementById(`num-${paket}-${soalIdx}`);
  if (numEl) numEl.classList.add(isCorrect ? 'correct' : 'wrong');
  updateScore(paket);
  updateHistory();
}

function updateScore(paket) {
  const total = Object.keys(state.answers[paket]).length;
  document.getElementById('scoreText').textContent = `${state.scores[paket]||0} / ${total}`;
}

function renderSoal(n) {
  const d = BANK[n];
  document.getElementById('resultTitle').textContent = `Paket ${n} [${d.pilar}] — ${d.topik}`;
  document.getElementById('resultMeta').textContent = `4 Pilar Kebangsaan · SMA · ${d.soal.length} Soal Pilihan Ganda`;
  const ans = state.answers[n];
  document.getElementById('scoreText').textContent = `${state.scores[n]||0} / ${Object.keys(ans).length}`;

  document.getElementById('soalList').innerHTML = d.soal.map((s, i) => {
    const chosen = ans[i];
    const answered = chosen !== undefined;
    const isCorrect = chosen === s.jawaban;

    const optHTML = Object.entries(s.opsi).map(([k, v]) => {
      let cls = 'opt-btn';
      if (answered) {
        if (k === s.jawaban) cls += isCorrect && k === chosen ? ' correct' : ' reveal';
        if (k === chosen && !isCorrect) cls += ' wrong';
      }
      return `<button class="${cls}" data-paket="${n}" data-soal="${i}" data-key="${k}"
        ${answered?'disabled':''} onclick="answer(${n},${i},'${k}')">
        <span class="opt-key">${k}</span><span>${v}</span></button>`;
    }).join('');

    let fbHTML = '';
    if (answered) {
      const fbCls = `feedback show ${isCorrect ? 'ok' : 'bad'}`;
      if (isCorrect) {
        fbHTML = `<div class="${fbCls}" id="fb-${n}-${i}"><div class="feedback-title">✓ Benar!</div></div>`;
      } else {
        fbHTML = `<div class="${fbCls}" id="fb-${n}-${i}">
          <div class="feedback-title">✗ Salah! Jawaban yang benar: ${s.jawaban}. ${s.opsi[s.jawaban]}</div>
          <div class="feedback-explain">💡 ${s.penjelasan}</div>
        </div>`;
      }
    } else {
      fbHTML = `<div class="feedback" id="fb-${n}-${i}"></div>`;
    }

    const numCls = answered ? (isCorrect ? 'soal-num correct' : 'soal-num wrong') : 'soal-num';
    return `<div class="soal-item" style="animation-delay:${i*.04}s">
      <div class="soal-header">
        <div class="${numCls}" id="num-${n}-${i}">${s.no}</div>
        <div class="soal-text">${s.pertanyaan}</div>
      </div>
      <div class="soal-options">${optHTML}</div>
      ${fbHTML}
    </div>`;
  }).join('');

  document.getElementById('resultCard').classList.add('visible');
  document.getElementById('resultCard').scrollIntoView({behavior:'smooth',block:'start'});
}

function updateHistory() {
  const sec = document.getElementById('historySection');
  const g = document.getElementById('historyGrid');
  if (!state.shown.length) { sec.style.display='none'; return; }
  sec.style.display='block';
  g.innerHTML = state.shown.map(k => {
    const ans = state.answers[k]||{};
    const sc = state.scores[k]||0;
    return `<div class="history-item" onclick="state.current=${k};renderSoal(${k})">
      <div><div class="history-item-title">Paket ${k} [${BANK[k].pilar}] — ${BANK[k].topik}</div>
      <div class="history-item-meta">${BANK[k].soal.length} soal · Dijawab: ${Object.keys(ans).length}</div></div>
      <span class="history-score">${sc}/${Object.keys(ans).length}</span></div>`;
  }).join('');
}

function resetAll() {
  if (!confirm('Reset semua paket?')) return;
  state.shown=[]; state.current=null; state.answers={}; state.scores={};
  document.getElementById('resultCard').classList.remove('visible');
  document.getElementById('historySection').style.display='none';
  showToast('Semua paket direset');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}
</script>
