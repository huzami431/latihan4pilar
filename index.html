<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Undian Soal HOTS 4 Pilar Kebangsaan</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--red:#c0392b;--dark-red:#922b21;--cream:#fdf6ec;--dark:#1a0a05;--gold:#c9a84c;--green:#27ae60;--green-dim:rgba(39,174,96,.15);}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--dark);color:var(--cream);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden;}
  body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(circle at 20% 20%,rgba(192,57,43,.15) 0%,transparent 50%),radial-gradient(circle at 80% 80%,rgba(201,168,76,.1) 0%,transparent 50%);pointer-events:none;z-index:0;}
  .container{position:relative;z-index:1;max-width:860px;margin:0 auto;padding:40px 20px;}
  header{text-align:center;margin-bottom:48px;}
  h1{font-family:'Playfair Display',serif;font-size:clamp(32px,6vw,56px);font-weight:900;line-height:1;color:var(--cream);margin-bottom:8px;}
  h1 span{color:var(--gold);}
  .subtitle{font-size:13px;color:rgba(253,246,236,.5);letter-spacing:1px;}
  .hots-badge{display:inline-block;background:linear-gradient(135deg,#c9a84c,#e8c96a);color:#1a0a05;font-size:10px;font-weight:800;letter-spacing:2px;text-transform:uppercase;padding:4px 14px;border-radius:20px;margin-bottom:14px;}
  .divider{display:flex;align-items:center;gap:12px;margin:32px 0;opacity:.3;}
  .divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--gold);}
  .divider-icon{color:var(--gold);font-size:18px;}
  /* wheel */
  .draw-section{display:flex;flex-direction:column;align-items:center;gap:20px;margin-bottom:40px;}
  .wheel-wrap{position:relative;width:240px;height:240px;}
  .wheel-wrap canvas{border-radius:50%;box-shadow:0 0 40px rgba(201,168,76,.25);}
  .wheel-pointer{position:absolute;top:-13px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:11px solid transparent;border-right:11px solid transparent;border-top:22px solid var(--gold);filter:drop-shadow(0 2px 4px rgba(0,0,0,.5));z-index:10;}
  .wheel-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:34px;height:34px;background:var(--dark);border:3px solid var(--gold);border-radius:50%;z-index:10;}
  .btn-draw{background:var(--red);color:white;border:none;font-family:'Playfair Display',serif;font-size:18px;font-weight:700;padding:14px 44px;border-radius:4px;cursor:pointer;transition:all .2s;letter-spacing:1px;}
  .btn-draw:hover:not(:disabled){background:var(--dark-red);transform:scale(1.03);box-shadow:0 8px 30px rgba(192,57,43,.5);}
  .btn-draw:disabled{opacity:.5;cursor:not-allowed;}
  .btn-secondary{background:transparent;border:1px solid rgba(201,168,76,.4);color:var(--gold);font-size:13px;padding:10px 24px;border-radius:4px;cursor:pointer;transition:all .2s;}
  .btn-secondary:hover{background:rgba(201,168,76,.1);border-color:var(--gold);}
  /* result */
  .result-card{background:rgba(253,246,236,.03);border:1px solid rgba(201,168,76,.25);border-radius:12px;padding:36px;display:none;animation:fadeUp .4s ease;}
  .result-card.visible{display:block;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
  .result-header{margin-bottom:24px;padding-bottom:20px;border-bottom:1px solid rgba(201,168,76,.2);}
  .result-title{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:var(--gold);}
  .result-meta{font-size:12px;color:rgba(253,246,236,.4);margin-top:4px;letter-spacing:1px;}
  .score-bar{display:flex;align-items:center;gap:12px;background:rgba(253,246,236,.04);border:1px solid rgba(201,168,76,.2);border-radius:8px;padding:12px 18px;margin-bottom:28px;font-size:14px;}
  .score-label{color:rgba(253,246,236,.5);}
  .score-val{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:var(--gold);margin-left:auto;}
  /* soal */
  .soal-list{display:flex;flex-direction:column;gap:28px;}
  .soal-item{animation:fadeUp .3s ease both;}
  .soal-header{display:flex;gap:14px;margin-bottom:8px;}
  .soal-num{background:var(--red);color:white;font-family:'Playfair Display',serif;font-size:13px;font-weight:700;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;}
  .soal-num.correct{background:var(--green);}
  .soal-num.wrong{background:#7f1d1d;}
  .soal-text{font-size:14.5px;line-height:1.75;color:var(--cream);padding-top:4px;flex:1;}
  .soal-stimulus{background:rgba(201,168,76,.07);border-left:3px solid var(--gold);border-radius:0 6px 6px 0;padding:10px 14px;margin:0 0 10px 46px;font-size:13px;color:rgba(253,246,236,.72);line-height:1.65;font-style:italic;}
  /* timer */
  .timer-row{display:flex;align-items:center;gap:10px;margin:0 0 10px 46px;}
  .timer-ring{position:relative;width:36px;height:36px;flex-shrink:0;}
  .timer-ring svg{transform:rotate(-90deg);}
  .timer-ring circle.bg{fill:none;stroke:rgba(253,246,236,.1);stroke-width:3;}
  .timer-ring circle.prog{fill:none;stroke:var(--gold);stroke-width:3;stroke-linecap:round;stroke-dasharray:94.2;stroke-dashoffset:0;transition:stroke-dashoffset .9s linear,stroke .3s;}
  .timer-ring circle.prog.warn{stroke:#e67e22;}
  .timer-ring circle.prog.danger{stroke:var(--red);}
  .timer-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--gold);}
  .timer-num.warn{color:#e67e22;}
  .timer-num.danger{color:var(--red);}
  .timer-label{font-size:11px;color:rgba(253,246,236,.4);}
  /* options */
  .soal-options{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-left:46px;}
  .opt-btn{background:rgba(253,246,236,.05);border:1px solid rgba(253,246,236,.12);border-radius:8px;padding:10px 14px;cursor:pointer;text-align:left;font-size:13px;color:rgba(253,246,236,.8);transition:all .2s;display:flex;gap:10px;align-items:flex-start;}
  .opt-btn:hover:not(:disabled){background:rgba(201,168,76,.1);border-color:rgba(201,168,76,.4);color:var(--cream);}
  .opt-btn:disabled{cursor:default;}
  .opt-btn.correct{background:var(--green-dim);border-color:var(--green);color:#6ee7a0;}
  .opt-btn.wrong{background:rgba(192,57,43,.15);border-color:var(--red);color:#fca5a5;}
  .opt-btn.reveal{background:var(--green-dim);border-color:var(--green);color:#6ee7a0;}
  .opt-btn.timeout{background:rgba(201,168,76,.08);border-color:rgba(201,168,76,.2);color:rgba(253,246,236,.35);}
  .opt-key{font-weight:700;min-width:18px;color:var(--gold);opacity:.8;}
  .opt-btn.correct .opt-key,.opt-btn.reveal .opt-key{color:#6ee7a0;}
  .opt-btn.wrong .opt-key{color:#fca5a5;}
  /* feedback */
  .feedback{margin-left:46px;margin-top:10px;border-radius:8px;padding:12px 14px;display:none;font-size:13px;line-height:1.6;}
  .feedback.show{display:block;}
  .feedback.ok{background:rgba(39,174,96,.12);border:1px solid rgba(39,174,96,.3);color:#6ee7a0;}
  .feedback.bad{background:rgba(192,57,43,.12);border:1px solid rgba(192,57,43,.3);color:#fca5a5;}
  .feedback.timeout-fb{background:rgba(201,168,76,.08);border:1px solid rgba(201,168,76,.25);color:rgba(253,246,236,.6);}
  .feedback-title{font-weight:700;margin-bottom:4px;font-size:13px;}
  .feedback-explain{color:rgba(253,246,236,.7);font-size:12.5px;margin-top:6px;line-height:1.65;border-top:1px solid rgba(253,246,236,.1);padding-top:6px;}
  /* history */
  .history-section{margin-top:48px;border-top:1px solid rgba(201,168,76,.15);padding-top:32px;}
  .section-label{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:16px;font-weight:600;}
  .history-grid{display:flex;flex-direction:column;gap:8px;}
  .history-item{display:flex;align-items:center;justify-content:space-between;background:rgba(253,246,236,.03);border:1px solid rgba(253,246,236,.07);border-radius:6px;padding:12px 16px;font-size:14px;cursor:pointer;}
  .history-item:hover{border-color:rgba(201,168,76,.3);background:rgba(201,168,76,.05);}
  .history-item-title{font-weight:500;}
  .history-item-meta{font-size:11px;color:rgba(253,246,236,.4);margin-top:2px;}
  .history-score{font-family:'Playfair Display',serif;font-size:16px;font-weight:700;color:var(--gold);}
  .toast{position:fixed;bottom:24px;right:24px;background:var(--gold);color:var(--dark);font-size:13px;font-weight:600;padding:12px 20px;border-radius:6px;z-index:999;opacity:0;transform:translateY(10px);transition:all .3s;pointer-events:none;}
  .toast.show{opacity:1;transform:translateY(0);}
  @media(max-width:560px){.soal-options{grid-template-columns:1fr;}.result-card{padding:20px;}.feedback,.timer-row,.soal-stimulus{margin-left:0;}}
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="hots-badge">⚡ Higher Order Thinking Skills</div>
    <h1>Undian <span>Soal</span></h1>
    <p class="subtitle">Pancasila · UUD 1945 · TAP MPR · Bhinneka Tunggal Ika · HOTS · 4 Paket</p>
  </header>
  <div class="divider"><span class="divider-icon">❖</span></div>
  <div class="draw-section">
    <div class="wheel-wrap">
      <div class="wheel-pointer"></div>
      <canvas id="wheelCanvas" width="240" height="240"></canvas>
      <div class="wheel-center"></div>
    </div>
    <button class="btn-draw" id="btnSpin" onclick="spinWheel()">🌀 Putar Roda</button>
    <button class="btn-secondary" onclick="resetAll()">↺ Reset Semua</button>
  </div>
  <div class="result-card" id="resultCard">
    <div class="result-header">
      <div class="result-title" id="resultTitle"></div>
      <div class="result-meta" id="resultMeta"></div>
    </div>
    <div class="score-bar"><span class="score-label">Skor</span><span id="scoreText" class="score-val">0 / 0</span></div>
    <div class="soal-list" id="soalList"></div>
  </div>
  <div class="history-section" id="historySection" style="display:none">
    <div class="section-label">Riwayat Paket</div>
    <div class="history-grid" id="historyGrid"></div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
const TIMER_SEC=45, CIRC=2*Math.PI*15;
const COLORS=['#c0392b','#c9a84c','#922b21','#b8952a'];

const BANK={
  1:{
    topik:"Pancasila sebagai Dasar Negara, Ideologi, dan Norma Tertinggi",
    soal:[
      {no:1,stimulus:"Seorang anggota DPR mengusulkan agar Sila Pertama diganti karena dianggap tidak relevan dengan perkembangan sekularisme modern.",pertanyaan:"Alasan konstitusional paling tepat untuk menolak usulan tersebut adalah...",opsi:{A:"Karena perubahan Pancasila memerlukan referendum nasional",B:"Karena Pancasila sebagai staatsfundamentalnorm tidak dapat diubah bahkan oleh MPR; mengubahnya berarti membubarkan dan mendirikan negara baru",C:"Karena Pancasila sudah dipakai sangat lama",D:"Karena sekularisme lebih baik dari Pancasila"},jawaban:"B",penjelasan:"Pancasila sebagai staatsfundamentalnorm (norma fundamen negara) berada di atas konstitusi itu sendiri. Pembukaan UUD 1945 tidak dapat diubah (TAP MPR No. III/MPR/2000 dan Pasal 37 ayat 5 UUD 1945), dan Pancasila yang termuat di dalamnya menjadi fondasi legitimasi NKRI."},
      {no:2,pertanyaan:"TAP MPR No. XVIII/MPR/1998 mencabut TAP MPR No. II/MPR/1978 tentang P4. Implikasi konstitusional pencabutan ini adalah...",opsi:{A:"Pancasila tidak lagi menjadi dasar negara",B:"Negara tidak perlu lagi mensosialisasikan Pancasila",C:"Pedoman pemasyarakatan Pancasila (P4) dicabut namun Pancasila tetap sebagai dasar negara yang tidak berubah; internalisasinya diserahkan kepada masyarakat secara demokratis",D:"TAP MPR tidak memiliki kekuatan hukum"},jawaban:"C",penjelasan:"Pencabutan P4 (TAP No. XVIII/1998) hanya mencabut mekanisme indoktrinasi Orde Baru, bukan mencabut Pancasila sebagai dasar negara. Pancasila tetap kokoh, hanya metode sosialisasinya yang didemokratisasi."},
      {no:3,stimulus:"Sebuah partai politik mendaftarkan diri dengan ideologi yang secara eksplisit menolak Sila Ketiga dan ingin mengganti NKRI dengan negara federasi berbasis etnis.",pertanyaan:"Berdasarkan hukum positif Indonesia, partai tersebut dapat dibubarkan karena...",opsi:{A:"Federasi lebih baik dari kesatuan",B:"UU Parpol mewajibkan seluruh parpol mencantumkan Pancasila sebagai asas, dan TAP MPR menegaskan NKRI tidak boleh diubah",C:"Partai baru tidak boleh dibentuk",D:"Hanya MK yang boleh menilai ideologi parpol"},jawaban:"B",penjelasan:"UU No. 2 Tahun 2011 tentang Parpol mewajibkan asas Pancasila. MK berwenang membubarkan parpol yang bertentangan dengan UUD dan Pancasila. NKRI tidak dapat diubah berdasarkan Pasal 37 ayat (5) UUD 1945."},
      {no:4,pertanyaan:"Perbedaan antara nilai dasar, nilai instrumental, dan nilai praksis Pancasila yang paling tepat dalam konteks hukum adalah...",opsi:{A:"Ketiganya dapat diubah oleh DPR",B:"Nilai dasar (sila-sila) bersifat absolut; nilai instrumental (UUD, UU, TAP MPR) dapat berkembang; nilai praksis (perilaku nyata) harus selaras dengan keduanya",C:"Hanya nilai praksis yang mengikat secara hukum",D:"Nilai instrumental lebih tinggi dari nilai dasar"},jawaban:"B",penjelasan:"Tiga lapisan nilai Pancasila: (1) Nilai dasar—sila-sila yang absolut, (2) Nilai instrumental—UUD, UU, TAP MPR yang merupakan penjabaran dan dapat direvisi, (3) Nilai praksis—pengamalan nyata dalam kebijakan dan perilaku."},
      {no:5,stimulus:"Mahkamah Konstitusi menguji sebuah UU dan menemukan bahwa salah satu pasalnya bertentangan dengan Sila Keempat Pancasila dan Pasal 28 UUD 1945.",pertanyaan:"Dalam hierarki norma, urutan yang tepat dari tertinggi ke terendah adalah...",opsi:{A:"UU → UUD 1945 → Pancasila",B:"UUD 1945 → Pancasila → UU",C:"Pancasila → UUD 1945 → UU",D:"TAP MPR → Pancasila → UUD 1945"},jawaban:"C",penjelasan:"Berdasarkan teori Stufenbau Hans Kelsen yang diadaptasi dalam hukum Indonesia: Pancasila (Grundnorm/staatsfundamentalnorm) → UUD 1945 → TAP MPR → UU/Perppu → PP → Perpres → Perda. UU tidak boleh bertentangan dengan UUD, dan UUD tidak boleh bertentangan dengan Pancasila."},
      {no:6,stimulus:"Indonesia sering disebut sebagai 'jalan tengah' antara liberalisme dan komunisme dalam konteks ideologi.",pertanyaan:"Aspek Pancasila yang paling mencerminkan posisi 'jalan tengah' tersebut adalah...",opsi:{A:"Pancasila mengadopsi liberalisme penuh",B:"Pancasila mengintegrasikan kebebasan individu (Sila II) dengan tanggung jawab sosial (Sila V) dan nilai Ketuhanan (Sila I) tanpa absolutisme individual maupun kolektif",C:"Pancasila adalah bentuk komunisme yang dimodifikasi",D:"Pancasila menolak semua ideologi lain"},jawaban:"B",penjelasan:"Liberalisme mengabsolutkan individu; komunisme mengabsolutkan kolektif/negara. Pancasila menempatkan individu dalam konteks sosial (Sila III–V) dengan landasan moral Ketuhanan (Sila I) dan kemanusiaan (Sila II)—posisi yang genuinely unik."},
      {no:7,pertanyaan:"TAP MPR No. I/MPR/2003 mengatur tentang peninjauan TAP MPR/MPRS. Signifikansi TAP ini dalam hierarki hukum Indonesia adalah...",opsi:{A:"Menghapus semua TAP MPR dari hierarki hukum",B:"Mengklasifikasikan TAP MPR menjadi beberapa kelompok: yang masih berlaku, yang sudah selesai, yang dicabut, dan yang dinyatakan tidak berlaku—memberikan kepastian hukum hierarki norma",C:"Menjadikan TAP MPR setara dengan UU",D:"Membubarkan MPR sebagai lembaga negara"},jawaban:"B",penjelasan:"TAP MPR No. I/MPR/2003 melakukan inventarisasi dan klasifikasi TAP MPR/MPRS 1960–2002 menjadi empat kelompok, sehingga memberikan kepastian hukum tentang TAP mana yang masih mengikat dan berlaku."},
      {no:8,stimulus:"Seorang pejabat tinggi berargumen: 'Pancasila hanya filosofi, bukan hukum, sehingga tidak mengikat tindakan saya sebagai pejabat negara.'",pertanyaan:"Argumen pejabat tersebut keliru karena...",opsi:{A:"Filosofi tidak pernah mengikat siapapun",B:"Pancasila memiliki kekuatan hukum mengikat karena termuat dalam Pembukaan UUD 1945 dan ditetapkan sebagai sumber dari segala sumber hukum negara oleh UU No. 12 Tahun 2011",C:"Pejabat negara kebal dari Pancasila",D:"Pancasila hanya mengikat rakyat biasa"},jawaban:"B",penjelasan:"UU No. 12 Tahun 2011 Pasal 2 menegaskan Pancasila sebagai sumber dari segala sumber hukum negara. Pancasila bukan sekadar filosofi abstrak—ia memiliki kekuatan hukum yang mengikat seluruh warga negara, termasuk pejabat."},
      {no:9,pertanyaan:"Konsep 'Pancasila sebagai kepribadian bangsa' berbeda dari 'Pancasila sebagai dasar negara' karena...",opsi:{A:"Keduanya sepenuhnya identik",B:"Sebagai kepribadian, Pancasila mencerminkan karakter dan jati diri bangsa yang hidup sebelum NKRI berdiri; sebagai dasar negara, Pancasila adalah landasan juridis formal penyelenggaraan negara",C:"Kepribadian bangsa lebih penting dari dasar negara",D:"Pancasila sebagai dasar negara tidak memiliki dimensi kultural"},jawaban:"B",penjelasan:"Pancasila sebagai kepribadian bangsa menekankan dimensi sosiologis-kultural (nilai-nilai yang sudah hidup sebelum 1945). Pancasila sebagai dasar negara menekankan dimensi juridis-formal (sumber norma hukum penyelenggaraan negara)."},
      {no:10,stimulus:"Sebuah peraturan daerah melarang penjualan makanan di siang hari bulan Ramadhan tanpa pengecualian bagi pemeluk agama lain.",pertanyaan:"Perda tersebut bertentangan dengan nilai Pancasila karena...",opsi:{A:"Perda tidak boleh mengatur hal apapun",B:"Melanggar Sila Pertama (kebebasan beragama bagi semua) dan Sila Kelima (keadilan bagi seluruh rakyat), serta hierarki hukum karena perda tidak boleh bertentangan dengan UUD 1945 Pasal 28E",C:"Ramadhan tidak diakui negara",D:"Hanya DPR yang boleh mengatur agama"},jawaban:"B",penjelasan:"Perda tersebut mendiskriminasi non-Muslim. Sila Pertama menjamin kebebasan beragama semua agama. Pasal 28E UUD menjamin kebebasan menjalankan agama. Secara hierarki hukum, perda tidak boleh bertentangan dengan UUD (lex superior derogat legi inferiori)."},
      {no:11,pertanyaan:"Mengapa Pembukaan UUD 1945 yang memuat Pancasila tidak dapat diubah bahkan oleh MPR yang merupakan lembaga tertinggi penjelmaan kedaulatan rakyat?",opsi:{A:"Karena MPR tidak berwenang bersidang",B:"Karena Pembukaan memuat proklamasi kemerdekaan dan Pancasila sebagai staatsfundamentalnorm—mengubahnya berarti membubarkan negara proklamasi dan mendirikan negara baru yang berbeda secara yuridis",C:"Karena Pembukaan tidak penting secara hukum",D:"Karena hanya presiden yang boleh mengubah Pembukaan"},jawaban:"B",penjelasan:"Pasal 37 ayat (5) UUD 1945 secara eksplisit melarang perubahan NKRI. Pembukaan memuat tujuan negara dan Pancasila—kedua hal ini adalah fondasi legitimasi NKRI. Mengubahnya sama dengan membubarkan negara yang ada dan mendirikan negara baru."},
      {no:12,stimulus:"Dalam era digital, muncul gerakan yang menggunakan narasi 'demokrasi' dan 'kebebasan' untuk mengganti Pancasila dengan ideologi transnasional.",pertanyaan:"Relevansi Pancasila sebagai 'filter ideologi' dalam konteks ini adalah...",opsi:{A:"Pancasila melarang semua kebebasan",B:"Sebagai ideologi terbuka, Pancasila menyerap nilai universal yang selaras (kebebasan, keadilan) sambil menolak nilai yang bertentangan dengan kepribadian bangsa; ini bukan dogmatisme tapi seleksi berbasis jati diri",C:"Indonesia harus menutup diri dari semua pengaruh luar",D:"Demokrasi liberal dan Pancasila identik"},jawaban:"B",penjelasan:"Pancasila sebagai ideologi terbuka memiliki kemampuan menyerap nilai positif universal dan menolak nilai yang bertentangan dengan karakteristik bangsa Indonesia. Ini adalah fungsi filter yang membedakan Pancasila dari ideologi tertutup yang menolak semua nilai luar."},
      {no:13,pertanyaan:"Dalam konteks TAP MPR, lembaga mana yang berwenang menyatakan suatu TAP MPR tidak berlaku lagi?",opsi:{A:"DPR melalui UU",B:"Presiden melalui Perpres",C:"MPR sendiri melalui ketetapan atau MK melalui judicial review jika TAP tersebut sudah ditetapkan menjadi UU",D:"Mahkamah Agung"},jawaban:"C",penjelasan:"TAP MPR hanya dapat dicabut atau dinyatakan tidak berlaku oleh MPR sendiri. Jika materi TAP MPR kemudian diatur dalam UU, maka MK berwenang mengujinya. MA berwenang menguji peraturan di bawah UU, bukan TAP MPR."},
      {no:14,pertanyaan:"Perbedaan antara Pancasila sebagai 'ideologi terbuka' dengan relativisme moral adalah...",opsi:{A:"Keduanya sama-sama mengizinkan semua nilai",B:"Pancasila memiliki nilai dasar yang absolut dan tidak berubah (sila-sila); relativisme moral menganggap tidak ada nilai absolut. Pancasila terbuka hanya pada penjabaran, bukan pada fondasi",C:"Relativisme moral identik dengan Pancasila",D:"Pancasila melarang semua perubahan nilai"},jawaban:"B",penjelasan:"Relativisme moral menyatakan semua nilai bersifat relatif dan tidak ada yang absolut. Pancasila justru memiliki nilai dasar absolut (sila-sila tidak dapat diubah), hanya cara penjabarannya yang dapat berkembang."},
      {no:15,stimulus:"Seorang akademisi berpendapat bahwa TAP MPR No. VII/MPR/2001 tentang Visi Indonesia Masa Depan seharusnya menjadi acuan utama RPJPN (Rencana Pembangunan Jangka Panjang Nasional).",pertanyaan:"Posisi TAP MPR tersebut dalam hierarki hukum nasional yang tepat adalah...",opsi:{A:"Lebih rendah dari peraturan presiden",B:"Setara dengan undang-undang",C:"Berada di bawah UUD 1945 namun di atas undang-undang; mengikat seluruh lembaga negara dan warga negara",D:"Sudah tidak berlaku karena reformasi"},jawaban:"C",penjelasan:"Berdasarkan UU No. 12 Tahun 2011 dan TAP MPR No. I/MPR/2003, TAP MPR yang masih berlaku berada dalam hierarki di bawah UUD 1945 namun di atas UU. TAP tersebut mengikat semua lembaga negara dan warga negara."}
    ]
  },
  2:{
    topik:"UUD 1945: Amandemen, Kelembagaan, dan Hak Konstitusional",
    soal:[
      {no:1,pertanyaan:"Pasca-amandemen, MPR tidak lagi disebut 'lembaga tertinggi negara'. Implikasi konstitusional perubahan ini adalah...",opsi:{A:"MPR tidak memiliki kewenangan apapun",B:"Semua lembaga negara kini sejajar dalam bidangnya masing-masing dengan mekanisme checks and balances, tidak ada lagi lembaga 'tertinggi'",C:"Presiden menjadi lembaga tertinggi",D:"MK menjadi lembaga tertinggi"},jawaban:"B",penjelasan:"Amandemen UUD 1945 menghapus konsep 'lembaga tertinggi'. Kini berlaku prinsip checks and balances: DPR, DPD, Presiden, MA, MK, BPK, dan KY memiliki kewenangan setara dalam bidangnya, saling mengawasi dan mengimbangi."},
      {no:2,stimulus:"Presiden mengeluarkan Perppu di luar masa reses DPR dengan alasan 'kegentingan yang memaksa'. DPR menilai kegentingan tersebut tidak ada.",pertanyaan:"Mekanisme konstitusional yang tepat untuk menyelesaikan sengketa ini adalah...",opsi:{A:"MA membatalkan Perppu",B:"DPR wajib membahas Perppu dalam sidang berikutnya dan dapat menolaknya; jika Perppu ditetapkan jadi UU, MK dapat menguji konstitusionalitasnya termasuk syarat 'kegentingan memaksa'",C:"Perppu otomatis berlaku setelah 60 hari",D:"Presiden dapat mengabaikan penolakan DPR"},jawaban:"B",penjelasan:"Pasal 22 UUD 1945: Perppu harus mendapat persetujuan DPR pada sidang berikutnya. Jika ditolak, Perppu harus dicabut. MK dalam Putusan No. 138/PUU-VII/2009 menegaskan MK berwenang menguji Perppu."},
      {no:3,pertanyaan:"Putusan MK bersifat 'erga omnes' dan 'final and binding'. Konsekuensi hukum dari sifat ini adalah...",opsi:{A:"Putusan MK hanya mengikat pihak yang berperkara",B:"Putusan MK berlaku umum untuk semua pihak dan tidak dapat digugat ke lembaga manapun; semua produk hukum wajib menyesuaikan dengan putusan MK",C:"DPR dapat mengabaikan putusan MK",D:"Presiden dapat membatalkan putusan MK"},jawaban:"B",penjelasan:"Erga omnes berarti berlaku untuk semua orang (bukan hanya pihak berperkara). Final and binding berarti tidak ada upaya hukum lain. Seluruh lembaga negara dan masyarakat wajib mematuhi dan menyesuaikan diri."},
      {no:4,stimulus:"Pasal 28J ayat (2) UUD 1945 memungkinkan pembatasan HAM melalui undang-undang. Pemerintah menggunakan pasal ini untuk membatasi kebebasan pers.",pertanyaan:"Syarat konstitusional yang harus dipenuhi agar pembatasan tersebut sah adalah...",opsi:{A:"Cukup dengan keputusan presiden",B:"Harus melalui UU, bersifat proporsional, semata-mata untuk menjamin HAM orang lain dan memenuhi tuntutan moral, keamanan, dan ketertiban umum yang adil dalam masyarakat demokratis",C:"Pemerintah bebas membatasi pers kapan saja",D:"Cukup persetujuan DPR tanpa undang-undang"},jawaban:"B",penjelasan:"Pasal 28J ayat (2) mensyaratkan: (1) ditetapkan dengan UU, (2) semata-mata untuk menjamin HAM orang lain, (3) memenuhi tuntutan moral, keamanan, ketertiban umum yang adil. Syarat ini kumulatif dan ketat—pemerintah tidak boleh sewenang-wenang."},
      {no:5,pertanyaan:"Dalam mekanisme pemakzulan presiden, keterlibatan MK berbeda dari keterlibatan lembaga lain karena...",opsi:{A:"MK yang memutuskan pemakzulan secara final",B:"MK hanya memeriksa aspek yuridis (apakah presiden melanggar hukum), sementara keputusan politik pemakzulan tetap di tangan MPR",C:"MK tidak terlibat dalam proses pemakzulan",D:"MK dan DPR bersama-sama memutuskan pemakzulan"},jawaban:"B",penjelasan:"Prosedur pemakzulan: DPR mengajukan → MK memeriksa aspek hukum (pendapat hukum, bukan vonis) → MPR memutuskan secara politik. MK hanya memberikan pendapat hukum, bukan keputusan final. Putusan final ada di MPR."},
      {no:6,stimulus:"DPD mengajukan RUU tentang Dana Desa namun DPR menolak membahasnya dengan alasan DPD tidak memiliki inisiatif legislasi penuh.",pertanyaan:"Secara konstitusional, posisi DPD memang terbatas karena...",opsi:{A:"DPD tidak diatur dalam UUD 1945",B:"DPD hanya dapat mengajukan RUU terkait daerah kepada DPR dan memberi pertimbangan, tetapi tidak memiliki hak co-decision dalam pengesahan UU",C:"DPD harus meminta izin presiden untuk mengajukan RUU",D:"RUU hanya boleh diajukan oleh presiden"},jawaban:"B",penjelasan:"Pasal 22D UUD 1945 membatasi kewenangan DPD: dapat mengajukan RUU bidang tertentu ke DPR, memberi pertimbangan, dan ikut membahas—tapi tidak memiliki hak memutuskan. Ini adalah desain konstitusional yang membedakan DPD dari Senat di negara federal."},
      {no:7,pertanyaan:"Putusan MK yang menyatakan presidential threshold bertentangan dengan UUD 1945 merupakan contoh fungsi MK sebagai 'negative legislator'. Ini berarti...",opsi:{A:"MK membuat aturan baru pengganti pasal yang dibatalkan",B:"MK membatalkan norma yang inkonstitusional tanpa membuat norma baru; menciptakan kekosongan hukum yang harus diisi DPR",C:"MK mengambil alih fungsi DPR",D:"MK dan DPR bersama membuat norma baru"},jawaban:"B",penjelasan:"Negative legislator (Kelsen): MK hanya membatalkan norma yang bertentangan dengan konstitusi, tidak menciptakan norma baru. Kekosongan hukum yang timbul menjadi mandat bagi DPR dan presiden untuk membuat norma pengganti."},
      {no:8,stimulus:"Presiden ingin mengangkat seorang menteri yang memiliki kewarganegaraan ganda. Calon menteri tersebut berpendapat hal itu sah karena ia lebih kompeten.",pertanyaan:"Secara konstitusional, tindakan tersebut bermasalah karena...",opsi:{A:"Menteri harus berasal dari partai koalisi",B:"UUD 1945 Pasal 26 menegaskan warga negara adalah yang asli Indonesia atau telah disahkan; kewarganegaraan ganda berpotensi menimbulkan konflik loyalitas dalam jabatan publik",C:"Kompetensi bukan syarat pengangkatan menteri",D:"Presiden tidak berwenang mengangkat menteri"},jawaban:"B",penjelasan:"Jabatan menteri memerlukan loyalitas tunggal kepada NKRI. Kewarganegaraan ganda berpotensi menimbulkan konflik kepentingan dan loyalitas. UU Kewarganegaraan melarang WNI memiliki kewarganegaraan lain."},
      {no:9,pertanyaan:"Perbedaan antara hak yang bersifat 'non-derogable' dan 'derogable' dalam UUD 1945 yang paling prinsipil adalah...",opsi:{A:"Non-derogable lebih mudah dibatasi",B:"Non-derogable (hak hidup, bebas penyiksaan, hak beragama) tidak dapat dikurangi dalam keadaan apapun termasuk perang atau darurat; derogable dapat dibatasi dengan syarat proporsionalitas yang ketat",C:"Semua hak dalam UUD adalah derogable",D:"Pemerintah bebas mengklasifikasikan hak mana yang derogable"},jawaban:"B",penjelasan:"Non-derogable rights (Pasal 28I ayat 1) bersifat mutlak—bahkan dalam keadaan darurat sekalipun tidak boleh dikurangi. Derogable rights dapat dibatasi dengan syarat: melalui UU, proporsional, tidak menghancurkan esensi hak."},
      {no:10,stimulus:"BPK menemukan kerugian negara Rp800 miliar dalam audit BUMN. Hasilnya diserahkan ke DPR, namun tidak ada tindak lanjut selama 2 tahun.",pertanyaan:"Kelemahan sistemik yang teridentifikasi dari kasus ini adalah...",opsi:{A:"BPK harus menangani sendiri tindak lanjut audit",B:"Tidak ada mekanisme pemaksa yang mengikat DPR untuk menindaklanjuti temuan BPK; ini adalah celah dalam sistem akuntabilitas yang perlu ditutup melalui reformasi kelembagaan",C:"BPK tidak berwenang mengaudit BUMN",D:"Temuan audit tidak memiliki kekuatan hukum"},jawaban:"B",penjelasan:"BPK hanya berwenang memeriksa dan melaporkan (Pasal 23E UUD). Tidak ada norma yang memaksa DPR menindaklanjuti dalam waktu tertentu. Ini adalah celah accountability gap dalam desain kelembagaan yang perlu ditutup."},
      {no:11,pertanyaan:"Pengujian undang-undang (judicial review) di Indonesia memiliki dualisme karena...",opsi:{A:"Tidak ada dualisme, semua diserahkan ke MK",B:"MK berwenang menguji UU terhadap UUD; MA berwenang menguji peraturan di bawah UU terhadap UU—dualisme ini terkadang menimbulkan inkonsistensi putusan",C:"MA berwenang menguji UU terhadap UUD",D:"DPR yang berwenang menguji semua peraturan"},jawaban:"B",penjelasan:"Dualisme judicial review: MK (Pasal 24C) menguji UU vs UUD; MA (Pasal 24A) menguji peraturan di bawah UU vs UU. Dualisme ini dapat menimbulkan putusan yang tidak konsisten jika materi yang diuji saling berkaitan."},
      {no:12,stimulus:"Amandemen keempat UUD 1945 (2002) memasukkan ketentuan bahwa negara memprioritaskan anggaran pendidikan minimal 20% dari APBN.",pertanyaan:"Ketentuan ini dalam teori hukum konstitusi dikategorikan sebagai...",opsi:{A:"Hak negatif (negative rights) yang melarang negara campur tangan",B:"Hak positif (positive rights) yang mewajibkan negara mengalokasikan sumber daya aktif untuk merealisasikan hak pendidikan warga negara",C:"Kewajiban yang tidak mengikat (soft law)",D:"Anjuran moral tanpa kekuatan hukum"},jawaban:"B",penjelasan:"Pasal 31 ayat (4) UUD merupakan positive right: negara wajib secara aktif mengalokasikan anggaran. Berbeda dari negative right yang hanya melarang negara melanggar. Ketentuan ini bersifat mengikat dan dapat menjadi dasar gugatan konstitusional."},
      {no:13,pertanyaan:"Hubungan antara Komisi Yudisial (KY) dan Mahkamah Agung (MA) dalam pengawasan hakim sering menimbulkan konflik karena...",opsi:{A:"KY tidak diakui UUD 1945",B:"Terdapat ketegangan antara fungsi pengawasan eksternal KY (akuntabilitas) dan prinsip independensi peradilan yang dijaga MA; MK telah beberapa kali diminta menafsirkan batas kewenangan keduanya",C:"MA lebih berkuasa dari KY",D:"KY boleh memecat hakim tanpa persetujuan siapapun"},jawaban:"B",penjelasan:"MK dalam beberapa putusannya (seperti Putusan No. 005/PUU-IV/2006) telah menafsirkan kewenangan KY. Ketegangan antara akuntabilitas (KY) dan independensi (MA) adalah dilema struktural yang inheren dalam desain kelembagaan."},
      {no:14,stimulus:"Indonesia menerapkan sistem bikameral 'soft' (DPR dan DPD) yang berbeda dari bikameral 'kuat' seperti Amerika Serikat (House dan Senate).",pertanyaan:"Karakteristik bikameral 'soft' Indonesia yang membedakannya dari bikameral 'kuat' adalah...",opsi:{A:"DPD memiliki hak veto terhadap semua UU",B:"DPD memiliki kewenangan terbatas (hanya bidang tertentu dan tidak memiliki hak co-decision penuh), berbeda dari Senate AS yang memiliki kewenangan legislasi sepenuhnya setara dengan House",C:"DPR tidak memiliki kewenangan lebih dari DPD",D:"Bikameral soft lebih demokratis dari bikameral kuat"},jawaban:"B",penjelasan:"Dalam bikameral kuat (AS), kedua kamar memiliki kewenangan legislasi setara. Indonesia menerapkan bikameral soft di mana DPD hanya dapat terlibat dalam bidang tertentu dan tidak memiliki hak memutuskan bersama DPR dalam pengesahan UU."},
      {no:15,pertanyaan:"Prinsip 'checks and balances' dalam UUD 1945 pasca-amandemen paling konkret terlihat dalam...",opsi:{A:"Presiden dapat membubarkan DPR kapan saja",B:"Saling mengawasi antara eksekutif-legislatif-yudikatif: DPR dapat mengimpeach presiden, MK dapat membatalkan UU buatan DPR, presiden mengajukan RUU yang harus disetujui DPR",C:"DPR memegang semua kekuasaan negara",D:"MK berada di bawah MA secara hierarki"},jawaban:"B",penjelasan:"Checks and balances dalam UUD 1945: eksekutif-legislatif saling terkait dalam pembentukan UU; DPR dapat memberhentikan presiden; MK dapat membatalkan UU; presiden mengangkat menteri tanpa persetujuan DPR. Ini adalah mekanisme saling mengawasi yang seimbang."}
    ]
  },
  3:{
    topik:"TAP MPR dan Bhinneka Tunggal Ika dalam Kehidupan Berbangsa",
    soal:[
      {no:1,pertanyaan:"TAP MPR No. VI/MPR/2001 tentang Etika Kehidupan Berbangsa memiliki relevansi dalam konteks Bhinneka Tunggal Ika karena...",opsi:{A:"TAP tersebut melarang semua perbedaan pendapat",B:"TAP tersebut menetapkan etika yang menjadi landasan moral bagi kehidupan masyarakat majemuk, termasuk etika toleransi, kebersamaan, dan penghargaan terhadap perbedaan",C:"TAP tersebut sudah dicabut dan tidak berlaku",D:"TAP tersebut hanya berlaku untuk pejabat negara"},jawaban:"B",penjelasan:"TAP MPR No. VI/MPR/2001 yang masih berlaku berdasarkan TAP No. I/MPR/2003 menetapkan etika kehidupan berbangsa yang mencakup etika sosial-budaya dan etika pemerintahan yang menjadi moral code bagi masyarakat majemuk Indonesia."},
      {no:2,stimulus:"Sebuah kabupaten melarang warga dari suku tertentu untuk memiliki lahan pertanian di wilayahnya, dengan alasan 'menjaga kearifan lokal'.",pertanyaan:"Kebijakan tersebut bertentangan dengan prinsip Bhinneka Tunggal Ika dan hukum positif karena...",opsi:{A:"Kearifan lokal tidak memiliki nilai hukum",B:"Diskriminasi berbasis suku melanggar Pasal 28I UUD 1945, UU No. 40 Tahun 2008 tentang Penghapusan Diskriminasi Ras dan Etnis, serta TAP MPR tentang etika berbangsa",C:"Hanya pemerintah pusat yang boleh mengatur lahan",D:"Tidak ada masalah selama disetujui warga setempat"},jawaban:"B",penjelasan:"Pasal 28I ayat (2) UUD melarang diskriminasi berbasis ras dan etnis. UU No. 40/2008 secara spesifik mengatur penghapusan diskriminasi ras dan etnis. Diskriminasi dalam kepemilikan lahan berbasis suku adalah pelanggaran hukum berat."},
      {no:3,pertanyaan:"Makna 'tan hana dharma mangrwa' dalam Kakawin Sutasoma yang menjadi sumber semboyan Bhinneka Tunggal Ika memiliki implikasi filosofis bahwa...",opsi:{A:"Ada dua kebenaran yang bertentangan",B:"Tidak ada kebenaran yang mendua: perbedaan lahiriah (agama Buddha dan Hindu pada zamannya) tidak menghalangi persatuan dalam kebenaran yang lebih tinggi—relevan untuk Indonesia yang majemuk",C:"Agama adalah sumber perpecahan",D:"Hanya satu agama yang benar"},jawaban:"B",penjelasan:"'Tan hana dharma mangrwa' berarti tidak ada kebenaran yang mendua/ganda. Konteks aslinya: meski berbeda agama (Buddha-Hindu), ada kebenaran universal yang mempersatukan. Ini adalah landasan filosofis toleransi dan persatuan dalam keberagaman."},
      {no:4,stimulus:"Konflik antar kelompok agama di suatu daerah diperparah oleh penyebaran hoaks di media sosial yang didesain untuk memperkeruh suasana.",pertanyaan:"Dalam kerangka TAP MPR dan UUD 1945, tanggung jawab negara dalam situasi ini adalah...",opsi:{A:"Membiarkan masyarakat menyelesaikan sendiri",B:"Negara wajib melindungi warga dari ancaman yang merusak persatuan (Pasal 30 UUD), menegakkan hukum terhadap penyebar hoaks, dan menjalankan TAP MPR tentang etika berbangsa secara aktif",C:"Negara hanya boleh bertindak setelah konflik fisik terjadi",D:"Tanggung jawab ada pada tokoh agama saja"},jawaban:"B",penjelasan:"Negara memiliki tanggung jawab konstitusional melindungi warga (Pasal 28G, 30 UUD). UU ITE mengatur hoaks. TAP MPR No. VI/2001 menetapkan etika kehidupan berbangsa sebagai norma yang harus dijaga negara. Negara tidak boleh pasif menghadapi ancaman persatuan."},
      {no:5,pertanyaan:"Perbedaan antara 'pluralisme' yang sehat dan 'relativisme budaya' yang berlebihan dalam konteks Bhinneka Tunggal Ika adalah...",opsi:{A:"Keduanya identik dan sama-sama dianjurkan",B:"Pluralisme sehat mengakui keberagaman sambil mempertahankan nilai-nilai universal (HAM, keadilan); relativisme budaya berlebihan menolak standar universal dengan alasan 'semua budaya sama', yang bisa membenarkan praktik melanggar HAM",C:"Relativisme budaya lebih baik dari pluralisme",D:"Pluralisme melarang semua perbedaan"},jawaban:"B",penjelasan:"Pluralisme sehat: keberagaman dihormati dalam bingkai nilai universal. Relativisme budaya ekstrem dapat membenarkan praktik diskriminatif atau pelanggaran HAM dengan dalih 'kearifan lokal'. Bhinneka Tunggal Ika menganut pluralisme yang tetap berlandaskan Pancasila dan HAM."},
      {no:6,stimulus:"TAP MPR No. XVII/MPR/1998 tentang HAM diterbitkan sebelum amandemen UUD 1945. Setelah Bab HAM dimasukkan dalam UUD 1945 (amandemen kedua), status TAP ini menjadi...",pertanyaan:"Analisis konstitusional yang paling tepat tentang status TAP MPR No. XVII/MPR/1998 pasca-amandemen adalah...",opsi:{A:"TAP tersebut otomatis batal karena sudah ada UUD",B:"TAP tersebut tetap berlaku sebagai norma yang memperkaya dan melengkapi ketentuan HAM dalam UUD 1945 selama tidak bertentangan, sambil menunggu ditetapkan ke dalam UU",C:"TAP tersebut lebih tinggi dari UUD 1945",D:"TAP tersebut tidak memiliki kekuatan hukum apapun"},jawaban:"B",penjelasan:"Berdasarkan TAP MPR No. I/MPR/2003, TAP No. XVII/1998 masuk kategori TAP yang masih berlaku. TAP ini tidak bertentangan dengan UUD 1945 pasca-amandemen, bahkan memperkaya pengaturan HAM. Keduanya dapat berlaku komplementer."},
      {no:7,pertanyaan:"Semboyan Bhinneka Tunggal Ika secara resmi menjadi semboyan negara berdasarkan...",opsi:{A:"Proklamasi 17 Agustus 1945",B:"Pasal 36A UUD 1945 hasil amandemen keempat: 'Lambang Negara ialah Garuda Pancasila dengan semboyan Bhinneka Tunggal Ika'",C:"Keputusan presiden pertama Soekarno",D:"TAP MPR No. I/MPR/1960"},jawaban:"B",penjelasan:"Pasal 36A UUD 1945 (dimasukkan dalam amandemen kedua tahun 2000) secara eksplisit mengatur lambang negara dan semboyan Bhinneka Tunggal Ika. Ini memberikan landasan konstitusional yang kuat bagi semboyan tersebut."},
      {no:8,stimulus:"Seorang gubernur mengeluarkan kebijakan yang mewajibkan semua ASN di daerahnya menggunakan satu bahasa daerah tertentu dalam pekerjaan, mengesampingkan bahasa Indonesia.",pertanyaan:"Kebijakan tersebut bertentangan dengan...",opsi:{A:"Hanya etika pemerintahan",B:"Pasal 36 UUD 1945 yang menetapkan bahasa Indonesia sebagai bahasa negara, TAP MPR tentang etika berbangsa, dan prinsip Bhinneka Tunggal Ika yang menjadikan bahasa Indonesia sebagai pemersatu",C:"Tidak ada masalah karena bahasa daerah dilindungi",D:"Hanya melanggar peraturan kepegawaian"},jawaban:"B",penjelasan:"Pasal 36 UUD 1945 menetapkan bahasa Indonesia sebagai bahasa negara yang wajib digunakan dalam urusan kenegaraan. Mewajibkan bahasa daerah tertentu juga diskriminatif terhadap ASN dari suku lain, bertentangan dengan Bhinneka Tunggal Ika."},
      {no:9,pertanyaan:"Konsep 'integrasi nasional' dalam kerangka Bhinneka Tunggal Ika berbeda secara fundamental dari 'asimilasi paksa' karena...",opsi:{A:"Integrasi nasional lebih lambat dari asimilasi",B:"Integrasi nasional membangun persatuan dengan menghormati dan mempertahankan identitas kelompok; asimilasi paksa menghancurkan identitas kelompok untuk menciptakan keseragaman artifisial yang tidak berkelanjutan",C:"Asimilasi lebih efektif menjaga persatuan",D:"Keduanya menghasilkan hasil yang sama"},jawaban:"B",penjelasan:"Integrasi nasional sesuai Bhinneka Tunggal Ika: perbedaan identitas dipertahankan dalam bingkai persatuan nasional. Asimilasi paksa terbukti tidak berkelanjutan dan justru memicu resistensi dan disintegrasi jangka panjang."},
      {no:10,stimulus:"Terjadi polemik: sekelompok warga menolak pembangunan rumah ibadah agama minoritas di lingkungannya dengan alasan 'mayoritas berhak menentukan'.",pertanyaan:"Sikap tersebut bertentangan dengan Bhinneka Tunggal Ika dan hukum positif karena...",opsi:{A:"Mayoritas selalu benar dalam demokrasi",B:"Bhinneka Tunggal Ika menjamin hak minoritas dalam keberagaman; hak beribadah adalah non-derogable right (Pasal 28E dan 28I UUD); Perber 2 Menteri tentang rumah ibadah mengatur mekanisme yang melindungi hak minoritas",C:"Pembangunan rumah ibadah bebas dilakukan dimana saja",D:"Pemerintah tidak boleh mengatur rumah ibadah"},jawaban:"B",penjelasan:"Hak beribadah adalah non-derogable right yang tidak boleh dibatasi oleh kehendak mayoritas sekalipun. Demokrasi Pancasila melindungi minoritas dari tirani mayoritas. Perber 2 Menteri No. 9 dan 8/2006 mengatur mekanisme pendirian rumah ibadah secara berkeadilan."},

// ── State ──
const state={shown:[],current:null,answers:{},scores:{},timers:{}};
let wheelAngle=0,spinning=false;

// ── Wheel ──
function getAvail(){return[1,2,3,4].filter(i=>!state.shown.includes(i));}

function drawWheel(){
  const c=document.getElementById('wheelCanvas');if(!c)return;
  const ctx=c.getContext('2d'),cx=120,cy=120,r=115,n=4,arc=(2*Math.PI)/n;
  ctx.clearRect(0,0,240,240);
  const labels=['P1','P2','P3','P4'];
  for(let i=0;i<n;i++){
    const startA=wheelAngle+i*arc-Math.PI/2,endA=startA+arc,done=state.shown.includes(i+1);
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,r,startA,endA);ctx.closePath();
    ctx.fillStyle=done?'rgba(253,246,236,.07)':COLORS[i];
    ctx.fill();ctx.strokeStyle='#1a0a05';ctx.lineWidth=2;ctx.stroke();
    ctx.save();ctx.translate(cx,cy);ctx.rotate(startA+arc/2);ctx.textAlign='right';
    ctx.fillStyle=done?'rgba(253,246,236,.3)':'white';
    ctx.font=`bold 14px "DM Sans",sans-serif`;
    ctx.fillText(done?labels[i]+'✓':'Paket '+(i+1),r-12,6);ctx.restore();
  }
  ctx.beginPath();ctx.arc(cx,cy,r,0,2*Math.PI);ctx.strokeStyle='rgba(201,168,76,.6)';ctx.lineWidth=3;ctx.stroke();
}

function spinWheel(){
  const avail=getAvail();if(!avail.length){showToast('Semua paket sudah diundi!');return;}
  if(spinning)return;spinning=true;document.getElementById('btnSpin').disabled=true;
  const n=4,arc=(2*Math.PI)/n;
  const picked=avail[Math.floor(Math.random()*avail.length)],idx=picked-1;
  const targetOffset=-(idx*arc+arc/2),fullSpins=(5+Math.floor(Math.random()*4))*2*Math.PI;
  const targetAngle=targetOffset-(wheelAngle%(2*Math.PI))+fullSpins;
  const dur=4000,t0=performance.now(),a0=wheelAngle;
  function ease(t){return 1-Math.pow(1-t,3);}
  function frame(now){
    const t=Math.min((now-t0)/dur,1);wheelAngle=a0+targetAngle*ease(t);drawWheel();
    if(t<1){requestAnimationFrame(frame);}
    else{wheelAngle=a0+targetAngle;spinning=false;document.getElementById('btnSpin').disabled=false;
      drawWheel();showToast(`Paket ${picked} terpilih!`);setTimeout(()=>loadPacket(picked),400);}
  }
  requestAnimationFrame(frame);
}

function loadPacket(p){
  state.current=p;if(!state.shown.includes(p))state.shown.push(p);
  if(!state.answers[p])state.answers[p]={};
  if(state.scores[p]===undefined)state.scores[p]=0;
  renderSoal(p);updateHistory();
  const first=BANK[p].soal.findIndex((_,i)=>state.answers[p][i]===undefined);
  if(first>=0)setTimeout(()=>startTimer(p,first),400);
}

// ── Timer ──
function startTimer(p,idx){
  const k=`${p}-${idx}`;if(state.timers[k])return;
  let rem=TIMER_SEC;updateTimerUI(p,idx,rem);
  state.timers[k]=setInterval(()=>{rem--;updateTimerUI(p,idx,rem);
    if(rem<=0){clearInterval(state.timers[k]);state.timers[k]='done';timeOut(p,idx);}},1000);
}
function stopTimer(p,idx){
  const k=`${p}-${idx}`;
  if(state.timers[k]&&state.timers[k]!=='done'){clearInterval(state.timers[k]);state.timers[k]='done';}
}
function updateTimerUI(p,idx,sec){
  const ring=document.getElementById(`tr-${p}-${idx}`),num=document.getElementById(`tn-${p}-${idx}`);
  if(!ring||!num)return;
  const prog=ring.querySelector('.prog');
  prog.style.strokeDashoffset=CIRC*(1-sec/TIMER_SEC);num.textContent=sec;
  const w=sec<=15&&sec>5,d=sec<=5;
  prog.className='prog'+(d?' danger':w?' warn':'');
  num.className='timer-num'+(d?' danger':w?' warn':'');
}
function timeOut(p,idx){
  if(state.answers[p][idx]!==undefined)return;
  state.answers[p][idx]=null;const s=BANK[p].soal[idx];
  document.querySelectorAll(`.ob[data-p="${p}"][data-i="${idx}"]`).forEach(b=>{
    b.disabled=true;b.classList.add(b.dataset.k===s.jawaban?'reveal':'timeout');});
  const fb=document.getElementById(`fb-${p}-${idx}`);
  if(fb){fb.className='feedback show timeout-fb';
    fb.innerHTML=`<div class="feedback-title">⏱ Waktu habis! Jawaban: ${s.jawaban}. ${s.opsi[s.jawaban]}</div><div class="feedback-explain">💡 ${s.penjelasan}</div>`;}
  const nm=document.getElementById(`nm-${p}-${idx}`);if(nm)nm.classList.add('wrong');
  const tr=document.getElementById(`trow-${p}-${idx}`);if(tr)tr.style.display='none';
  updateScore(p);updateHistory();
  const nx=idx+1;
  if(nx<BANK[p].soal.length&&state.answers[p][nx]===undefined)startTimer(p,nx);
}

function answer(p,idx,key){
  const s=BANK[p].soal[idx];if(state.answers[p][idx]!==undefined)return;
  stopTimer(p,idx);state.answers[p][idx]=key;
  const ok=key===s.jawaban;if(ok)state.scores[p]=(state.scores[p]||0)+1;
  document.querySelectorAll(`.ob[data-p="${p}"][data-i="${idx}"]`).forEach(b=>{
    b.disabled=true;const k=b.dataset.k;
    if(k===s.jawaban)b.classList.add(ok&&k===key?'correct':'reveal');
    if(k===key&&!ok)b.classList.add('wrong');});
  const fb=document.getElementById(`fb-${p}-${idx}`);
  if(fb){fb.classList.add('show',ok?'ok':'bad');
    fb.innerHTML=ok?`<div class="feedback-title">✓ Benar!</div>`:
      `<div class="feedback-title">✗ Salah! Jawaban: ${s.jawaban}. ${s.opsi[s.jawaban]}</div><div class="feedback-explain">💡 ${s.penjelasan}</div>`;}
  const nm=document.getElementById(`nm-${p}-${idx}`);if(nm)nm.classList.add(ok?'correct':'wrong');
  const tr=document.getElementById(`trow-${p}-${idx}`);if(tr)tr.style.display='none';
  updateScore(p);updateHistory();
  const nx=idx+1;
  if(nx<BANK[p].soal.length&&state.answers[p][nx]===undefined)startTimer(p,nx);
}

function updateScore(p){
  const cnt=Object.values(state.answers[p]).filter(v=>v!==undefined).length;
  document.getElementById('scoreText').textContent=`${state.scores[p]||0} / ${cnt}`;
}

function renderSoal(p){
  const d=BANK[p];
  document.getElementById('resultTitle').textContent=`Paket ${p} — ${d.topik}`;
  document.getElementById('resultMeta').textContent=`HOTS · ${d.soal.length} Soal Pilihan Ganda · 45 Detik/Soal`;
  const ans=state.answers[p];
  document.getElementById('scoreText').textContent=`${state.scores[p]||0} / ${Object.values(ans).filter(v=>v!==undefined).length}`;
  document.getElementById('soalList').innerHTML=d.soal.map((s,i)=>{
    const chosen=ans[i],answered=chosen!==undefined,isOk=chosen===s.jawaban,isTO=chosen===null;
    const stimHTML=s.stimulus?`<div class="soal-stimulus">📋 ${s.stimulus}</div>`:'';
    const optHTML=Object.entries(s.opsi).map(([k,v])=>{
      let cls='opt-btn ob';
      if(answered){if(isTO){cls+=k===s.jawaban?' reveal':' timeout';}
        else{if(k===s.jawaban)cls+=isOk&&k===chosen?' correct':' reveal';if(k===chosen&&!isOk)cls+=' wrong';}}
      return `<button class="${cls}" data-p="${p}" data-i="${i}" data-k="${k}"
        ${answered?'disabled':''} onclick="answer(${p},${i},'${k}')">
        <span class="opt-key">${k}</span><span>${v}</span></button>`;}).join('');
    let fbHTML=`<div class="feedback" id="fb-${p}-${i}"></div>`;
    if(answered){if(isTO)fbHTML=`<div class="feedback show timeout-fb" id="fb-${p}-${i}"><div class="feedback-title">⏱ Waktu habis! Jawaban: ${s.jawaban}. ${s.opsi[s.jawaban]}</div><div class="feedback-explain">💡 ${s.penjelasan}</div></div>`;
      else if(isOk)fbHTML=`<div class="feedback show ok" id="fb-${p}-${i}"><div class="feedback-title">✓ Benar!</div></div>`;
      else fbHTML=`<div class="feedback show bad" id="fb-${p}-${i}"><div class="feedback-title">✗ Salah! Jawaban: ${s.jawaban}. ${s.opsi[s.jawaban]}</div><div class="feedback-explain">💡 ${s.penjelasan}</div></div>`;}
    const numCls=answered?(isOk&&!isTO?'soal-num correct':'soal-num wrong'):'soal-num';
    return `<div class="soal-item" style="animation-delay:${i*.03}s">
      <div class="soal-header"><div class="${numCls}" id="nm-${p}-${i}">${s.no}</div><div class="soal-text">${s.pertanyaan}</div></div>
      ${stimHTML}
      <div class="timer-row" id="trow-${p}-${i}" style="${answered?'display:none':''}">
        <div class="timer-ring" id="tr-${p}-${i}">
          <svg width="36" height="36" viewBox="0 0 36 36"><circle class="bg" cx="18" cy="18" r="15"/>
          <circle class="prog" cx="18" cy="18" r="15" style="stroke-dasharray:${CIRC};stroke-dashoffset:0;"/></svg>
          <div class="timer-num" id="tn-${p}-${i}">${TIMER_SEC}</div></div>
        <span class="timer-label">detik tersisa</span></div>
      <div class="soal-options">${optHTML}</div>${fbHTML}</div>`;}).join('');
  document.getElementById('resultCard').classList.add('visible');
  document.getElementById('resultCard').scrollIntoView({behavior:'smooth',block:'start'});
}

function updateHistory(){
  const sec=document.getElementById('historySection'),g=document.getElementById('historyGrid');
  if(!state.shown.length){sec.style.display='none';return;}sec.style.display='block';
  g.innerHTML=state.shown.map(p=>{
    const ans=state.answers[p]||{},sc=state.scores[p]||0,cnt=Object.values(ans).filter(v=>v!==undefined).length;
    return `<div class="history-item" onclick="state.current=${p};renderSoal(${p})">
      <div><div class="history-item-title">Paket ${p} — ${BANK[p].topik}</div>
      <div class="history-item-meta">${BANK[p].soal.length} soal HOTS · Dijawab: ${cnt}</div></div>
      <span class="history-score">${sc}/${cnt}</span></div>`;}).join('');
}

function resetAll(){
  if(!confirm('Reset semua paket?'))return;
  Object.values(state.timers).forEach(t=>{if(t&&t!=='done')clearInterval(t);});
  state.shown=[];state.current=null;state.answers={};state.scores={};state.timers={};
  wheelAngle=0;drawWheel();
  document.getElementById('resultCard').classList.remove('visible');
  document.getElementById('historySection').style.display='none';showToast('Semua paket direset');
}
function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}
window.addEventListener('DOMContentLoaded',()=>setTimeout(drawWheel,100));
</script>
</body>
</html>
