<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kuis HOTS 4 Pilar Kebangsaan</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --red:#c0392b; --dark-red:#922b21; --cream:#fdf6ec;
  --dark:#12080300; --gold:#c9a84c; --gold2:#e8c96a;
  --green:#27ae60; --bg:#0f0a04; --surface:rgba(253,246,236,0.04);
  --border:rgba(253,246,236,0.12); --text:rgba(253,246,236,0.9);
  --muted:rgba(253,246,236,0.45);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background:
  radial-gradient(ellipse 60% 50% at 15% 10%,rgba(192,57,43,0.18) 0%,transparent 60%),
  radial-gradient(ellipse 50% 40% at 85% 85%,rgba(201,168,76,0.12) 0%,transparent 55%);
  pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:820px;margin:0 auto;padding:40px 20px 80px;}

/* ── HEADER ── */
header{text-align:center;margin-bottom:48px;}
.badge{display:inline-block;background:linear-gradient(135deg,#c9a84c,#e8c96a);color:#0f0a04;
  font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;
  padding:4px 14px;border-radius:20px;margin-bottom:14px;}
h1{font-family:'Playfair Display',serif;font-size:clamp(36px,7vw,64px);font-weight:900;
  line-height:1;color:var(--cream);margin-bottom:6px;}
h1 em{color:var(--gold);font-style:normal;}
.subtitle{font-size:13px;color:var(--muted);letter-spacing:1px;}
.divider{display:flex;align-items:center;gap:12px;margin:36px 0;opacity:0.25;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--gold);}

/* ── SCREENS ── */
.screen{display:none;animation:fadeUp 0.4s ease;}
.screen.active{display:block;}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}

/* ── SPIN SCREEN ── */
.spin-center{display:flex;flex-direction:column;align-items:center;gap:24px;}
.wheel-outer{position:relative;width:280px;height:280px;}
.wheel-pointer{position:absolute;top:-16px;left:50%;transform:translateX(-50%);
  width:0;height:0;border-left:13px solid transparent;border-right:13px solid transparent;
  border-top:26px solid var(--gold);filter:drop-shadow(0 2px 6px rgba(201,168,76,0.5));z-index:10;}
#wheelCanvas{border-radius:50%;box-shadow:0 0 60px rgba(192,57,43,0.25);}
.wheel-hub{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:38px;height:38px;background:var(--bg);border:3px solid var(--gold);
  border-radius:50%;z-index:10;}
.btn-spin{background:var(--red);color:#fff;border:none;font-family:'Playfair Display',serif;
  font-size:20px;font-weight:700;padding:15px 52px;border-radius:4px;cursor:pointer;
  letter-spacing:1px;transition:all 0.2s;margin-top:8px;}
.btn-spin:hover:not(:disabled){background:var(--dark-red);transform:scale(1.04);
  box-shadow:0 8px 32px rgba(192,57,43,0.5);}
.btn-spin:disabled{opacity:0.4;cursor:not-allowed;}
.spin-result{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;
  color:var(--gold);text-align:center;min-height:32px;}
.btn-start{background:var(--gold);color:#0f0a04;border:none;font-family:'DM Sans',sans-serif;
  font-size:15px;font-weight:600;padding:13px 40px;border-radius:4px;cursor:pointer;
  transition:all 0.2s;display:none;}
.btn-start:hover{background:var(--gold2);}
.history-chips{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:8px;}
.chip{font-size:11px;padding:4px 10px;border-radius:20px;
  background:rgba(201,168,76,0.1);border:1px solid rgba(201,168,76,0.25);
  color:var(--gold);letter-spacing:0.5px;}

/* ── QUIZ SCREEN ── */
.quiz-header{display:flex;align-items:center;justify-content:space-between;
  margin-bottom:24px;flex-wrap:wrap;gap:12px;}
.quiz-title-sm{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:var(--cream);}
.score-pill{background:var(--surface);border:1px solid var(--border);
  border-radius:20px;padding:6px 16px;font-size:13px;color:var(--gold);}
.progress-wrap{background:rgba(253,246,236,0.08);border-radius:99px;height:4px;margin-bottom:24px;overflow:hidden;}
.progress-fill{height:4px;border-radius:99px;background:var(--gold);transition:width 0.4s ease;}
.soal-list{display:flex;flex-direction:column;gap:24px;}
.soal-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;}
.soal-meta{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.soal-num{background:var(--red);color:#fff;font-family:'Playfair Display',serif;
  font-size:13px;font-weight:700;width:30px;height:30px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.pilar-tag{font-size:10px;letter-spacing:1px;color:var(--muted);text-transform:uppercase;}
.diff-tag{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:600;}
.diff-mudah{background:rgba(39,174,96,0.15);color:#6ee7a0;}
.diff-sedang{background:rgba(230,126,34,0.15);color:#fbbf7a;}
.diff-sulit{background:rgba(192,57,43,0.15);color:#fca5a5;}
.stimulus{background:rgba(201,168,76,0.07);border-left:3px solid var(--gold);
  border-radius:0 6px 6px 0;padding:10px 14px;margin-bottom:12px;
  font-size:13px;color:var(--muted);line-height:1.7;font-style:italic;}
.soal-text{font-size:14.5px;line-height:1.75;color:var(--cream);margin-bottom:14px;}
.opts{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.opt{background:rgba(253,246,236,0.05);border:1px solid var(--border);
  border-radius:8px;padding:10px 13px;cursor:pointer;text-align:left;
  font-size:13px;color:rgba(253,246,236,0.8);transition:all 0.18s;
  display:flex;gap:9px;align-items:flex-start;line-height:1.5;width:100%;}
.opt:hover:not(:disabled){background:rgba(201,168,76,0.1);border-color:rgba(201,168,76,0.4);color:var(--cream);}
.opt:disabled{cursor:default;}
.opt.correct{background:rgba(39,174,96,0.15);border-color:#27ae60;color:#6ee7a0;}
.opt.wrong{background:rgba(192,57,43,0.15);border-color:var(--red);color:#fca5a5;}
.opt.reveal{background:rgba(39,174,96,0.15);border-color:#27ae60;color:#6ee7a0;}
.opt-k{font-weight:700;min-width:18px;color:var(--gold);opacity:0.8;}
.opt.correct .opt-k,.opt.reveal .opt-k{color:#6ee7a0;}
.opt.wrong .opt-k{color:#fca5a5;}
.feedback{margin-top:10px;border-radius:8px;padding:11px 14px;display:none;font-size:13px;line-height:1.65;}
.feedback.show{display:block;}
.fb-ok{background:rgba(39,174,96,0.1);border:1px solid rgba(39,174,96,0.3);color:#a7f3d0;}
.fb-bad{background:rgba(192,57,43,0.1);border:1px solid rgba(192,57,43,0.3);color:#fca5a5;}
.fb-t{font-weight:600;margin-bottom:4px;}
.fb-exp{color:rgba(253,246,236,0.65);font-size:12.5px;border-top:1px solid rgba(253,246,236,0.1);margin-top:6px;padding-top:6px;}
.quiz-footer{margin-top:32px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;}
.btn-back{background:transparent;border:1px solid var(--border);color:var(--muted);
  font-size:13px;padding:10px 24px;border-radius:4px;cursor:pointer;transition:all 0.2s;}
.btn-back:hover{border-color:var(--gold);color:var(--gold);}
.btn-result{background:var(--gold);color:#0f0a04;border:none;font-size:14px;font-weight:600;
  padding:11px 32px;border-radius:4px;cursor:pointer;display:none;transition:all 0.2s;}
.btn-result:hover{background:var(--gold2);}

/* ── RESULT SCREEN ── */
.result-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:32px;text-align:center;margin-bottom:28px;}
.result-score{font-family:'Playfair Display',serif;font-size:64px;font-weight:900;color:var(--gold);line-height:1;}
.result-label{font-size:14px;color:var(--muted);margin-top:6px;}
.result-grade{font-size:20px;font-weight:600;margin-top:12px;}
.result-bars{display:flex;flex-direction:column;gap:10px;margin:24px 0;}
.rbar{display:flex;align-items:center;gap:12px;font-size:13px;}
.rbar-label{width:100px;color:var(--muted);}
.rbar-track{flex:1;background:rgba(253,246,236,0.08);border-radius:99px;height:6px;overflow:hidden;}
.rbar-fill{height:6px;border-radius:99px;background:var(--gold);}
.rbar-val{width:40px;text-align:right;color:var(--cream);}
.btn-row{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-top:24px;}
.btn-again{background:var(--red);color:#fff;border:none;font-size:14px;font-weight:600;padding:12px 30px;border-radius:4px;cursor:pointer;transition:all 0.2s;}
.btn-again:hover{background:var(--dark-red);}
.btn-home{background:transparent;border:1px solid var(--border);color:var(--muted);font-size:14px;padding:12px 30px;border-radius:4px;cursor:pointer;transition:all 0.2s;}
.btn-home:hover{border-color:var(--gold);color:var(--gold);}
@media(max-width:560px){.opts{grid-template-columns:1fr;}.quiz-header{flex-direction:column;align-items:flex-start;}}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="badge">⚡ Higher Order Thinking Skills</div>
    <h1>Undian <em>Soal</em></h1>
    <p class="subtitle">4 Pilar Kebangsaan · HOTS · SMA Kelas 10–12 · 8 Paket · 15 Soal</p>
  </header>
  <div class="divider"></div>

  <!-- SPIN SCREEN -->
  <div class="screen active" id="screenSpin">
    <div class="spin-center">
      <div class="wheel-outer">
        <div class="wheel-pointer"></div>
        <canvas id="wheelCanvas" width="280" height="280"></canvas>
        <div class="wheel-hub"></div>
      </div>
      <div class="spin-result" id="spinResult">Putar roda untuk memilih paket soal</div>
      <button class="btn-spin" id="btnSpin" onclick="spinWheel()">🌀 Putar Roda</button>
      <button class="btn-start" id="btnStart" onclick="startQuiz()">Mulai Paket Ini →</button>
      <div class="history-chips" id="historyChips"></div>
    </div>
  </div>

  <!-- QUIZ SCREEN -->
  <div class="screen" id="screenQuiz">
    <div class="quiz-header">
      <div class="quiz-title-sm" id="quizTitleSm"></div>
      <div class="score-pill" id="scorePill">0 / 0 benar</div>
    </div>
    <div class="progress-wrap"><div class="progress-fill" id="progFill" style="width:0%"></div></div>
    <div class="soal-list" id="soalList"></div>
    <div class="quiz-footer">
      <button class="btn-back" onclick="goHome()">← Kembali ke Roda</button>
      <button class="btn-result" id="btnResult" onclick="showResult()">Lihat Hasil →</button>
    </div>
  </div>

  <!-- RESULT SCREEN -->
  <div class="screen" id="screenResult">
    <div class="result-box">
      <div class="result-score" id="resScore">0</div>
      <div class="result-label" id="resLabel">dari 15 soal benar</div>
      <div class="result-grade" id="resGrade"></div>
    </div>
    <div class="result-bars" id="resBars"></div>
    <div class="btn-row">
      <button class="btn-again" onclick="startQuiz()">Ulangi Paket Ini</button>
      <button class="btn-home" onclick="goHome()">← Pilih Paket Lain</button>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════
//  BANK SOAL — 8 Paket × 15 Soal HOTS
// ══════════════════════════════════════════
const PAKET = [
  // ── PAKET 1: Pancasila sebagai Dasar Negara & Ideologi ──
  { judul:"Paket 1", topik:"Pancasila — Dasar Negara & Ideologi", soal:[
    {n:1,pilar:"Pancasila",diff:"mudah",q:"Apa yang dimaksud dengan Pancasila sebagai 'norma dasar' atau Grundnorm dalam teori Hans Kelsen?",opsi:{A:"Pancasila hanya berlaku secara moral",B:"Pancasila menjadi sumber validitas seluruh norma hukum di Indonesia",C:"Pancasila setara kedudukannya dengan UU biasa",D:"Pancasila hanya mengikat lembaga negara"},jawab:"B",exp:"Grundnorm adalah norma paling dasar yang menjadi sumber validitas seluruh norma di bawahnya. Seluruh hukum Indonesia harus selaras dengan Pancasila."},
    {n:2,pilar:"Pancasila",diff:"mudah",q:"Sila Ketuhanan Yang Maha Esa menempatkan Indonesia sebagai negara yang...",opsi:{A:"Negara agama Islam",B:"Negara sekuler yang memisahkan agama dari negara",C:"Negara yang mengakui dan melindungi semua agama tanpa menjadi negara agama tertentu",D:"Negara ateisme"},jawab:"C",exp:"Indonesia bukan negara agama maupun sekuler. Sila Pertama menegaskan pengakuan Tuhan secara inklusif, melindungi semua agama yang dianut warganya."},
    {n:3,pilar:"Pancasila",diff:"mudah",q:"Konsep Pancasila sebagai 'way of life' mengandung makna bahwa...",opsi:{A:"Pancasila hanya panduan pejabat negara",B:"Pancasila menjadi pedoman setiap aspek kehidupan bermasyarakat, berbangsa, dan bernegara",C:"Pancasila cukup dipahami secara teoritis",D:"Pancasila hanya berlaku dalam acara kenegaraan"},jawab:"B",exp:"Pancasila sebagai pandangan hidup berarti nilai-nilainya menjadi pedoman dalam setiap aspek kehidupan warga negara sehari-hari, bukan seremoni belaka."},
    {n:4,pilar:"Pancasila",diff:"mudah",q:"Pada tanggal berapa Pancasila ditetapkan sebagai dasar negara Indonesia?",opsi:{A:"1 Juni 1945",B:"17 Agustus 1945",C:"18 Agustus 1945",D:"22 Juni 1945"},jawab:"C",exp:"PPKI menetapkan Pancasila sebagai dasar negara pada 18 Agustus 1945, sehari setelah proklamasi kemerdekaan, bersamaan dengan pengesahan UUD 1945."},
    {n:5,pilar:"Pancasila",diff:"mudah",q:"Tujuh kata yang dihapus dari Piagam Jakarta pada 18 Agustus 1945 adalah...",opsi:{A:"dengan kewajiban menjalankan syariat Islam bagi pemeluk-pemeluknya",B:"berdasarkan kepada ketuhanan dengan kewajiban beribadah",C:"atas dasar keimanan dan ketakwaan kepada Tuhan",D:"dengan menjalankan hukum agama bagi seluruh warga negara"},jawab:"A",exp:"Tujuh kata tersebut dihapus demi menjaga persatuan Indonesia. Ini merupakan keputusan bersejarah yang mencerminkan nilai Sila Ketiga Pancasila."},
    {n:6,pilar:"Pancasila",diff:"sedang",stimulus:"Seorang anggota DPR mengusulkan agar sila-sila Pancasila diubah karena dinilai tidak lagi relevan dengan perkembangan demokrasi modern.",q:"Sikap yang paling tepat menanggapi usulan tersebut berdasarkan kedudukan Pancasila adalah...",opsi:{A:"Menerima usulan karena demokrasi harus terus berkembang",B:"Menolak karena nilai dasar Pancasila bersifat absolut sebagai Grundnorm yang tidak dapat diubah",C:"Menolak hanya karena sudah ada sejak lama",D:"Menerima asalkan disetujui MPR"},jawab:"B",exp:"Pancasila sebagai Grundnorm memiliki nilai dasar bersifat absolut. Yang boleh berkembang hanya nilai instrumentalnya, bukan substansi sila-silanya."},
    {n:7,pilar:"Pancasila",diff:"sedang",q:"Perbedaan esensial antara Pancasila sebagai ideologi terbuka dan ideologi tertutup adalah...",opsi:{A:"Pancasila membolehkan penggantian sila kapan saja",B:"Pancasila bersumber dari nilai masyarakat sendiri dan penjabarannya fleksibel; ideologi tertutup dipaksakan dari luar dan kaku",C:"Pancasila tidak memiliki nilai dasar yang pasti",D:"Ideologi tertutup lebih demokratis"},jawab:"B",exp:"Ideologi terbuka bersumber dari nilai hidup rakyatnya sendiri dan dapat menyesuaikan penjabaran tanpa mengubah nilai dasar. Ideologi tertutup bersifat dogmatis."},
    {n:8,pilar:"Pancasila",diff:"sedang",stimulus:"Indonesia menghadapi penetrasi ideologi transnasional yang mengancam persatuan melalui media digital.",q:"Fungsi Pancasila yang paling relevan sebagai tameng menghadapi ancaman tersebut adalah...",opsi:{A:"Pancasila sebagai dasar negara",B:"Pancasila sebagai ideologi terbuka yang mampu menyaring nilai asing",C:"Pancasila sebagai sumber hukum",D:"Pancasila sebagai lambang negara"},jawab:"B",exp:"Sebagai ideologi terbuka, Pancasila mampu menyerap nilai positif dari luar sekaligus menolak nilai yang bertentangan dengan kepribadian bangsa."},
    {n:9,pilar:"Pancasila",diff:"sedang",q:"Mengapa Pancasila tidak dapat disejajarkan dengan agama tertentu meskipun memuat sila Ketuhanan Yang Maha Esa?",opsi:{A:"Karena Pancasila tidak percaya Tuhan",B:"Karena Pancasila adalah filosofi negara yang memberi ruang bagi semua agama, bukan doktrin agama tertentu",C:"Karena Pancasila hanya untuk umat Islam",D:"Karena sila Ketuhanan tidak bermakna religius"},jawab:"B",exp:"Pancasila bukan agama, melainkan falsafah negara yang mengakui Ketuhanan YME secara inklusif, memberi ruang bagi semua agama yang dianut bangsa Indonesia."},
    {n:10,pilar:"Pancasila",diff:"sedang",stimulus:"Di sebuah negara, ideologi negara tidak boleh dikritik, seluruh kebijakan bersumber dari elite penguasa, dan rakyat wajib mengikuti tanpa pertanyaan.",q:"Negara tersebut menerapkan model ideologi yang BERTENTANGAN dengan Pancasila yaitu...",opsi:{A:"Ideologi terbuka",B:"Ideologi demokratis",C:"Ideologi tertutup",D:"Ideologi pluralis"},jawab:"C",exp:"Ciri ideologi tertutup: tidak boleh dikritik, sumber kebijakan dari elite, bersifat dogmatis. Ini bertentangan dengan Pancasila sebagai ideologi terbuka yang demokratis."},
    {n:11,pilar:"Pancasila",diff:"sulit",stimulus:"Seorang politikus berargumen bahwa karena Pancasila adalah ideologi terbuka, maka nilai-nilai dalam setiap sila boleh diubah mengikuti kepentingan politik masa kini.",q:"Analisis yang paling tepat terhadap argumen tersebut adalah...",opsi:{A:"Benar, karena terbuka berarti bebas berubah",B:"Salah, karena terbuka hanya berlaku pada penjabaran (nilai instrumental), bukan pada nilai dasar sila-sila",C:"Benar, karena semua ideologi harus relevan",D:"Salah, karena Pancasila tidak boleh diubah dalam bentuk apapun"},jawab:"B",exp:"Ideologi terbuka dinamis hanya pada nilai instrumental dan praksis. Nilai dasar (isi sila-sila) bersifat tetap dan tidak boleh diubah oleh kepentingan politik sesaat."},
    {n:12,pilar:"Pancasila",diff:"sulit",q:"Perbedaan Pancasila dengan liberalisme dan komunisme sebagai ideologi dunia terletak pada...",opsi:{A:"Pancasila tidak mengakui HAM",B:"Pancasila mengintegrasikan nilai ketuhanan, kemanusiaan, persatuan, demokrasi, dan keadilan secara seimbang tanpa absolutisme individual maupun kolektif",C:"Pancasila hanya mengutamakan negara",D:"Pancasila identik dengan sosialisme"},jawab:"B",exp:"Liberalisme mengutamakan individu secara absolut; komunisme mengutamakan negara. Pancasila mengintegrasikan keduanya secara seimbang dengan nilai Ketuhanan dan kemanusiaan."},
    {n:13,pilar:"Pancasila",diff:"sulit",stimulus:"Sebuah perusahaan teknologi asing menawarkan kerja sama dengan syarat mengubah sistem hukum Indonesia agar sepenuhnya mengadopsi sistem liberal yang mengabaikan nilai Ketuhanan.",q:"Mengapa penawaran tersebut harus ditolak ditinjau dari nilai Pancasila?",opsi:{A:"Karena perusahaan asing tidak boleh berbisnis di Indonesia",B:"Karena Sila Pertama menegaskan Ketuhanan YME sebagai nilai dasar yang tidak dapat dikompromikan",C:"Karena sistem hukum liberal lebih baik",D:"Karena hanya pemerintah yang boleh mengubah hukum"},jawab:"B",exp:"Sila Pertama menjamin Ketuhanan Yang Maha Esa sebagai nilai dasar. Sistem hukum yang mengabaikan nilai ketuhanan bertentangan dengan fondasi Pancasila."},
    {n:14,pilar:"Pancasila",diff:"sulit",q:"Ditempatkannya Pancasila di atas UUD 1945 dalam hierarki norma hukum mengandung implikasi bahwa...",opsi:{A:"Pasal-pasal UUD 1945 dapat mengalahkan Pancasila",B:"Jika ada pasal UUD yang bertentangan dengan Pancasila, maka Pancasila yang harus diubah",C:"Seluruh pasal UUD 1945 harus ditafsirkan selaras dengan nilai-nilai Pancasila",D:"Pancasila hanya berlaku jika dikodifikasi dalam UUD"},jawab:"C",exp:"Karena Pancasila adalah norma dasar tertinggi, seluruh isi dan penafsiran UUD 1945 harus selaras dengan nilai-nilai Pancasila."},
    {n:15,pilar:"Pancasila",diff:"sulit",stimulus:"Pada 18 Agustus 1945, terjadi perdebatan mengenai sila pertama. Akhirnya tujuh kata dalam Piagam Jakarta dihapus.",q:"Keputusan menghapus tujuh kata tersebut mencerminkan nilai Pancasila sila ke...",opsi:{A:"Sila Pertama tentang Ketuhanan",B:"Sila Kedua tentang kemanusiaan yang adil",C:"Sila Ketiga tentang persatuan Indonesia",D:"Sila Keempat tentang musyawarah"},jawab:"C",exp:"Penghapusan tujuh kata dilakukan demi menjaga persatuan Indonesia. Kepentingan nasional dan persatuan bangsa diutamakan, mencerminkan nilai Sila Ketiga."},
  ]},

  // ── PAKET 2: Nilai & Pengamalan Sila-Sila Pancasila ──
  { judul:"Paket 2", topik:"Pancasila — Nilai & Pengamalan Sila", soal:[
    {n:1,pilar:"Pancasila",diff:"mudah",q:"Pengamalan Sila Kedua 'Kemanusiaan yang Adil dan Beradab' dalam kehidupan sehari-hari diwujudkan melalui...",opsi:{A:"Menghargai harkat dan martabat setiap manusia tanpa diskriminasi",B:"Mengutamakan kepentingan suku sendiri",C:"Menolak budaya asing sepenuhnya",D:"Hanya menghormati orang yang lebih tua"},jawab:"A",exp:"Sila Kedua mengamanatkan pengakuan harkat dan martabat setiap manusia. Wujud nyatanya adalah menghargai setiap orang tanpa memandang latar belakang."},
    {n:2,pilar:"Pancasila",diff:"mudah",q:"Gotong royong dalam kehidupan bermasyarakat merupakan wujud pengamalan Pancasila terutama sila ke...",opsi:{A:"Sila Pertama",B:"Sila Kedua",C:"Sila Ketiga",D:"Sila Kelima"},jawab:"D",exp:"Gotong royong mencerminkan keadilan sosial — semua berpartisipasi dan berbagi beban bersama. Ini adalah wujud nyata Sila Kelima tentang keadilan sosial bagi seluruh rakyat."},
    {n:3,pilar:"Pancasila",diff:"mudah",q:"Musyawarah mufakat dalam pengambilan keputusan di masyarakat merupakan pengamalan Sila...",opsi:{A:"Sila Kedua",B:"Sila Ketiga",C:"Sila Keempat",D:"Sila Kelima"},jawab:"C",exp:"Musyawarah mufakat adalah inti dari Sila Keempat: Kerakyatan yang Dipimpin oleh Hikmat Kebijaksanaan dalam Permusyawaratan/Perwakilan."},
    {n:4,pilar:"Pancasila",diff:"mudah",q:"Nilai organis Pancasila menyatakan bahwa sila-sila saling mengandaikan. Konsekuensinya adalah...",opsi:{A:"Cukup mengamalkan satu sila yang paling disukai",B:"Mengabaikan satu sila berarti merusak keutuhan Pancasila secara keseluruhan",C:"Sila yang lebih tinggi nomor urutnya lebih penting",D:"Sila Pertama tidak perlu diamalkan jika tidak beragama"},jawab:"B",exp:"Karena sila-sila bersifat organis (satu kesatuan hidup), mengabaikan satu sila akan merusak integritas keseluruhan Pancasila."},
    {n:5,pilar:"Pancasila",diff:"mudah",q:"Relasi antara Sila Pertama dan Sila Kedua Pancasila secara organis dapat diartikan bahwa...",opsi:{A:"Agama tidak berhubungan dengan etika sosial",B:"Pengakuan terhadap Tuhan menjadi landasan moral bagi perlakuan yang adil dan beradab terhadap sesama",C:"Kemanusiaan lebih penting dari Ketuhanan",D:"Hanya pemeluk agama yang memiliki kemanusiaan"},jawab:"B",exp:"Sila Pertama menjadi landasan moral bagi Sila Kedua. Keyakinan kepada Tuhan mendorong manusia memperlakukan sesama dengan adil dan beradab."},
    {n:6,pilar:"Pancasila",diff:"sedang",stimulus:"Seorang warga menolak membayar iuran RT dengan alasan uang tersebut akan menguntungkan tetangga yang berbeda agama.",q:"Tindakan tersebut melanggar pengamalan sila ke...",opsi:{A:"Sila Pertama dan Sila Ketiga",B:"Sila Kedua dan Sila Kelima",C:"Sila Ketiga dan Sila Kelima",D:"Sila Keempat saja"},jawab:"C",exp:"Menolak gotong royong karena perbedaan agama melanggar Sila Ketiga (persatuan) dan Sila Kelima (keadilan sosial tanpa diskriminasi)."},
    {n:7,pilar:"Pancasila",diff:"sedang",stimulus:"Sebuah perusahaan membayar upah pekerja jauh di bawah UMR dengan alasan efisiensi bisnis.",q:"Praktik tersebut paling bertentangan dengan pengamalan sila ke...",opsi:{A:"Sila Pertama",B:"Sila Kedua dan Sila Kelima",C:"Sila Ketiga saja",D:"Sila Keempat saja"},jawab:"B",exp:"Membayar upah tidak layak melanggar Sila Kedua (harkat dan martabat manusia pekerja) dan Sila Kelima (keadilan sosial dan pemerataan kesejahteraan)."},
    {n:8,pilar:"Pancasila",diff:"sedang",q:"Makna 'hikmat kebijaksanaan' dalam Sila Keempat berbeda dari sekadar 'suara terbanyak' karena...",opsi:{A:"Tidak semua orang boleh memilih",B:"Keputusan harus dilandasi akal sehat, nurani, dan kepentingan umum, bukan hanya jumlah suara",C:"Pemimpin yang lebih bijak memiliki suara lebih banyak",D:"Hikmat kebijaksanaan identik dengan otokrasi"},jawab:"B",exp:"Hikmat kebijaksanaan mensyaratkan keputusan dilandasi nalar sehat, nurani, dan kebenaran demi kepentingan bersama—lebih dalam dari demokrasi kuantitatif."},
    {n:9,pilar:"Pancasila",diff:"sedang",stimulus:"Kepala sekolah memenangkan debat dengan cara memotong pembicaraan guru yang berbeda pendapat, lalu memaksakan keputusan sepihak dengan mengancam sanksi.",q:"Kepala sekolah tersebut melanggar nilai-nilai dalam sila ke...",opsi:{A:"Sila Kedua",B:"Sila Keempat",C:"Sila Ketiga",D:"Sila Pertama"},jawab:"B",exp:"Memotong pembicaraan, tidak menghargai pendapat lain, dan memaksakan keputusan sepihak bertentangan langsung dengan musyawarah mufakat dalam Sila Keempat."},
    {n:10,pilar:"Pancasila",diff:"sedang",q:"Prinsip 'keadilan distributif' yang terkandung dalam Sila Kelima bermakna...",opsi:{A:"Semua orang mendapat bagian yang persis sama",B:"Pembagian yang proporsional sesuai kontribusi, kebutuhan, dan hak masing-masing secara adil",C:"Hanya orang kaya yang berhak atas keadilan",D:"Negara tidak perlu mengatur distribusi ekonomi"},jawab:"B",exp:"Keadilan distributif (Sila Kelima) berarti pembagian proporsional dan berkeadilan, memperhatikan kontribusi sekaligus memenuhi kebutuhan dasar seluruh warga."},
    {n:11,pilar:"Pancasila",diff:"sulit",stimulus:"Jika seorang hakim memvonis berbeda untuk kasus yang sama hanya karena tersangka berbeda status sosialnya.",q:"Maka hakim tersebut melanggar sila ke...",opsi:{A:"Sila Pertama",B:"Sila Kedua dan Sila Kelima",C:"Sila Ketiga",D:"Sila Keempat"},jawab:"B",exp:"Diskriminasi berdasarkan status sosial melanggar Sila Kedua (setiap manusia diperlakukan sama) dan Sila Kelima (keadilan bagi seluruh rakyat)."},
    {n:12,pilar:"Pancasila",diff:"sulit",stimulus:"Sebuah korporasi besar mengeksploitasi hutan adat suku pedalaman untuk keuntungan semata tanpa meminta persetujuan masyarakat adat.",q:"Tindakan korporasi tersebut bertentangan dengan nilai sila ke...",opsi:{A:"Sila Pertama saja",B:"Sila Kedua, Ketiga, dan Kelima",C:"Sila Keempat saja",D:"Sila Ketiga saja"},jawab:"B",exp:"Melanggar Sila Kedua (menghormati hak masyarakat adat), Sila Ketiga (tidak memperhatikan kepentingan kelompok lain), dan Sila Kelima (keadilan sosial)."},
    {n:13,pilar:"Pancasila",diff:"sulit",q:"Konsep 'keadilan sosial' dalam Sila Kelima berbeda dari 'kesamaan' (equality) karena...",opsi:{A:"Keadilan sosial berarti semua mendapat jumlah yang sama",B:"Keadilan sosial memperhatikan konteks dan kebutuhan masing-masing sehingga yang lebih membutuhkan mendapat lebih banyak dukungan",C:"Kesamaan lebih adil dari keadilan sosial",D:"Keadilan sosial hanya berlaku di bidang ekonomi"},jawab:"B",exp:"Keadilan sosial (equity) berbeda dari kesamaan (equality). Keadilan sosial memperhatikan konteks—mereka yang lebih membutuhkan mendapat dukungan lebih agar tercipta kondisi yang setara."},
    {n:14,pilar:"Pancasila",diff:"sulit",stimulus:"Seorang tokoh masyarakat memenangkan proyek pemerintah untuk keluarganya dengan cara memanipulasi data dan menyuap pejabat.",q:"Tindakan tersebut melanggar berapa sila Pancasila secara bersamaan?",opsi:{A:"Satu sila (Sila Kedua)",B:"Dua sila (Sila Kedua dan Ketiga)",C:"Tiga sila (Sila Kedua, Keempat, dan Kelima)",D:"Hanya melanggar hukum, bukan Pancasila"},jawab:"C",exp:"Melanggar Sila Kedua (tidak berlaku adil), Sila Keempat (mengkhianati kepercayaan publik), dan Sila Kelima (merusak keadilan sosial)."},
    {n:15,pilar:"Pancasila",diff:"sulit",stimulus:"Suatu daerah menetapkan bahwa anggaran pembangunan hanya dialokasikan untuk wilayah perkotaan yang dianggap lebih produktif, sementara desa-desa terpencil diabaikan.",q:"Kebijakan tersebut paling bertentangan dengan sila ke...",opsi:{A:"Sila Pertama",B:"Sila Kedua",C:"Sila Ketiga",D:"Sila Kelima"},jawab:"D",exp:"Sila Kelima mengamanatkan keadilan sosial bagi SELURUH rakyat Indonesia. Mengabaikan daerah terpencil melanggar prinsip pemerataan dan keadilan sosial."},
  ]},

  // ── PAKET 3: Sejarah Perumusan & Penetapan UUD 1945 ──
  { judul:"Paket 3", topik:"UUD 1945 — Sejarah Perumusan & Penetapan", soal:[
    {n:1,pilar:"UUD 1945",diff:"mudah",q:"Lembaga yang bertugas menyusun rancangan UUD sebelum proklamasi kemerdekaan adalah...",opsi:{A:"PPKI",B:"BPUPKI",C:"Konstituante",D:"MPR"},jawab:"B",exp:"BPUPKI (Badan Penyelidik Usaha-Usaha Persiapan Kemerdekaan Indonesia) bertugas menyusun rancangan UUD dalam sidang-sidangnya pada Mei–Juli 1945."},
    {n:2,pilar:"UUD 1945",diff:"mudah",q:"UUD 1945 disahkan oleh PPKI pada tanggal...",opsi:{A:"17 Agustus 1945",B:"18 Agustus 1945",C:"1 Juni 1945",D:"22 Juni 1945"},jawab:"B",exp:"PPKI mengesahkan UUD 1945 pada 18 Agustus 1945, sehari setelah Proklamasi Kemerdekaan, bersamaan dengan penetapan Soekarno-Hatta sebagai Presiden dan Wakil Presiden."},
    {n:3,pilar:"UUD 1945",diff:"mudah",q:"Berapa kali UUD 1945 telah diamandemen pada era reformasi?",opsi:{A:"2 kali",B:"3 kali",C:"4 kali",D:"5 kali"},jawab:"C",exp:"UUD 1945 diamandemen sebanyak 4 kali: amandemen I (1999), II (2000), III (2001), dan IV (2002) oleh MPR pada era reformasi."},
    {n:4,pilar:"UUD 1945",diff:"mudah",q:"Konstituante adalah lembaga yang dibentuk untuk...",opsi:{A:"Membuat hukum pajak baru",B:"Menyusun konstitusi baru pengganti UUD 1945",C:"Mengawasi presiden",D:"Mengelola pemilihan umum"},jawab:"B",exp:"Konstituante dibentuk hasil Pemilu 1955 dengan tugas menyusun konstitusi baru. Namun gagal mencapai kesepakatan dan dibubarkan melalui Dekret Presiden 5 Juli 1959."},
    {n:5,pilar:"UUD 1945",diff:"mudah",q:"Bagian UUD 1945 yang memuat Pancasila dan tidak boleh diubah bahkan oleh MPR adalah...",opsi:{A:"Batang tubuh UUD 1945",B:"Penjelasan UUD 1945",C:"Pembukaan (Preambule) UUD 1945",D:"Pasal-pasal amandemen"},jawab:"C",exp:"Pembukaan UUD 1945 memuat Pancasila sebagai staatsfundamentalnorm. Mengubahnya berarti membubarkan NKRI dan mendirikan negara baru, sehingga tidak dapat diubah."},
    {n:6,pilar:"UUD 1945",diff:"sedang",stimulus:"Setelah proklamasi kemerdekaan, PPKI langsung bersidang dan mengesahkan UUD pada hari berikutnya, padahal konstitusi umumnya dirancang dalam waktu lebih lama.",q:"Alasan historis mengapa UUD 1945 dapat disahkan secepat itu adalah...",opsi:{A:"UUD 1945 disusun asal-asalan",B:"Rancangan UUD telah disiapkan BPUPKI sebelum proklamasi sehingga PPKI tinggal mengesahkan dengan beberapa penyesuaian",C:"UUD 1945 meniru konstitusi negara lain",D:"Soekarno menulis UUD sendiri dalam semalam"},jawab:"B",exp:"BPUPKI telah menyusun rancangan UUD dalam sidang keduanya (Juli 1945). PPKI hanya mengesahkan dengan penyesuaian krusial seperti menghapus tujuh kata Piagam Jakarta."},
    {n:7,pilar:"UUD 1945",diff:"sedang",q:"Perbedaan mendasar antara sistem pemerintahan UUD 1945 (sebelum amandemen) dan UUDS 1950 adalah...",opsi:{A:"UUDS 1950 menganut presidensial murni",B:"UUD 1945 menganut presidensial; UUDS 1950 menganut parlementer yang menyebabkan kabinet sering jatuh",C:"Keduanya menganut sistem yang sama",D:"UUDS 1950 memberikan kekuasaan lebih besar kepada presiden"},jawab:"B",exp:"UUD 1945 menganut presidensial di mana presiden tidak bertanggung jawab kepada parlemen. UUDS 1950 menganut parlementer yang menyebabkan instabilitas politik."},
    {n:8,pilar:"UUD 1945",diff:"sedang",q:"Perbandingan antara Konstitusi RIS dan UUD 1945 dalam hal bentuk negara menunjukkan bahwa...",opsi:{A:"Keduanya mendukung negara kesatuan",B:"Konstitusi RIS mengatur negara federal sementara UUD 1945 mengatur negara kesatuan",C:"UUD 1945 lebih mendukung federalisme",D:"Keduanya fleksibel soal bentuk negara"},jawab:"B",exp:"Konstitusi RIS (1949–1950) mengatur Indonesia sebagai Republik Indonesia Serikat yang federal. UUD 1945 mengatur Indonesia sebagai negara kesatuan."},
    {n:9,pilar:"UUD 1945",diff:"sedang",q:"Alasan konstitusional mengapa Pembukaan UUD 1945 tidak boleh diubah adalah...",opsi:{A:"Pembukaan terlalu pendek untuk diubah",B:"Pembukaan memuat Pancasila dan proklamasi kemerdekaan yang merupakan staatsfundamentalnorm—mengubahnya berarti membubarkan NKRI",C:"Pembukaan sudah sempurna sejak awal",D:"Tidak ada mekanisme hukum untuk mengubahnya"},jawab:"B",exp:"Pembukaan UUD 1945 memuat Pancasila sebagai staatsfundamentalnorm dan pernyataan kemerdekaan. Mengubahnya sama artinya membubarkan negara proklamasi."},
    {n:10,pilar:"UUD 1945",diff:"sedang",stimulus:"Konstituante yang bertugas membuat UUD baru gagal setelah bertahun-tahun berdebat. Kelompok Islam menginginkan negara Islam, sementara kelompok nasionalis mempertahankan Pancasila.",q:"Pelajaran terpenting dari kegagalan Konstituante ini adalah...",opsi:{A:"Demokrasi tidak cocok untuk Indonesia",B:"Pancasila sebagai dasar negara merupakan konsensus nasional yang sudah teruji sebagai titik temu keberagaman Indonesia",C:"Indonesia harus menjadi negara Islam",D:"Konstitusi tidak perlu dibuat oleh parlemen"},jawab:"B",exp:"Kegagalan Konstituante membuktikan bahwa Pancasila adalah satu-satunya titik temu yang mampu menyatukan keberagaman Indonesia."},
    {n:11,pilar:"UUD 1945",diff:"sulit",stimulus:"Seorang sejarawan berpendapat bahwa amandemen UUD 1945 pada era reformasi adalah 'revolusi konstitusional yang paling damai dalam sejarah Indonesia'.",q:"Pernyataan tersebut dapat dibenarkan karena...",opsi:{A:"Amandemen dilakukan dengan kekerasan",B:"Amandemen mengubah struktur kekuasaan secara fundamental dari superioritas eksekutif menjadi checks and balances, tanpa pertumpahan darah",C:"Amandemen hanya mengubah hal-hal kecil",D:"Amandemen menghapus Pancasila"},jawab:"B",exp:"Amandemen UUD 1945 (1999–2002) mengubah arsitektur kekuasaan secara fundamental: membatasi presiden, menciptakan MK, membentuk DPD, dan memperkuat HAM—dilakukan secara demokratis."},
    {n:12,pilar:"UUD 1945",diff:"sulit",q:"Alasan konstitusional mengapa Konstituante yang dipilih langsung rakyat justru dibubarkan melalui Dekret Presiden 1959 adalah...",opsi:{A:"Soekarno tidak suka demokrasi",B:"Kebuntuan Konstituante mengancam stabilitas negara dan tidak ada cara konstitusional lain untuk menyelesaikannya",C:"Amerika Serikat meminta pembubaran Konstituante",D:"Tidak ada alasan yang valid"},jawab:"B",exp:"Konstituante gagal mencapai quorum setelah berulang kali voting selama 3 tahun. Kebuntuan ini mengancam stabilitas nasional, sehingga dekret digunakan sebagai solusi darurat konstitusional."},
    {n:13,pilar:"UUD 1945",diff:"sulit",stimulus:"Muncul wacana di masyarakat untuk mengadakan referendum guna mengubah Pembukaan UUD 1945 dan mengganti Pancasila sebagai dasar negara.",q:"Wacana tersebut tidak dapat dilaksanakan secara konstitusional karena...",opsi:{A:"Referendum mahal dan sulit dilaksanakan",B:"Pembukaan UUD 1945 tidak dapat diubah bahkan oleh MPR sekalipun karena memuat Pancasila sebagai staatsfundamentalnorm",C:"Masyarakat tidak boleh berpendapat soal konstitusi",D:"Pancasila sudah disetujui semua partai"},jawab:"B",exp:"MPR sekalipun tidak berwenang mengubah Pembukaan UUD 1945 karena memuat Pancasila—staatsfundamentalnorm yang menjadi dasar legitimasi NKRI itu sendiri."},
    {n:14,pilar:"UUD 1945",diff:"sulit",q:"Pernyataan yang PALING TEPAT tentang hubungan antara Proklamasi Kemerdekaan dan UUD 1945 adalah...",opsi:{A:"Proklamasi dan UUD 1945 tidak memiliki hubungan",B:"Proklamasi adalah sumber hukum tertinggi dan UUD 1945 adalah penjabaran proklamasi dalam bentuk hukum dasar tertulis",C:"UUD 1945 lebih tinggi dari proklamasi",D:"Proklamasi hanya bermakna historis tanpa nilai hukum"},jawab:"B",exp:"Proklamasi adalah pernyataan kemerdekaan yang menjadi dasar eksistensi negara, sedangkan UUD 1945 adalah penjabaran teknis dalam hukum dasar tertulis."},
    {n:15,pilar:"UUD 1945",diff:"sulit",stimulus:"Dalam perdebatan BPUPKI, ada tiga tokoh yang memaparkan konsep dasar negara dengan perspektif berbeda: integralistik, agamis, dan nasionalis.",q:"Konsep Soekarno yang akhirnya diterima mencerminkan pendekatan...",opsi:{A:"Integralistik murni seperti Soepomo",B:"Agamis murni seperti kelompok Islam",C:"Sintesis yang mengintegrasikan nilai ketuhanan, kemanusiaan, kebangsaan, demokrasi, dan keadilan sosial",D:"Sekuler murni yang memisahkan agama dari negara"},jawab:"C",exp:"Pancasila versi Soekarno adalah sintesis brilian yang mengintegrasikan nilai ketuhanan, kebangsaan dan persatuan, demokrasi, serta keadilan sosial menjadi satu kesatuan."},
  ]},

  // ── PAKET 4: Hak & Kewajiban Warga Negara dalam UUD 1945 ──
  { judul:"Paket 4", topik:"UUD 1945 — Hak & Kewajiban Warga Negara", soal:[
    {n:1,pilar:"UUD 1945",diff:"mudah",q:"Pasal 28A UUD 1945 menjamin hak warga negara untuk...",opsi:{A:"Mendapat pendidikan gratis",B:"Hidup serta mempertahankan hidup dan kehidupannya",C:"Memilih dalam pemilu",D:"Mendirikan perusahaan"},jawab:"B",exp:"Pasal 28A UUD 1945 menegaskan: 'Setiap orang berhak untuk hidup serta berhak mempertahankan hidup dan kehidupannya.' Ini adalah hak yang tidak dapat dikurangi (non-derogable right)."},
    {n:2,pilar:"UUD 1945",diff:"mudah",q:"Kewajiban warga negara untuk membayar pajak diatur dalam UUD 1945 Pasal...",opsi:{A:"Pasal 23A",B:"Pasal 27 ayat (1)",C:"Pasal 30",D:"Pasal 31"},jawab:"A",exp:"Pasal 23A UUD 1945 mengatur bahwa pajak dan pungutan lain bersifat memaksa untuk keperluan negara diatur dengan undang-undang."},
    {n:3,pilar:"UUD 1945",diff:"mudah",q:"Hak warga negara untuk mendapatkan pendidikan dasar diatur dalam UUD 1945 Pasal...",opsi:{A:"Pasal 28",B:"Pasal 29",C:"Pasal 31",D:"Pasal 34"},jawab:"C",exp:"Pasal 31 UUD 1945 menegaskan hak setiap warga negara untuk mendapat pendidikan, serta mewajibkan pemerintah membiayai pendidikan dasar."},
    {n:4,pilar:"UUD 1945",diff:"mudah",q:"Perbedaan antara 'hak warga negara' dan 'hak asasi manusia' yang paling mendasar adalah...",opsi:{A:"Tidak ada perbedaan sama sekali",B:"HAM berlaku bagi setiap manusia tanpa memandang kewarganegaraan; hak warga negara hanya berlaku bagi mereka yang memiliki status kewarganegaraan",C:"Hak warga negara lebih luas dari HAM",D:"HAM hanya berlaku di tingkat internasional"},jawab:"B",exp:"HAM bersifat universal—melekat pada setiap manusia karena ia manusia. Hak warga negara bersifat particular—hanya berlaku bagi mereka yang memiliki kewarganegaraan negara tertentu."},
    {n:5,pilar:"UUD 1945",diff:"mudah",q:"Kewajiban bela negara bagi warga negara Indonesia diatur dalam UUD 1945 Pasal...",opsi:{A:"Pasal 27 ayat (3) dan Pasal 30",B:"Pasal 28 dan Pasal 31",C:"Pasal 29 dan Pasal 32",D:"Pasal 33 dan Pasal 34"},jawab:"A",exp:"Pasal 27 ayat (3) menyatakan setiap warga negara berhak dan wajib ikut serta dalam upaya pembelaan negara. Pasal 30 mengatur pertahanan dan keamanan negara."},
    {n:6,pilar:"UUD 1945",diff:"sedang",stimulus:"Pemerintah mengeluarkan kebijakan yang melarang demonstrasi di semua tempat umum dengan alasan menjaga ketertiban dan keamanan nasional.",q:"Kebijakan tersebut bermasalah secara konstitusional karena...",opsi:{A:"Demonstrasi selalu menimbulkan kerusuhan",B:"Kebebasan berpendapat dan berkumpul adalah hak konstitusional (Pasal 28E) yang tidak dapat dibatasi secara absolut kecuali dengan UU yang proporsional",C:"Pemerintah tidak boleh mengeluarkan kebijakan apapun",D:"Polisi tidak sanggup mengamankan demonstrasi"},jawab:"B",exp:"Pasal 28E UUD 1945 menjamin kebebasan berserikat, berkumpul, dan berpendapat. Pembatasan hak ini hanya boleh dilakukan dengan undang-undang dan bersifat proporsional."},
    {n:7,pilar:"UUD 1945",diff:"sedang",q:"Perbedaan antara 'hak yang dapat dibatasi' (derogable) dan 'hak yang tidak dapat dibatasi' (non-derogable) dalam UUD 1945 terletak pada...",opsi:{A:"Derogable rights lebih penting",B:"Non-derogable rights (hak hidup, bebas dari penyiksaan, hak beragama) tidak boleh dikurangi dalam keadaan apapun; derogable rights dapat dibatasi dalam kondisi tertentu dengan UU",C:"Semua hak adalah derogable rights",D:"Pemerintah bebas membatasi semua hak saat darurat"},jawab:"B",exp:"Non-derogable rights tidak bisa dikurangi bahkan saat perang atau keadaan darurat. Derogable rights dapat dibatasi dengan syarat ketat: melalui UU, proporsional, dan tidak menghancurkan esensi hak."},
    {n:8,pilar:"UUD 1945",diff:"sedang",stimulus:"Seorang tersangka ditahan selama 6 bulan tanpa pemeriksaan oleh hakim dan tanpa akses ke pengacara.",q:"Tindakan tersebut melanggar hak konstitusional tersangka berdasarkan...",opsi:{A:"Pasal 27 tentang persamaan hukum dan Pasal 28D tentang kepastian hukum yang adil",B:"Pasal 31 tentang pendidikan",C:"Pasal 30 tentang pertahanan negara",D:"Pasal 34 tentang fakir miskin"},jawab:"A",exp:"Pasal 27 ayat (1) menjamin persamaan kedudukan di hadapan hukum. Pasal 28D ayat (1) menjamin kepastian hukum dan perlakuan yang adil. Penahanan tanpa proses hukum layak melanggar keduanya."},
    {n:9,pilar:"UUD 1945",diff:"sedang",q:"Dalam konteks hak dan kewajiban, mengapa kewajiban membayar pajak tidak dapat dianalogikan dengan 'pemaksaan' yang bertentangan dengan HAM?",opsi:{A:"Pajak bersifat sukarela",B:"Kewajiban pajak ditetapkan dengan UU (Pasal 23A) demi kepentingan publik dan merupakan kontrak sosial antara warga dan negara",C:"HAM tidak berlaku di bidang perpajakan",D:"Pemerintah boleh memaksa warga untuk apapun"},jawab:"B",exp:"Kewajiban pajak ditetapkan melalui undang-undang yang demokratis—ini adalah kontrak sosial: warga membayar pajak sebagai imbal balik atas layanan dan perlindungan negara."},
    {n:10,pilar:"UUD 1945",diff:"sedang",stimulus:"Sebuah kampus negeri melarang mahasiswi berjilbab dengan alasan peraturan seragam yang seragam untuk semua.",q:"Kebijakan kampus tersebut bertentangan dengan Pasal...",opsi:{A:"Pasal 30",B:"Pasal 28E ayat (1) dan (2) tentang hak beragama dan menjalankan ajaran agama",C:"Pasal 27 ayat (2)",D:"Pasal 34"},jawab:"B",exp:"Pasal 28E ayat (1) menjamin hak memilih agama dan beribadat. Pasal 28E ayat (2) menjamin kebebasan menjalankan keyakinan. Larangan berjilbab melanggar hak menjalankan ajaran agama."},
    {n:11,pilar:"UUD 1945",diff:"sulit",stimulus:"Sebuah perusahaan media menolak memberikan hak jawab kepada seseorang yang merasa dirugikan oleh pemberitaan dan menyatakan kebebasan pers lebih tinggi dari hak individu.",q:"Sengketa ini mencerminkan konflik antara...",opsi:{A:"Dua kewajiban warga negara",B:"Hak kebebasan pers (Pasal 28E) dan hak mendapat perlindungan diri dari informasi yang salah (Pasal 28F dan 28G) yang harus diselesaikan secara proporsional",C:"Hak perusahaan dan kewajiban negara",D:"Tidak ada hak yang dilanggar"},jawab:"B",exp:"Ini adalah konflik antara dua hak konstitusional: kebebasan pers (Pasal 28E) dan hak atas perlindungan dari informasi menyesatkan (Pasal 28G). Keduanya harus diseimbangkan secara proporsional."},
    {n:12,pilar:"UUD 1945",diff:"sulit",q:"Tanggung jawab negara dalam memenuhi hak ekonomi, sosial, dan budaya (ekosob) bersifat 'progressive realization'. Ini berarti...",opsi:{A:"Negara tidak pernah wajib memenuhi hak ekosob",B:"Negara wajib mengambil langkah-langkah maksimal sesuai sumber daya yang tersedia secara bertahap dan berkelanjutan",C:"Hak ekosob harus dipenuhi seketika tanpa batas anggaran",D:"Hak ekosob lebih rendah dari hak sipil-politik"},jawab:"B",exp:"Progressive realization berarti negara memiliki kewajiban memenuhi hak ekosob secara progresif—mengambil langkah nyata secara maksimal sesuai kapasitas fiskal, bukan menunda tanpa batas."},
    {n:13,pilar:"UUD 1945",diff:"sulit",stimulus:"Pasal 28J UUD 1945 memungkinkan pembatasan hak asasi. Seorang politisi menggunakannya untuk membenarkan kebijakan yang membungkam oposisi.",q:"Penggunaan Pasal 28J oleh politisi tersebut adalah penyalahgunaan karena...",opsi:{A:"Pasal 28J tidak ada dalam UUD 1945",B:"Pasal 28J hanya membolehkan pembatasan melalui UU, untuk menjamin HAM orang lain dan kepentingan umum—bukan untuk membungkam oposisi",C:"Oposisi tidak memiliki hak asasi",D:"Pemerintah selalu benar menafsirkan UUD"},jawab:"B",exp:"Pasal 28J ayat (2) membolehkan pembatasan HAM yang sangat ketat: harus dengan UU, proporsional, dan tujuannya hanya untuk melindungi HAM orang lain dan kepentingan umum yang sah."},
    {n:14,pilar:"UUD 1945",diff:"sulit",q:"Mengapa hak pilih (memilih dan dipilih) dikategorikan sebagai 'hak warga negara' dan bukan semata-mata 'hak asasi manusia'?",opsi:{A:"Hak pilih tidak penting bagi HAM",B:"Hak pilih mensyaratkan status kewarganegaraan dan usia tertentu yang merupakan persyaratan sah, sedangkan HAM melekat pada setiap manusia tanpa syarat demikian",C:"HAM tidak mencakup hak politik apapun",D:"Hak pilih hanya untuk elite tertentu"},jawab:"B",exp:"Hak pilih mensyaratkan kewarganegaraan dan usia—persyaratan sah yang membedakannya dari HAM yang melekat pada setiap manusia. Namun hak pilih juga diakui sebagai HAM dalam konteks hak sipil-politik."},
    {n:15,pilar:"UUD 1945",diff:"sulit",stimulus:"Pasal 34 UUD 1945 mewajibkan negara memelihara fakir miskin dan anak-anak terlantar. Namun masih banyak program sosial yang tidak tepat sasaran.",q:"Kondisi tersebut mengindikasikan adanya kesenjangan antara...",opsi:{A:"Hukum internasional dan hukum nasional",B:"Das Sollen (norma ideal konstitusi) dan Das Sein (realitas implementasi) yang menuntut perbaikan tata kelola program sosial",C:"Keinginan rakyat dan keinginan pemerintah",D:"UUD 1945 dan Pancasila"},jawab:"B",exp:"Ini adalah kesenjangan antara Das Sollen (apa yang seharusnya—norma konstitusi) dan Das Sein (apa yang ada—realitas). Kesenjangan ini menuntut perbaikan tata kelola dan pengawasan program sosial."},
  ]},

  // ── PAKET 5: Lembaga-Lembaga Negara berdasarkan UUD 1945 ──
  { judul:"Paket 5", topik:"UUD 1945 — Lembaga-Lembaga Negara", soal:[
    {n:1,pilar:"UUD 1945",diff:"mudah",q:"Lembaga negara yang berwenang membuat undang-undang bersama Presiden adalah...",opsi:{A:"Mahkamah Agung",B:"Dewan Perwakilan Rakyat (DPR)",C:"Badan Pemeriksa Keuangan",D:"Komisi Yudisial"},jawab:"B",exp:"DPR memegang kekuasaan legislatif. Berdasarkan Pasal 20 UUD 1945, DPR bersama Presiden membentuk undang-undang."},
    {n:2,pilar:"UUD 1945",diff:"mudah",q:"Lembaga yang bertugas memeriksa pengelolaan dan tanggung jawab keuangan negara adalah...",opsi:{A:"Komisi Pemberantasan Korupsi",B:"Badan Pemeriksa Keuangan (BPK)",C:"Mahkamah Konstitusi",D:"Dewan Pertimbangan Presiden"},jawab:"B",exp:"BPK adalah lembaga negara yang bertugas memeriksa pengelolaan dan tanggung jawab keuangan negara sebagaimana diatur dalam Pasal 23E UUD 1945."},
    {n:3,pilar:"UUD 1945",diff:"mudah",q:"DPD (Dewan Perwakilan Daerah) mewakili...",opsi:{A:"Partai politik di pusat",B:"Daerah-daerah (provinsi) di tingkat nasional",C:"Kelompok agama tertentu",D:"Pengusaha dan BUMN"},jawab:"B",exp:"DPD adalah lembaga perwakilan daerah yang anggotanya dipilih dari setiap provinsi, bertugas mewakili kepentingan daerah dalam proses legislasi nasional."},
    {n:4,pilar:"UUD 1945",diff:"mudah",q:"Mahkamah Konstitusi (MK) dibentuk berdasarkan hasil amandemen UUD 1945 yang ke...",opsi:{A:"Pertama (1999)",B:"Kedua (2000)",C:"Ketiga (2001)",D:"Keempat (2002)"},jawab:"C",exp:"MK dibentuk berdasarkan Amandemen Ketiga UUD 1945 tahun 2001 dan mulai beroperasi pada tahun 2003. MK memiliki yurisdiksi khusus di bidang konstitusional."},
    {n:5,pilar:"UUD 1945",diff:"mudah",q:"Presiden sebagai kepala negara sekaligus kepala pemerintahan merupakan ciri sistem pemerintahan...",opsi:{A:"Parlementer",B:"Presidensial",C:"Semi-presidensial",D:"Monarki konstitusional"},jawab:"B",exp:"Dalam sistem presidensial, presiden memiliki dua peran: sebagai kepala negara (lambang negara) dan kepala pemerintahan (pemegang kekuasaan eksekutif)."},
    {n:6,pilar:"UUD 1945",diff:"sedang",q:"Setelah amandemen, tidak ada lagi lembaga negara yang berstatus 'tertinggi'. Prinsip ini mencerminkan konsep...",opsi:{A:"Supremasi parlemen",B:"Trias politica murni",C:"Checks and balances—setiap lembaga mengawasi dan mengimbangi lembaga lain",D:"Supremasi eksekutif"},jawab:"C",exp:"Pasca-amandemen, Indonesia menerapkan checks and balances: tidak ada lembaga tertinggi, semua lembaga saling mengawasi dan mengimbangi satu sama lain."},
    {n:7,pilar:"UUD 1945",diff:"sedang",q:"MA (Mahkamah Agung) dan MK (Mahkamah Konstitusi) memiliki perbedaan yurisdiksi yang mendasar yaitu...",opsi:{A:"MA mengadili perdata; MK mengadili pidana",B:"MA berwenang atas peradilan umum dan kasasi; MK berwenang khusus menguji UU terhadap UUD dan kasus konstitusional tertentu",C:"Keduanya identik dalam kewenangan",D:"MK lebih tinggi dari MA"},jawab:"B",exp:"MA menangani peradilan umum (kasasi) dan menguji peraturan di bawah UU. MK berwenang khusus: menguji UU terhadap UUD, sengketa kewenangan lembaga negara, pembubaran parpol, dan sengketa pemilu."},
    {n:8,pilar:"UUD 1945",diff:"sedang",stimulus:"Seorang presiden terpilih mengusulkan agar DPR dibubarkan karena sering menolak RUU yang diajukannya.",q:"Tindakan tersebut inkonstitusional karena...",opsi:{A:"Presiden boleh membubarkan DPR jika perlu",B:"UUD 1945 tidak memberikan kewenangan kepada presiden untuk membubarkan DPR; justru DPR yang dapat memberhentikan presiden melalui mekanisme impeachment",C:"Peraturan presiden lebih kuat dari UU",D:"Tidak ada masalah konstitusional"},jawab:"B",exp:"UUD 1945 tidak memberikan kewenangan presiden untuk membubarkan DPR. Sistem presidensial Indonesia justru memberi DPR kekuasaan memberhentikan presiden melalui impeachment."},
    {n:9,pilar:"UUD 1945",diff:"sedang",q:"DPD mengajukan RUU tentang otonomi daerah namun DPR menolak membahasnya bersama. Dalam kerangka konstitusional, posisi DPD memang lebih lemah dari DPR karena...",opsi:{A:"DPD tidak diatur dalam UUD 1945",B:"DPD hanya dapat mengajukan dan memberi pertimbangan RUU terkait daerah, tetapi tidak memiliki hak legislasi penuh seperti DPR",C:"DPD adalah lembaga tidak resmi",D:"DPD hanya bertugas di daerah"},jawab:"B",exp:"DPD memiliki kewenangan terbatas: hanya dapat mengajukan dan memberi pertimbangan RUU terkait daerah kepada DPR, tetapi tidak memiliki hak co-decision seperti DPR."},
    {n:10,pilar:"UUD 1945",diff:"sedang",q:"Prosedur pemakzulan (impeachment) presiden dalam UUD 1945 melibatkan tiga lembaga. Urutan yang benar adalah...",opsi:{A:"MK → DPR → MPR",B:"DPR → MK → MPR",C:"MPR → DPR → MK",D:"DPR → MPR → MK"},jawab:"B",exp:"(1) DPR mengajukan usul pemberhentian, (2) MK memeriksa apakah presiden melanggar hukum/konstitusi, (3) MPR bersidang untuk memutuskan pemberhentian."},
    {n:11,pilar:"UUD 1945",diff:"sulit",stimulus:"MK mengeluarkan putusan yang menyatakan sebuah pasal UU bertentangan dengan UUD 1945 dan tidak memiliki kekuatan hukum mengikat.",q:"Implikasi konstitusional putusan ini adalah...",opsi:{A:"DPR wajib mengubah UU tersebut sesuai putusan MK",B:"Pasal tersebut langsung batal dan tidak dapat diterapkan, meski DPR belum merevisi UU",C:"Putusan MK dapat diabaikan pemerintah",D:"MK harus meminta izin DPR terlebih dahulu"},jawab:"B",exp:"Putusan MK bersifat final dan mengikat (erga omnes). Pasal yang dinyatakan inkonstitusional langsung tidak berlaku sejak putusan dibacakan, tanpa perlu menunggu revisi DPR."},
    {n:12,pilar:"UUD 1945",diff:"sulit",q:"Lembaga negara 'independen' seperti KPK, Komnas HAM, dan KPU disebut state auxiliary organs karena...",opsi:{A:"Mereka lebih tinggi dari lembaga utama negara",B:"Mereka adalah lembaga pendukung yang lahir dari kebutuhan demokrasi modern, bersifat independen dari cabang kekuasaan utama namun berakar dari UU atau UUD",C:"Mereka adalah lembaga sementara yang akan dibubarkan",D:"Mereka bagian dari kekuasaan eksekutif"},jawab:"B",exp:"State auxiliary organs adalah lembaga negara bantu yang muncul karena kebutuhan demokrasi modern. Mereka independen untuk menghindari intervensi politik dan menjalankan fungsi yang tidak dapat dilakukan lembaga utama secara efektif."},
    {n:13,pilar:"UUD 1945",diff:"sulit",q:"Alasan mendasar mengapa DPR tidak dapat dijadikan satu-satunya pemegang kekuasaan dalam sistem Indonesia adalah...",opsi:{A:"DPR tidak dipilih langsung rakyat",B:"Konsentrasi kekuasaan pada satu lembaga berisiko menghasilkan tirani mayoritas; UUD 1945 menerapkan separation of powers dengan checks and balances",C:"DPR terlalu banyak anggotanya",D:"DPR tidak kompeten"},jawab:"B",exp:"Konsentrasi kekuasaan pada satu lembaga—bahkan yang dipilih demokratis—berisiko menjadi tirani mayoritas. Pemisahan kekuasaan dengan checks and balances adalah solusi konstitusional yang fundamental."},
    {n:14,pilar:"UUD 1945",diff:"sulit",stimulus:"MK memutus bahwa ambang batas pencalonan presiden (presidential threshold) bertentangan dengan UUD 1945.",q:"Keputusan MK ini merupakan contoh penerapan fungsi MK sebagai...",opsi:{A:"Pembuat undang-undang",B:"Negative legislator—membatalkan norma yang inkonstitusional untuk menjaga kemurnian konstitusi",C:"Pengganti DPR dalam membuat kebijakan",D:"Lembaga yang lebih tinggi dari DPR"},jawab:"B",exp:"MK disebut negative legislator: tidak membuat norma baru, tetapi membatalkan norma yang bertentangan dengan UUD 1945. Ini berbeda dari DPR sebagai positive legislator yang membuat norma."},
    {n:15,pilar:"UUD 1945",diff:"sulit",stimulus:"Presiden mengeluarkan Perppu dalam situasi yang menurut DPR tidak memenuhi syarat 'kegentingan yang memaksa'.",q:"Mekanisme konstitusional untuk menyelesaikan sengketa ini adalah...",opsi:{A:"MA membatalkan Perppu",B:"DPR dapat menolak Perppu dalam sidang berikutnya sehingga Perppu tidak berlaku; MK dapat diminta menguji jika Perppu ditetapkan menjadi UU",C:"Presiden memiliki hak mutlak mengeluarkan Perppu",D:"Perppu otomatis berlaku setelah 30 hari"},jawab:"B",exp:"DPR berwenang menyetujui atau menolak Perppu dalam sidang berikutnya (Pasal 22 UUD). Jika ditetapkan menjadi UU, MK dapat menguji konstitusionalitasnya termasuk syarat 'kegentingan memaksa'."},
  ]},

  // ── PAKET 6: Konsep & Hakikat NKRI ──
  { judul:"Paket 6", topik:"NKRI — Konsep & Hakikat Negara Kesatuan", soal:[
    {n:1,pilar:"NKRI",diff:"mudah",q:"Bentuk negara Indonesia sebagaimana tercantum dalam Pasal 1 ayat (1) UUD 1945 adalah...",opsi:{A:"Negara Federal",B:"Negara Serikat",C:"Negara Kesatuan yang berbentuk Republik",D:"Negara Monarki Konstitusional"},jawab:"C",exp:"Pasal 1 ayat (1) UUD 1945 menegaskan: 'Negara Indonesia ialah Negara Kesatuan, yang berbentuk Republik.' Ini adalah ketentuan yang tidak dapat diubah."},
    {n:2,pilar:"NKRI",diff:"mudah",q:"Semboyan 'Bhinneka Tunggal Ika' yang menjadi semboyan bangsa Indonesia berasal dari kitab...",opsi:{A:"Kitab Negarakertagama karya Mpu Prapanca",B:"Kitab Sutasoma karya Mpu Tantular",C:"Kitab Arjunawiwaha karya Mpu Kanwa",D:"Kitab Ramayana"},jawab:"B",exp:"Bhinneka Tunggal Ika berasal dari Kitab Sutasoma yang ditulis oleh Mpu Tantular pada zaman Kerajaan Majapahit. Artinya 'berbeda-beda tetapi tetap satu jua'."},
    {n:3,pilar:"NKRI",diff:"mudah",q:"Deklarasi Djuanda 1957 penting bagi NKRI karena...",opsi:{A:"Mengatur pembagian keuntungan minyak bumi",B:"Mengubah konsep wilayah Indonesia dari kepulauan terpisah menjadi satu kesatuan maritim",C:"Menolak campur tangan Belanda",D:"Mengatur batas darat dengan Malaysia"},jawab:"B",exp:"Deklarasi Djuanda mengubah paradigma dari 'laut adalah pemisah pulau' menjadi 'laut adalah pemersatu pulau'. Ini memperluas wilayah laut Indonesia dan menjadi fondasi konsep negara kepulauan (UNCLOS 1982)."},
    {n:4,pilar:"NKRI",diff:"mudah",q:"Konsep 'integrasi nasional' berbeda dari 'asimilasi' dalam konteks NKRI karena...",opsi:{A:"Keduanya identik",B:"Integrasi nasional mempertahankan identitas kelompok dalam kerangka persatuan; asimilasi memaksa hilangnya identitas kelompok demi keseragaman",C:"Asimilasi lebih baik dari integrasi",D:"Integrasi tidak penting bagi NKRI"},jawab:"B",exp:"Integrasi nasional membangun persatuan dengan menghormati keberagaman (Bhinneka Tunggal Ika). Asimilasi memaksa kelompok minoritas melebur ke kelompok dominan. NKRI mengutamakan integrasi."},
    {n:5,pilar:"NKRI",diff:"mudah",q:"Makna 'kedaulatan rakyat' dalam konteks NKRI pasca-amandemen UUD 1945 adalah bahwa...",opsi:{A:"Rakyat tidak lagi menjadi pemegang kedaulatan",B:"Kedaulatan rakyat dilaksanakan langsung melalui pemilihan presiden, DPR, DPD, dan DPRD—tidak lagi sepenuhnya melalui MPR",C:"MPR masih menjadi pemegang kedaulatan penuh",D:"Kedaulatan tidak berubah setelah amandemen"},jawab:"B",exp:"Pasca-amandemen, Pasal 1 ayat (2) berubah: kedaulatan 'berada di tangan rakyat dan dilaksanakan menurut UUD'. Rakyat kini memilih langsung presiden, DPR, DPD, dan DPRD."},
    {n:6,pilar:"NKRI",diff:"sedang",stimulus:"Sebuah provinsi di Indonesia mengancam akan memisahkan diri karena merasa hasil sumber daya alamnya tidak dibagi secara adil oleh pemerintah pusat.",q:"Ancaman tersebut tidak dapat dibenarkan dalam sistem NKRI karena...",opsi:{A:"Provinsi tidak boleh memiliki pendapat",B:"Kedaulatan NKRI bersifat tidak terbagi dan keutuhan wilayah adalah prinsip konstitusional; keluhan SDA harus diselesaikan melalui desentralisasi fiskal",C:"SDA seluruhnya milik pemerintah pusat",D:"Provinsi harus menerima apapun kebijakan pusat"},jawab:"B",exp:"NKRI adalah negara kesatuan dengan kedaulatan tidak terbagi. Ketidakadilan distribusi SDA adalah masalah kebijakan yang harus diselesaikan melalui revisi dana bagi hasil, bukan pemisahan diri."},
    {n:7,pilar:"NKRI",diff:"sedang",q:"Perbedaan paling esensial antara negara kesatuan (NKRI) dan negara federal dari perspektif kedaulatan adalah...",opsi:{A:"Negara federal lebih demokratis dari negara kesatuan",B:"Dalam negara kesatuan kedaulatan tunggal berada di pusat; dalam federal kedaulatan dibagi antara pemerintah federal dan negara-negara bagian",C:"Negara kesatuan tidak mengenal otonomi daerah",D:"Keduanya identik dalam hal kedaulatan"},jawab:"B",exp:"Perbedaan mendasarnya pada kedaulatan. Negara kesatuan: satu kedaulatan di pusat (daerah mendapat pelimpahan). Negara federal: kedaulatan dibagi antara federal dan negara bagian secara konstitusional."},
    {n:8,pilar:"NKRI",diff:"sedang",stimulus:"Seorang gubernur mengeluarkan pernyataan bahwa provinsinya akan membuat hubungan diplomatik langsung dengan negara asing tanpa melalui pemerintah pusat.",q:"Tindakan tersebut inkonstitusional karena...",opsi:{A:"Gubernur tidak boleh berkomunikasi dengan asing",B:"Hubungan luar negeri adalah urusan absolut pemerintah pusat yang tidak dapat diserahkan kepada daerah berdasarkan UU No. 23 Tahun 2014",C:"Gubernur tidak memiliki kantor luar negeri",D:"Daerah tidak punya anggaran untuk diplomatik"},jawab:"B",exp:"UU 23/2014 menetapkan enam urusan absolut pemerintah pusat, salah satunya adalah politik luar negeri. Gubernur tidak dapat menjalankan diplomasi independen karena akan merusak kesatuan representasi NKRI."},
    {n:9,pilar:"NKRI",diff:"sedang",stimulus:"Pasca-reformasi, beberapa daerah di Indonesia mengajukan referendum untuk memisahkan diri. Pemerintah menolak dengan tegas.",q:"Landasan konstitusional penolakan tersebut adalah...",opsi:{A:"Referendum adalah cara tidak demokratis",B:"Pasal 1 ayat (1) UUD 1945 menetapkan NKRI sebagai negara kesatuan yang tidak dapat diubah melalui mekanisme apapun termasuk referendum",C:"Referendum hanya boleh dilakukan di tingkat nasional",D:"Daerah tidak berhak mengajukan referendum"},jawab:"B",exp:"Pasal 1 ayat (1) UUD 1945 tentang negara kesatuan termasuk dalam ketentuan yang tidak dapat diubah (Pasal 37 ayat 5). Referendum untuk memisahkan diri pun tidak memiliki landasan konstitusional."},
    {n:10,pilar:"NKRI",diff:"sedang",q:"Otonomi daerah dalam sistem NKRI bersifat 'desentralisasi', bukan 'federalisme'. Perbedaannya terletak pada...",opsi:{A:"Desentralisasi berarti daerah tidak punya kewenangan apapun",B:"Dalam desentralisasi, kewenangan daerah merupakan pelimpahan dari pusat dan dapat ditarik kembali; dalam federalisme kewenangan negara bagian dijamin konstitusi federal",C:"Federalisme dan desentralisasi identik",D:"Desentralisasi hanya berlaku untuk keuangan"},jawab:"B",exp:"Dalam desentralisasi, daerah mendapat pelimpahan kewenangan dari pusat yang secara prinsip dapat diatur ulang. Dalam federalisme, kewenangan negara bagian dijamin konstitusi dan tidak dapat diambil pusat secara sepihak."},
    {n:11,pilar:"NKRI",diff:"sulit",stimulus:"Beberapa akademisi berpendapat bahwa Indonesia sebaiknya beralih ke sistem federal agar daerah-daerah yang kaya SDA tidak merasa 'dieksploitasi' pusat.",q:"Argumen kontra yang paling tepat dari perspektif NKRI adalah...",opsi:{A:"Federal selalu lebih baik dari kesatuan",B:"Persoalan distribusi SDA lebih tepat diselesaikan melalui reformasi dana bagi hasil dan desentralisasi fiskal, bukan perubahan bentuk negara yang berpotensi memicu disintegrasi",C:"Daerah kaya tidak berhak atas SDA-nya",D:"Indonesia terlalu besar untuk menjadi federal"},jawab:"B",exp:"Ketidakadilan distribusi SDA adalah masalah kebijakan yang dapat diselesaikan tanpa mengubah bentuk negara. Perubahan ke federal berpotensi menimbulkan masalah lebih besar seperti disintegrasi."},
    {n:12,pilar:"NKRI",diff:"sulit",q:"Ancaman disintegrasi bangsa yang paling berbahaya dalam konteks NKRI modern adalah...",opsi:{A:"Masuknya produk asing ke pasar Indonesia",B:"Radikalisme berbasis identitas (SARA) yang memanfaatkan media digital untuk memecah belah persatuan",C:"Banyaknya warga negara yang belajar di luar negeri",D:"Perdagangan bebas internasional"},jawab:"B",exp:"Radikalisme berbasis SARA yang disebarkan melalui media digital adalah ancaman disintegrasi paling nyata. Ia merusak sendi-sendi persatuan dengan membenturkan identitas agama, suku, dan ras."},
    {n:13,pilar:"NKRI",diff:"sulit",q:"Konsep 'wawasan nusantara' sebagai cara pandang bangsa Indonesia tentang diri dan lingkungannya mengandung makna bahwa...",opsi:{A:"Indonesia hanya peduli dengan wilayah daratnya",B:"Seluruh wilayah Indonesia—darat, laut, dan udara—beserta isinya merupakan satu kesatuan yang tidak terpisahkan dalam segala aspek kehidupan",C:"Indonesia tidak perlu bekerja sama dengan negara lain",D:"Wawasan nusantara hanya konsep militer"},jawab:"B",exp:"Wawasan nusantara adalah cara pandang bahwa seluruh wilayah NKRI merupakan satu kesatuan utuh dalam aspek politik, ekonomi, sosial-budaya, dan pertahanan-keamanan."},
    {n:14,pilar:"NKRI",diff:"sulit",stimulus:"Dalam era globalisasi, banyak norma internasional yang 'menekan' Indonesia untuk mengubah kebijakan domestiknya, termasuk di bidang hak asasi manusia.",q:"Sikap Indonesia yang paling tepat sesuai prinsip NKRI berdaulat adalah...",opsi:{A:"Menolak semua norma internasional",B:"Menerima norma internasional secara selektif, mengintegrasikannya dalam hukum nasional melalui proses demokratis, dengan tetap mempertahankan kedaulatan dan kepentingan nasional",C:"Mengikuti semua norma internasional tanpa syarat",D:"Mengabaikan tekanan internasional sepenuhnya"},jawab:"B",exp:"Indonesia sebagai negara berdaulat berhak menerima norma internasional secara selektif. Penerimaan norma internasional harus melalui proses demokratis dalam negeri, dengan mempertimbangkan kepentingan nasional."},
    {n:15,pilar:"NKRI",diff:"sulit",q:"Prinsip 'persatuan dalam keberagaman' (unity in diversity) dalam konteks NKRI memiliki implikasi kebijakan bahwa...",opsi:{A:"Semua daerah harus menggunakan satu bahasa dan satu budaya",B:"Kebijakan nasional harus mengakomodasi keberagaman lokal sambil mempertahankan standar minimal yang menjamin persatuan dan keadilan bagi semua warga",C:"Keberagaman budaya adalah ancaman bagi persatuan",D:"Kebijakan daerah lebih penting dari kebijakan nasional"},jawab:"B",exp:"Prinsip ini mengharuskan kebijakan nasional yang mengakomodasi keberagaman lokal (bahasa, adat, budaya) sambil mempertahankan nilai-nilai dan standar nasional yang menjamin persatuan dan keadilan."},
  ]},

  // ── PAKET 7: Wawasan Kebangsaan & Bela Negara ──
  { judul:"Paket 7", topik:"Wawasan Kebangsaan & Bela Negara", soal:[
    {n:1,pilar:"NKRI",diff:"mudah",q:"Sumpah Pemuda 28 Oktober 1928 memiliki makna historis sebagai...",opsi:{A:"Deklarasi perang terhadap Belanda",B:"Pernyataan komitmen pemuda untuk bertanah air, berbangsa, dan berbahasa satu: Indonesia",C:"Pembentukan partai politik pertama Indonesia",D:"Penolakan terhadap budaya asing"},jawab:"B",exp:"Sumpah Pemuda merupakan ikrar para pemuda dari berbagai daerah untuk bersatu sebagai satu bangsa Indonesia, dengan satu tanah air dan satu bahasa: Bahasa Indonesia."},
    {n:2,pilar:"NKRI",diff:"mudah",q:"Bela negara bagi warga negara Indonesia tidak hanya berarti angkat senjata, tetapi juga mencakup...",opsi:{A:"Hanya tugas TNI dan Polri",B:"Setiap upaya warga negara untuk mempertahankan dan memajukan bangsa dalam berbagai bidang kehidupan",C:"Menolak semua budaya asing",D:"Hanya berlaku saat perang"},jawab:"B",exp:"Bela negara memiliki makna luas: mencakup kontribusi di bidang pendidikan, ekonomi, sosial, budaya, dan pertahanan. Setiap warga negara dapat berpartisipasi sesuai kemampuannya."},
    {n:3,pilar:"Pancasila",diff:"mudah",q:"Nasionalisme Indonesia yang berlandaskan Pancasila berbeda dari nasionalisme sempit karena...",opsi:{A:"Nasionalisme Pancasila anti-asing sepenuhnya",B:"Nasionalisme Pancasila mengakui keberagaman dan tidak merendahkan bangsa lain",C:"Nasionalisme Pancasila sama dengan chauvinisme",D:"Nasionalisme Pancasila tidak mengenal cinta tanah air"},jawab:"B",exp:"Nasionalisme Pancasila bersifat inklusif dan humanis: mencintai bangsa sendiri tanpa merendahkan bangsa lain, mengakui keberagaman, dan membuka diri pada kerja sama internasional."},
    {n:4,pilar:"NKRI",diff:"mudah",q:"Empat konsensus dasar kehidupan berbangsa dan bernegara Indonesia adalah...",opsi:{A:"Pancasila, UUD 1945, NKRI, dan Bhinneka Tunggal Ika",B:"Pancasila, Sumpah Pemuda, Proklamasi, dan UUD 1945",C:"UUD 1945, MPR, DPR, dan Presiden",D:"Pancasila, Islam, Adat, dan Hukum"},jawab:"A",exp:"Empat konsensus dasar (4 Pilar Kebangsaan) adalah: Pancasila, UUD 1945, NKRI, dan Bhinneka Tunggal Ika. Keempatnya adalah fondasi kehidupan berbangsa dan bernegara Indonesia."},
    {n:5,pilar:"UUD 1945",diff:"mudah",q:"Bela negara sebagai hak dan kewajiban warga negara diatur dalam UUD 1945 Pasal...",opsi:{A:"Pasal 27 ayat (3) dan Pasal 30",B:"Pasal 28 dan Pasal 29",C:"Pasal 31 dan Pasal 32",D:"Pasal 33 dan Pasal 34"},jawab:"A",exp:"Pasal 27 ayat (3): setiap warga negara berhak dan wajib ikut serta dalam upaya pembelaan negara. Pasal 30: hak dan kewajiban warga negara ikut serta dalam pertahanan-keamanan."},
    {n:6,pilar:"NKRI",diff:"sedang",stimulus:"Seorang pelajar menyebarkan konten yang memecah belah masyarakat berdasarkan suku dan agama di media sosial dengan alasan kebebasan berekspresi.",q:"Tindakan tersebut bertentangan dengan nilai kebangsaan karena...",opsi:{A:"Pelajar tidak boleh menggunakan media sosial",B:"Kebebasan berekspresi dibatasi oleh tanggung jawab sosial untuk menjaga persatuan dan tidak menyebarkan kebencian berbasis SARA",C:"Media sosial selalu berbahaya",D:"Hanya pemerintah yang boleh berpendapat"},jawab:"B",exp:"Kebebasan berekspresi tidak mutlak—dibatasi oleh tanggung jawab sosial. Menyebarkan konten pemecah belah berbasis SARA mengancam persatuan dan melanggar UU ITE serta nilai-nilai Pancasila."},
    {n:7,pilar:"Pancasila",diff:"sedang",q:"Mengapa radikalisme dan ekstremisme bertentangan dengan nilai-nilai 4 Pilar Kebangsaan?",opsi:{A:"Karena radikalisme selalu menggunakan kekerasan fisik",B:"Karena radikalisme memaksakan satu tafsir tunggal yang menolak keberagaman dan mengancam persatuan, bertentangan dengan Pancasila, UUD 1945, NKRI, dan Bhinneka Tunggal Ika",C:"Karena radikalisme berasal dari luar negeri",D:"Karena radikalisme tidak populer di Indonesia"},jawab:"B",exp:"Radikalisme bertentangan dengan 4 pilar karena menolak keberagaman (anti-Bhinneka), memaksakan ideologi tertentu (anti-Pancasila), mengancam persatuan (anti-NKRI), dan melanggar konstitusi (anti-UUD 1945)."},
    {n:8,pilar:"NKRI",diff:"sedang",stimulus:"Di era digital, banyak warga yang dengan mudah mempercayai dan menyebarkan berita bohong (hoaks) yang bermuatan SARA.",q:"Sikap yang paling sesuai dengan nilai kebangsaan dalam menghadapi hoaks SARA adalah...",opsi:{A:"Langsung menyebarkan berita yang didapat dari grup WhatsApp",B:"Melakukan verifikasi terlebih dahulu melalui sumber terpercaya sebelum menyebarkan, dan menghindari konten yang berpotensi memecah belah",C:"Tidak perlu peduli dengan berita apapun",D:"Hanya percaya berita dari pemerintah"},jawab:"B",exp:"Literasi digital dan kritis media adalah bentuk bela negara modern. Verifikasi fakta sebelum menyebarkan informasi adalah tanggung jawab warga negara yang cerdas dan patriotik."},
    {n:9,pilar:"Pancasila",diff:"sedang",q:"Hubungan antara nasionalisme dan Pancasila dalam konteks bangsa Indonesia yang paling tepat adalah...",opsi:{A:"Nasionalisme bertentangan dengan Pancasila",B:"Pancasila menjadi landasan dan arah nasionalisme Indonesia sehingga cinta tanah air tidak berubah menjadi chauvinisme atau eksklusivisme",C:"Nasionalisme lebih penting dari Pancasila",D:"Keduanya tidak berhubungan"},jawab:"B",exp:"Pancasila menjadi fondasi nasionalisme Indonesia yang humanis: mendorong cinta tanah air yang sehat, tidak jatuh pada chauvinisme, dan menghormati keberagaman serta bangsa lain."},
    {n:10,pilar:"NKRI",diff:"sedang",q:"Bentuk bela negara yang paling relevan bagi pelajar SMA di era digital saat ini adalah...",opsi:{A:"Berlatih kemiliteran setiap hari",B:"Berprestasi akademis, mengembangkan karakter positif, menguasai teknologi, dan berkontribusi aktif dalam kehidupan sosial bermasyarakat",C:"Menolak semua pengaruh budaya asing",D:"Tidak menggunakan media sosial sama sekali"},jawab:"B",exp:"Bela negara bagi pelajar diwujudkan melalui prestasi akademis, karakter positif, literasi digital, dan kontribusi sosial. Ini adalah 'pertahanan lunak' yang melindungi bangsa dari ancaman non-militer."},
    {n:11,pilar:"NKRI",diff:"sulit",stimulus:"Seorang pemimpin daerah menyatakan bahwa daerahnya memiliki hak untuk menolak kebijakan nasional yang dianggap merugikan, termasuk dengan cara tidak melaksanakannya.",q:"Pernyataan tersebut bermasalah secara konstitusional karena...",opsi:{A:"Kepala daerah tidak boleh punya pendapat",B:"Dalam sistem NKRI, daerah tidak memiliki kedaulatan untuk menolak kebijakan nasional secara sepihak; penolakan harus melalui mekanisme hukum yang berlaku",C:"Kebijakan nasional selalu benar",D:"Kepala daerah harus setuju dengan semua kebijakan pusat"},jawab:"B",exp:"Dalam sistem NKRI, daerah tidak memiliki kedaulatan untuk menolak kebijakan nasional secara sepihak. Mekanisme yang sah adalah melalui gugatan ke pengadilan, lobi legislatif, atau jalur hukum lainnya."},
    {n:12,pilar:"Pancasila",diff:"sulit",q:"Mengapa pendidikan karakter berbasis nilai-nilai Pancasila dianggap sebagai bentuk 'bela negara lunak' (soft defense) yang krusial?",opsi:{A:"Karena pendidikan karakter lebih murah dari pertahanan militer",B:"Karena karakter yang berlandaskan Pancasila membangun ketahanan ideologis warga negara terhadap berbagai ancaman non-militer seperti radikalisme, hoaks, dan disintegrasi",C:"Karena militer tidak efektif melawan ancaman modern",D:"Karena pendidikan karakter adalah kewajiban internasional"},jawab:"B",exp:"Ketahanan ideologis yang dibangun melalui pendidikan karakter Pancasila adalah pertahanan terdepan melawan ancaman non-militer. Warga yang berkarakter kuat tidak mudah terpengaruh radikalisme dan hoaks."},
    {n:13,pilar:"NKRI",diff:"sulit",stimulus:"Globalisasi membawa pengaruh budaya asing yang masif ke Indonesia, sehingga muncul kekhawatiran akan lunturnya identitas nasional.",q:"Respons yang paling tepat dari perspektif NKRI dan Pancasila terhadap globalisasi budaya adalah...",opsi:{A:"Menolak semua budaya asing secara total",B:"Menyikapi globalisasi dengan penyaringan kritis: menyerap nilai positif yang selaras dengan Pancasila dan menolak yang bertentangan dengan kepribadian bangsa",C:"Menerima semua budaya asing tanpa seleksi",D:"Hanya mengizinkan budaya asing yang berasal dari Asia"},jawab:"B",exp:"Pancasila sebagai ideologi terbuka mengajarkan penyaringan kritis terhadap nilai asing: menerima yang positif dan selaras, menolak yang bertentangan dengan kepribadian bangsa dan nilai-nilai nasional."},
    {n:14,pilar:"Pancasila",diff:"sulit",q:"Hubungan antara 4 Pilar Kebangsaan (Pancasila, UUD 1945, NKRI, Bhinneka Tunggal Ika) bersifat saling mendukung. Hal ini berarti...",opsi:{A:"Cukup memahami satu pilar saja",B:"Melemahnya salah satu pilar akan berdampak pada kerapuhan pilar-pilar lainnya; keempatnya harus diperkuat secara bersamaan",C:"Satu pilar dapat menggantikan pilar lainnya",D:"Urutan pilar menentukan tingkat kepentingannya"},jawab:"B",exp:"Keempat pilar saling berkaitan dan mendukung. Jika salah satu melemah—misalnya nilai Pancasila dilanggar—maka NKRI terancam, UUD 1945 tidak bermakna, dan Bhinneka Tunggal Ika tidak terwujud."},
    {n:15,pilar:"NKRI",diff:"sulit",stimulus:"Seorang tokoh berpendapat bahwa untuk mewujudkan keadilan, Indonesia perlu menerapkan sistem hukum yang berbeda-beda di tiap daerah sesuai hukum adat atau agama setempat.",q:"Gagasan tersebut bertentangan dengan prinsip NKRI karena...",opsi:{A:"Hukum adat tidak penting",B:"Sistem hukum yang terpecah-pecah per daerah merusak kesatuan hukum nasional yang menjadi syarat fundamental negara kesatuan, meskipun adat dan agama tetap dihormati dalam koridor UU",C:"Hanya hukum positif yang berlaku di Indonesia",D:"Hukum agama tidak boleh mempengaruhi hukum nasional"},jawab:"B",exp:"NKRI mensyaratkan satu sistem hukum nasional yang menjamin kepastian dan kesetaraan hukum bagi semua warga. Adat dan nilai agama dapat diakui, tetapi dalam koridor hukum nasional yang berlaku seragam."},
  ]},

  // ── PAKET 8: Integrasi & Tantangan Kebangsaan ──
  { judul:"Paket 8", topik:"Integrasi Nasional & Tantangan Kebangsaan", soal:[
    {n:1,pilar:"NKRI",diff:"mudah",q:"Ancaman terhadap persatuan dan kesatuan bangsa yang bersifat non-militer (nirmiliter) contohnya adalah...",opsi:{A:"Invasi militer dari negara asing",B:"Separatisme bersenjata",C:"Penyebaran hoaks dan radikalisme melalui media sosial",D:"Bencana alam yang menghancurkan infrastruktur"},jawab:"C",exp:"Ancaman nirmiliter adalah ancaman yang tidak menggunakan kekuatan militer. Penyebaran hoaks dan radikalisme melalui media sosial merupakan ancaman nyata terhadap persatuan dan keutuhan NKRI."},
    {n:2,pilar:"Pancasila",diff:"mudah",q:"Toleransi antar umat beragama di Indonesia merupakan pengamalan langsung Pancasila sila ke...",opsi:{A:"Sila Pertama saja",B:"Sila Pertama dan Sila Ketiga",C:"Sila Kedua saja",D:"Sila Kelima saja"},jawab:"B",exp:"Toleransi beragama mencerminkan Sila Pertama (mengakui dan menghormati agama orang lain) dan Sila Ketiga (menjaga persatuan Indonesia melalui kerukunan antar umat beragama)."},
    {n:3,pilar:"NKRI",diff:"mudah",q:"Otonomi khusus yang diberikan kepada Papua dan Aceh merupakan salah satu cara menjaga integrasi NKRI melalui...",opsi:{A:"Pemberian kemerdekaan penuh kepada daerah",B:"Pemberian kewenangan lebih luas kepada daerah tertentu untuk mengakomodasi kekhususannya dalam bingkai NKRI",C:"Pembuatan negara bagian baru",D:"Penghapusan pemerintah pusat di daerah"},jawab:"B",exp:"Otonomi khusus adalah solusi konstitusional untuk mengakomodasi kekhususan daerah tertentu tanpa merusak bingkai NKRI. Ini adalah bentuk fleksibilitas dalam kesatuan."},
    {n:4,pilar:"UUD 1945",diff:"mudah",q:"Pasal 36 UUD 1945 menegaskan bahwa bahasa persatuan bangsa Indonesia adalah...",opsi:{A:"Bahasa Jawa",B:"Bahasa Melayu",C:"Bahasa Indonesia",D:"Bahasa Arab"},jawab:"C",exp:"Pasal 36 UUD 1945 menegaskan Bahasa Indonesia sebagai bahasa negara. Bahasa Indonesia berfungsi sebagai alat pemersatu bangsa yang kaya akan keberagaman bahasa daerah."},
    {n:5,pilar:"Pancasila",diff:"mudah",q:"Diskriminasi berbasis SARA bertentangan langsung dengan nilai Pancasila sila ke...",opsi:{A:"Sila Pertama saja",B:"Sila Kedua saja",C:"Sila Kedua dan Sila Ketiga",D:"Sila Kelima saja"},jawab:"C",exp:"Diskriminasi berbasis SARA melanggar Sila Kedua (kemanusiaan yang adil—setiap manusia dihargai tanpa diskriminasi) dan Sila Ketiga (persatuan—diskriminasi SARA memecah belah persatuan)."},
    {n:6,pilar:"NKRI",diff:"sedang",stimulus:"Ditemukan bukti bahwa sekelompok ormas secara sistematis menyebarkan narasi kebencian berbasis agama untuk mendelegitimasi pemerintah yang sah dan menggantinya dengan sistem lain.",q:"Tindakan ormas tersebut mengancam 4 Pilar Kebangsaan karena...",opsi:{A:"Ormas tidak boleh punya pendapat tentang pemerintah",B:"Narasi kebencian SARA merusak persatuan (anti-Sila Ketiga), mendelegitimasi negara (anti-NKRI), melanggar konstitusi (anti-UUD 1945), dan bertentangan dengan nilai kemanusiaan (anti-Sila Kedua)",C:"Ormas tidak boleh aktif dalam politik",D:"Hanya pemerintah yang boleh berkomentar tentang sistem negara"},jawab:"B",exp:"Ormas tersebut menyerang secara bersamaan: nilai persatuan Pancasila, keutuhan NKRI, legitimasi UUD 1945, dan nilai Bhinneka Tunggal Ika. Ini adalah ancaman komprehensif terhadap 4 Pilar Kebangsaan."},
    {n:7,pilar:"Pancasila",diff:"sedang",q:"Mengapa korupsi dapat dianggap sebagai pengkhianatan terhadap nilai-nilai Pancasila?",opsi:{A:"Karena korupsi melanggar hukum pidana",B:"Karena korupsi secara bersamaan melanggar Sila Kedua (tidak adil terhadap sesama), Sila Keempat (mengkhianati amanah publik), dan Sila Kelima (merusak keadilan sosial)",C:"Karena korupsi berasal dari budaya asing",D:"Karena korupsi hanya dilakukan pejabat negara"},jawab:"B",exp:"Korupsi adalah pelanggaran multidimensi terhadap Pancasila: merusak kemanusiaan (Sila II), mengkhianati amanah rakyat (Sila IV), dan menghancurkan keadilan sosial yang seharusnya dinikmati seluruh rakyat (Sila V)."},
    {n:8,pilar:"UUD 1945",diff:"sedang",stimulus:"Konflik horizontal berbasis SARA terjadi di suatu daerah. Pemerintah pusat mengambil alih kendali keamanan dari pemerintah daerah.",q:"Tindakan pemerintah pusat tersebut dapat dibenarkan secara konstitusional karena...",opsi:{A:"Pemerintah pusat selalu lebih benar dari daerah",B:"Pertahanan dan keamanan adalah urusan absolut pemerintah pusat; dalam situasi darurat, pusat berwenang mengambil langkah-langkah yang diperlukan untuk memulihkan ketertiban",C:"Pemerintah daerah tidak punya aparat keamanan",D:"Konflik SARA selalu salah daerah"},jawab:"B",exp:"Pertahanan dan keamanan adalah salah satu dari enam urusan absolut pemerintah pusat dalam UU 23/2014. Dalam situasi darurat yang mengancam keutuhan NKRI, pusat memiliki wewenang untuk bertindak."},
    {n:9,pilar:"NKRI",diff:"sedang",q:"Mengapa keberagaman budaya (multiculturalism) di Indonesia harus dipandang sebagai aset, bukan ancaman?",opsi:{A:"Karena budaya lokal tidak penting bagi pembangunan",B:"Karena keberagaman menjadi kekayaan dan daya tarik Indonesia, serta menjadi kekuatan lunak dalam diplomasi internasional jika dikelola dengan baik dalam bingkai Bhinneka Tunggal Ika",C:"Karena keberagaman memperlemah persatuan",D:"Karena Indonesia tidak mungkin menjadi seragam"},jawab:"B",exp:"Keberagaman budaya adalah kekayaan strategis: memperkuat identitas nasional, menjadi soft power dalam diplomasi, dan mendorong kreativitas inovasi. Kuncinya adalah pengelolaan yang berbasiskan Bhinneka Tunggal Ika."},
    {n:10,pilar:"Pancasila",diff:"sedang",q:"Prinsip 'musyawarah mufakat' dalam demokrasi Pancasila menjadi solusi untuk konflik kepentingan karena...",opsi:{A:"Musyawarah selalu menghasilkan keputusan yang menyenangkan semua pihak",B:"Musyawarah mendorong semua pihak mencari titik temu berbasis kepentingan bersama, bukan kemenangan satu pihak atas yang lain",C:"Mufakat berarti minoritas harus mengikuti mayoritas",D:"Musyawarah hanya untuk keputusan kecil"},jawab:"B",exp:"Musyawarah mufakat mendorong pencarian solusi berbasis kepentingan bersama (win-win), bukan pertarungan kekuatan (win-lose). Ini adalah fondasi demokrasi Pancasila yang berbeda dari demokrasi liberal."},
