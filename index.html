// ══════════════════════════════════════════
//  STATE & HELPERS
// ══════════════════════════════════════════
let currentPaket = null;
let answered = {};
let history = [];
let spinning = false;
let angle = 0;
const N = PAKET.length;
const COLORS = ['#c0392b','#c9a84c','#922b21','#a07830','#7f1d1d','#8b6914','#e74c3c','#d4a017'];

function drawWheel(rot) {
  const c = document.getElementById('wheelCanvas');
  const ctx = c.getContext('2d');
  const cx = 140, cy = 140, r = 136;
  ctx.clearRect(0,0,280,280);
  const slice = (2*Math.PI)/N;
  for(let i=0;i<N;i++){
    ctx.beginPath();
    ctx.moveTo(cx,cy);
    ctx.arc(cx,cy,r, rot+i*slice, rot+(i+1)*slice);
    ctx.closePath();
    ctx.fillStyle = COLORS[i%COLORS.length];
    ctx.fill();
    ctx.strokeStyle='rgba(253,246,236,0.15)';
    ctx.lineWidth=1.5;
    ctx.stroke();
    ctx.save();
    ctx.translate(cx,cy);
    ctx.rotate(rot + i*slice + slice/2);
    ctx.textAlign='right';
    ctx.fillStyle='rgba(253,246,236,0.92)';
    ctx.font="bold 13px 'DM Sans',sans-serif";
    ctx.fillText('P'+(i+1), r-14, 5);
    ctx.restore();
  }
  // center
  ctx.beginPath();
  ctx.arc(cx,cy,18,0,2*Math.PI);
  ctx.fillStyle='#0f0a04';
  ctx.fill();
  ctx.strokeStyle='#c9a84c';
  ctx.lineWidth=2.5;
  ctx.stroke();
}

function spinWheel() {
  if(spinning) return;
  spinning = true;
  document.getElementById('btnSpin').disabled = true;
  document.getElementById('btnStart').style.display = 'none';
  document.getElementById('spinResult').textContent = '';
  
  const extra = Math.floor(Math.random()*N);
  const totalRotation = (5 + Math.floor(Math.random()*5)) * 2*Math.PI + extra*(2*Math.PI/N);
  const duration = 3500;
  const start = performance.now();
  const startAngle = angle;

  function easeOut(t){ return 1-Math.pow(1-t,3); }

  function step(now){
    const elapsed = now-start;
    const t = Math.min(elapsed/duration,1);
    angle = startAngle + totalRotation*easeOut(t);
    drawWheel(angle);
    if(t<1){ requestAnimationFrame(step); return; }
    // determine winner: pointer at top = -PI/2 from 0
    const norm = (((-angle % (2*Math.PI)) + 2*Math.PI) % (2*Math.PI));
    const sliceSize = (2*Math.PI)/N;
    const idx = Math.floor(norm/sliceSize) % N;
    currentPaket = idx;
    spinning = false;
    document.getElementById('btnSpin').disabled = false;
    document.getElementById('spinResult').textContent = '✦ ' + PAKET[idx].judul + ' — ' + PAKET[idx].topik;
    document.getElementById('btnStart').style.display = 'inline-block';
  }
  requestAnimationFrame(step);
}

function startQuiz() {
  if(currentPaket === null) return;
  answered = {};
  renderQuiz();
  showScreen('screenQuiz');
}

function renderQuiz(){
  const p = PAKET[currentPaket];
  document.getElementById('quizTitleSm').textContent = p.judul + ' — ' + p.topik;
  updateScoreDisplay();
  const list = document.getElementById('soalList');
  list.innerHTML = '';
  p.soal.forEach((s,i)=>{
    const div = document.createElement('div');
    div.className = 'soal-card';
    div.id = 'sc-'+s.n;
    let html = `<div class="soal-meta">
      <div class="soal-num">${s.n}</div>
      <div class="pilar-tag">${s.pilar}</div>
      <div class="diff-tag diff-${s.diff}">${s.diff.charAt(0).toUpperCase()+s.diff.slice(1)}</div>
    </div>`;
    if(s.stimulus) html += `<div class="stimulus">${s.stimulus}</div>`;
    html += `<div class="soal-text">${s.q}</div>
    <div class="opts" id="opts-${s.n}">`;
    ['A','B','C','D'].forEach(k=>{
      if(!s.opsi[k]) return;
      html += `<button class="opt" data-k="${k}" onclick="pickAnswer(${s.n},'${k}')">
        <span class="opt-k">${k}.</span><span>${s.opsi[k]}</span>
      </button>`;
    });
    html += `</div><div class="feedback" id="fb-${s.n}"><div class="fb-t"></div><div class="fb-body"></div></div>`;
    div.innerHTML = html;
    list.appendChild(div);
    list.lastChild.style.animationDelay = (i*0.04)+'s';
  });
}

function pickAnswer(n, chosen){
  if(answered[n]!==undefined) return;
  const s = PAKET[currentPaket].soal.find(x=>x.n===n);
  if(!s) return;
  const isRight = chosen===s.jawab;
  answered[n] = isRight?'correct':'wrong';
  const opts = document.querySelectorAll(`#opts-${n} .opt`);
  opts.forEach(b=>{
    b.disabled=true;
    const k=b.getAttribute('data-k');
    if(k===s.jawab) b.classList.add('reveal');
    if(k===chosen && !isRight) b.classList.add('wrong');
  });
  const fb = document.getElementById('fb-'+n);
  fb.classList.add('show', isRight?'fb-ok':'fb-bad');
  fb.querySelector('.fb-t').textContent = isRight?'Benar! ✓':'Kurang tepat.';
  fb.querySelector('.fb-body').textContent = s.exp;
  updateScoreDisplay();
  checkAllAnswered();
}

function updateScoreDisplay(){
  const p = PAKET[currentPaket];
  const total = p.soal.length;
  const done = Object.keys(answered).length;
  const correct = Object.values(answered).filter(v=>v==='correct').length;
  document.getElementById('scorePill').textContent = correct+' / '+total+' benar';
  document.getElementById('progFill').style.width = Math.round(done/total*100)+'%';
}

function checkAllAnswered(){
  const total = PAKET[currentPaket].soal.length;
  const done = Object.keys(answered).length;
  if(done>=total) document.getElementById('btnResult').style.display='inline-block';
}

function showResult(){
  const p = PAKET[currentPaket];
  const total = p.soal.length;
  const correct = Object.values(answered).filter(v=>v==='correct').length;
  const pct = Math.round(correct/total*100);
  document.getElementById('resScore').textContent = correct;
  document.getElementById('resLabel').textContent = 'dari '+total+' soal benar ('+pct+'%)';
  let grade='', color='';
  if(pct>=90){grade='Luar Biasa! 🏆';color='#c9a84c';}
  else if(pct>=75){grade='Sangat Baik! 👍';color='#27ae60';}
  else if(pct>=60){grade='Cukup Baik 📚';color='#e67e22';}
  else{grade='Perlu Belajar Lagi 💪';color='#c0392b';}
  const g = document.getElementById('resGrade');
  g.textContent = grade; g.style.color = color;

  // per-diff bars
  const diffs = ['mudah','sedang','sulit'];
  const bars = document.getElementById('resBars');
  bars.innerHTML = '';
  diffs.forEach(d=>{
    const soalD = p.soal.filter(s=>s.diff===d);
    const corrD = soalD.filter(s=>answered[s.n]==='correct').length;
    const pctD = soalD.length>0?Math.round(corrD/soalD.length*100):0;
    bars.innerHTML += `<div class="rbar">
      <div class="rbar-label">${d.charAt(0).toUpperCase()+d.slice(1)}</div>
      <div class="rbar-track"><div class="rbar-fill" style="width:${pctD}%"></div></div>
      <div class="rbar-val">${corrD}/${soalD.length}</div>
    </div>`;
  });

  // add to history
  history.push({paket:currentPaket, score:correct, total, pct});
  updateHistoryChips();
  showScreen('screenResult');
}

function updateHistoryChips(){
  const chips = document.getElementById('historyChips');
  chips.innerHTML = history.map(h=>`<div class="chip">P${h.paket+1}: ${h.score}/${h.total}</div>`).join('');
}

function goHome(){
  showScreen('screenSpin');
  document.getElementById('btnResult').style.display='none';
}

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// init
drawWheel(0);
</script>
